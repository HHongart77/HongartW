    // ========================================
    // 🔀 Router
    // ========================================
    const RouterContext = createContext(null);

    function matchRoute(pattern, path) {
      const pSegs = pattern.split('/').filter(Boolean);
      const aSegs = path.split('/').filter(Boolean);
      if (pSegs.length !== aSegs.length) return null;
      const params = {};
      for (let i = 0; i < pSegs.length; i++) {
        if (pSegs[i].startsWith(':')) params[pSegs[i].slice(1)] = decodeURIComponent(aSegs[i]);
        else if (pSegs[i] !== aSegs[i]) return null;
      }
      return params;
    }

    function Router({ children }) {
      const [path, setPath] = useState(() => (window.location.hash || '#/').slice(1) || '/');
      useEffect(() => {
        const onHash = () => setPath((window.location.hash || '#/').slice(1) || '/');
        window.addEventListener('hashchange', onHash);
        return () => window.removeEventListener('hashchange', onHash);
      }, []);
      useEffect(() => { window.scrollTo({ top: 0, behavior: 'instant' }); }, [path]);
      const navigate = useCallback((to) => { window.location.hash = to.startsWith('#') ? to : '#' + to; }, []);
      return (
        <RouterContext.Provider value={{ path, navigate, params: {} }}>
          {children}
        </RouterContext.Provider>
      );
    }

    function Routes({ children }) {
      const ctx = useContext(RouterContext);
      const arr = React.Children.toArray(children);
      for (const child of arr) {
        const params = matchRoute(child.props.path, ctx.path);
        if (params) {
          return (
            <RouterContext.Provider value={{ ...ctx, params }}>
              {child.props.element}
            </RouterContext.Provider>
          );
        }
      }
      const fallback = arr.find((c) => c.props.path === '*');
      return fallback ? fallback.props.element : null;
    }

    function Route() { return null; }

    function Link({ to, children, className = '', onClick, ...rest }) {
      const { navigate } = useContext(RouterContext);
      const handle = (e) => {
        e.preventDefault();
        if (onClick) onClick(e);
        navigate(to);
      };
      return (
        <a href={'#' + to} onClick={handle} className={className} {...rest}>
          {children}
        </a>
      );
    }

    function useRouter() { return useContext(RouterContext); }
    function useParams() { return useContext(RouterContext).params; }

    // ========================================
    // 🛒 Cart Context (localStorage)
    // ========================================
    const CartContext = createContext(null);
    const CART_KEY = 'lumiere_cart';

    function CartProvider({ children }) {
      const [items, setItems] = useState(() => {
        try {
          const raw = localStorage.getItem(CART_KEY);
          return raw ? JSON.parse(raw) : [];
        } catch { return []; }
      });
      useEffect(() => {
        try { localStorage.setItem(CART_KEY, JSON.stringify(items)); } catch {}
      }, [items]);

      const addItem = useCallback((id, quantity = 1) => {
        setItems((prev) => {
          const found = prev.find((x) => x.id === id);
          if (found) return prev.map((x) => x.id === id ? { ...x, quantity: x.quantity + quantity } : x);
          return [...prev, { id, quantity }];
        });
      }, []);
      const removeItem = useCallback((id) => setItems((prev) => prev.filter((x) => x.id !== id)), []);
      const updateQty = useCallback((id, quantity) => {
        setItems((prev) => prev.map((x) => x.id === id ? { ...x, quantity: Math.max(1, quantity) } : x));
      }, []);
      const clear = useCallback(() => setItems([]), []);
      const count = useMemo(() => items.reduce((a, b) => a + b.quantity, 0), [items]);

      return (
        <CartContext.Provider value={{ items, addItem, removeItem, updateQty, clear, count }}>
          {children}
        </CartContext.Provider>
      );
    }

    function useCart() { return useContext(CartContext); }

    // ========================================
    // 🔔 Toast Context
    // ========================================
    const ToastContext = createContext(null);
    function ToastProvider({ children }) {
      const [toasts, setToasts] = useState([]);
      const push = useCallback((msg) => {
        const id = Math.random().toString(36).slice(2);
        setToasts((prev) => [...prev, { id, msg }]);
        setTimeout(() => setToasts((prev) => prev.filter((t) => t.id !== id)), 2800);
      }, []);
      return (
        <ToastContext.Provider value={{ push }}>
          {children}
          <div className="fixed top-24 right-6 z-50 flex flex-col gap-2 pointer-events-none">
            {toasts.map((t) => (
              <div key={t.id} className="toast-in bg-stone-900 text-white px-5 py-3 shadow-2xl text-sm flex items-center gap-3 pointer-events-auto">
                <svg className="w-4 h-4 text-amber-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                  <polyline points="20 6 9 17 4 12" />
                </svg>
                {t.msg}
              </div>
            ))}
          </div>
        </ToastContext.Provider>
      );
    }
    function useToast() { return useContext(ToastContext); }

    // ========================================
    // 📄 Page: Products (list)

    function ProductsPage() {
      const { path } = useRouter();
      const initialCat = useMemo(() => {
        const q = path.split('?')[1] || '';
        const params = new URLSearchParams(q);
        return params.get('cat') || '전체';
      }, [path]);

      const [category, setCategory] = useState(initialCat);
      const [sort, setSort] = useState('popular');
      const [search, setSearch] = useState('');

      useEffect(() => { setCategory(initialCat); }, [initialCat]);

      const filtered = useMemo(() => {
        let list = [...PRODUCTS];
        if (category !== '전체') list = list.filter((p) => p.category === category);
        if (search.trim()) {
          const q = search.trim().toLowerCase();
          list = list.filter((p) =>
            p.name.toLowerCase().includes(q) ||
            p.subtitle.toLowerCase().includes(q) ||
            p.category.toLowerCase().includes(q)
          );
        }
        switch (sort) {
          case 'price-asc': list.sort((a, b) => a.price - b.price); break;
          case 'price-desc': list.sort((a, b) => b.price - a.price); break;
          case 'latest': list.sort((a, b) => (b.isNew ? 1 : 0) - (a.isNew ? 1 : 0)); break;
          case 'popular': default: list.sort((a, b) => (b.isBest ? 1 : 0) - (a.isBest ? 1 : 0)); break;
        }
        return list;
      }, [category, sort, search]);

      return (
        <div className="max-w-7xl mx-auto px-6 lg:px-10 py-16">
          <div className="mb-10 text-center">
            <div className="text-xs tracking-[0.25em] uppercase text-amber-600 mb-3">Collection</div>

                    ${category === c
                      ? 'bg-stone-900 text-white border-stone-900'
                      : 'bg-white text-stone-600 border-stone-300 hover:border-stone-900 hover:text-stone-900'}`}
                >
                  {c}
                </button>
              ))}
            </div>
            <div className="flex flex-col sm:flex-row gap-3 sm:items-center sm:justify-between">
              <div className="relative max-w-sm w-full">
                <input
                  value={search}
                  onChange={(e) => setSearch(e.target.value)}
                  placeholder="제품명, 카테고리 검색"
                  className="w-full px-4 py-3 pr-10 bg-white border border-stone-300 text-sm focus:border-stone-900 transition-colors"
                />

                  <circle cx="11" cy="11" r="7" /><line x1="20" y1="20" x2="16.5" y2="16.5" />
                </svg>
              </div>
              <div className="flex items-center gap-3">
                <span className="text-xs text-stone-500 tracking-wider uppercase">
                  {filtered.length}개의 제품
                </span>
                <select value={sort} onChange={(e) => setSort(e.target.value)}

                <div className="hidden md:grid grid-cols-[1fr_100px_120px_40px] gap-4 px-2 pb-3 text-xs tracking-wider uppercase text-stone-500 border-b border-stone-200">
                  <div>제품</div>
                  <div className="text-center">수량</div>
                  <div className="text-right">금액</div>
                  <div></div>
                </div>
                <div className="divide-y divide-stone-200">
                  {rows.map((r) => (
                    <div key={r.id} className="py-5 grid grid-cols-[80px_1fr_auto] md:grid-cols-[1fr_100px_120px_40px] items-center gap-4">
                      <div className="md:col-span-1 flex items-center gap-4">
                        <Link to={`/product/${r.id}`} className="w-20 h-20 bg-stone-100 overflow-hidden flex-shrink-0">
                          <img src={r.product.image} alt={r.product.name} className="w-full h-full object-cover" />
                        </Link>
                        <div className="hidden md:block">
                          <div className="text-xs text-stone-500 mb-1">{r.product.category}</div>
                          <Link to={`/product/${r.id}`} className="font-display text-lg hover:text-amber-600">{r.product.name}</Link>
                          <div className="text-xs text-stone-500 italic">{r.product.subtitle}</div>
                        </div>
                      </div>
                      <div className="md:hidden">
                        <div className="text-xs text-stone-500 mb-1">{r.product.category}</div>
                        <Link to={`/product/${r.id}`} className="font-display text-base">{r.product.name}</Link>
                        <div className="text-sm font-semibold mt-2">{formatKRW(r.product.price * r.quantity)}</div>
                      </div>
                      <div className="hidden md:flex justify-center">
                        <div className="inline-flex border border-stone-300">
                          <button onClick={() => updateQty(r.id, r.quantity - 1)} className="w-9 h-9 text-stone-600 hover:bg-stone-100">−</button>
                          <div className="w-10 h-9 flex items-center justify-center text-sm font-medium border-x border-stone-300">{r.quantity}</div>
                          <button onClick={() => updateQty(r.id, r.quantity + 1)} className="w-9 h-9 text-stone-600 hover:bg-stone-100">+</button>
                        </div>
                      </div>
                      <div className="hidden md:block text-right text-sm font-semibold">{formatKRW(r.product.price * r.quantity)}</div>
                      <button onClick={() => removeItem(r.id)} className="text-stone-400 hover:text-red-600 justify-self-end" aria-label="제거">
                        <svg className="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                          <line x1="6" y1="6" x2="18" y2="18" /><line x1="18" y1="6" x2="6" y2="18" />
                        </svg>
                      </button>
                    </div>
                  ))}
                </div>
                <div className="mt-6">
                  <button onClick={clear} className="text-xs tracking-wider uppercase text-stone-500 hover:text-red-600">전체 비우기</button>
                </div>
              </div>

              <aside className="lg:col-span-1">
                <div className="bg-stone-100 p-8 sticky top-28">
                  <h3 className="font-display text-2xl mb-6">주문 요약</h3>
                  <dl className="space-y-3 text-sm mb-6">
                    <div className="flex justify-between">
                      <dt className="text-stone-600">상품 ({count}개)</dt>
                      <dd className="font-medium">{formatKRW(subtotal)}</dd>
                    </div>
                    <div className="flex justify-between">
                      <dt className="text-stone-600">배송비</dt>
                      <dd className="font-medium">{shipping === 0 ? '무료' : formatKRW(shipping)}</dd>
                    </div>
                    {subtotal > 0 && subtotal < 100000 && (
                      <div className="text-xs text-amber-700 pt-1">
                        {formatKRW(100000 - subtotal)} 더 담으면 무료배송!
                      </div>
                    )}
                  </dl>
                  <div className="flex justify-between pt-4 mb-6 border-t border-stone-300">
                    <span className="text-sm tracking-wider uppercase font-semibold">총 결제금액</span>
                    <span className="font-display text-2xl">{formatKRW(total)}</span>
                  </div>
                  <Button variant="primary" size="lg" className="w-full">결제하기</Button>
                  <Link to="/products" className="block text-center text-xs tracking-wider uppercase text-stone-500 hover:text-stone-900 mt-4">
                    쇼핑 계속하기 →
                  </Link>
                </div>
              </aside>
            </div>
          )}
        </div>
      );
    }

    // ========================================
    // 📄 Page: About
    // ========================================
    function AboutPage() {
      return (
        <div>
          <section className="relative h-[60vh] min-h-[420px] overflow-hidden">
            <img src="./images/chandelier-01.jpg" alt="LUMIÈRE" className="absolute inset-0 w-full h-full object-cover" />
            <div className="absolute inset-0 bg-stone-900/60" />
            <div className="relative z-10 h-full flex flex-col items-center justify-center text-white text-center px-6">
              <div className="text-xs tracking-[0.35em] uppercase text-amber-300 mb-4">Our Story</div>
              <h1 className="font-display text-5xl md:text-7xl">Brand Story</h1>
            </div>
          </section>

          <section className="max-w-3xl mx-auto px-6 py-24 text-center">
            <h2 className="font-display text-3xl md:text-5xl leading-tight mb-10">
              "빛은 가구가 아니라<br/>공간의 감정입니다."
            </h2>
            <p className="text-stone-700 leading-[1.9] text-base md:text-lg">
              LUMIÈRE는 2018년, '좋은 조명은 방의 온도를 바꾼다'는
              단순한 믿음에서 시작되었습니다. 서울의 작은 스튜디오에서 시작된 작업은
              이제 유럽과 일본의 장인들과 함께, 오래 써도 질리지 않는 조명을
              한 점 한 점 완성하는 일이 되었습니다.
            </p>
          </section>

          <section className="bg-stone-100 py-24">
            <div className="max-w-6xl mx-auto px-6 grid md:grid-cols-3 gap-12 text-center">
              {[
                { n: '01', t: '장인의 손으로', d: '모든 조명은 검증된 장인의 작업장에서 수작업으로 완성됩니다. 기계가 흉내낼 수 없는 질감과 무게감을 그대로 전합니다.' },
                { n: '02', t: '오래가는 디자인', d: '유행을 좇지 않습니다. 10년이 지나도 공간에 어울리는 조형을 고르고, 수리와 부품 공급을 긴 시간 책임집니다.' },
                { n: '03', t: '따뜻한 빛의 과학', d: '색온도, 연색성, 디밍 곡선까지 ─ 인간의 눈이 가장 편안한 빛을 위해 광학 설계를 직접 검증합니다.' },
              ].map((v) => (
                <div key={v.n}>
                  <div className="font-display text-5xl text-amber-600 mb-4">{v.n}</div>
                  <h3 className="font-display text-2xl mb-4">{v.t}</h3>
                  <p className="text-stone-600 leading-relaxed text-sm">{v.d}</p>
                </div>
              ))}
            </div>
          </section>

          <section className="max-w-5xl mx-auto px-6 py-24">
            <div className="grid md:grid-cols-2 gap-12 items-center">
              <img src="./images/floor-01.jpg" alt="Studio" className="w-full aspect-[4/5] object-cover" />
              <div>
                <div className="text-xs tracking-[0.25em] uppercase text-amber-600 mb-4">Craftsmanship</div>
                <h2 className="font-display text-4xl mb-6">한 점, 한 점.</h2>
                <p className="text-stone-700 leading-relaxed mb-4">
                  우리는 대량생산을 지양합니다. 한 달에 만들어지는 펜던트는
                  많아야 120점. 놋쇠 마감, 유리 블로잉, 코드의 꼬임까지 사람의 손끝을 거칩니다.
                </p>
                <p className="text-stone-700 leading-relaxed mb-8">
                  그래서 모든 제품에는 완성일자와 장인의 이니셜이 새겨집니다.
                  당신의 거실에 놓인 그 조명은, 세상에 하나뿐입니다.
                </p>
                <Link to="/products">
                  <Button variant="primary" size="lg">컬렉션 둘러보기</Button>
                </Link>
              </div>
            </div>
          </section>

          <section className="bg-stone-900 text-stone-100 py-20 text-center">
            <div className="max-w-xl mx-auto px-6">
              <h3 className="font-display text-3xl mb-4">뉴스레터 구독</h3>
              <p className="text-stone-400 text-sm mb-8">신제품 소식과 인테리어 영감을 매달 보내드립니다.</p>
              <form onSubmit={(e) => e.preventDefault()} className="flex flex-col sm:flex-row gap-3">
                <input
                  type="email"
                  required
                  placeholder="이메일 주소"
                  className="flex-1 px-4 py-3 bg-transparent border border-stone-700 text-white placeholder:text-stone-500 focus:border-amber-500"
                />
                <Button variant="gold" size="md" type="submit">구독하기</Button>
              </form>
            </div>
          </section>
        </div>
      );
    }

    // ========================================
    // 🚀 App
    // ========================================
    function App() {
      return (
        <Router>
          <CartProvider>
            <ToastProvider>
              <div className="min-h-screen flex flex-col">
                <Header />
                <main className="flex-1">
                  <Routes>
                    <Route path="/" element={<HomePage />} />
                    <Route path="/products" element={<ProductsPage />} />
                    <Route path="/product/:id" element={<ProductDetailPage />} />
                    <Route path="/cart" element={<CartPage />} />
                    <Route path="/about" element={<AboutPage />} />
                    <Route path="*" element={
                      <div className="max-w-xl mx-auto px-6 py-32 text-center">
                        <h2 className="font-display text-4xl mb-4">페이지를 찾을 수 없습니다</h2>
                        <p className="text-stone-500 mb-8">요청하신 페이지가 존재하지 않습니다.</p>
                        <Link to="/"><Button variant="primary">홈으로</Button></Link>
                      </div>
                    } />
                  </Routes>
                </main>
                <Footer />
              </div>
            </ToastProvider>
          </CartProvider>
        </Router>
      );
    }

    // ========================================
    // Rendering
    // ========================================
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
