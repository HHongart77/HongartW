<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>가계부</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <style>
    html, body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", "Apple SD Gothic Neo", sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      letter-spacing: -0.01em;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-in {
      animation: fadeIn 200ms ease-out both;
    }

    @keyframes modalIn {
      from { opacity: 0; transform: scale(0.97) translateY(6px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }
    .modal-in {
      animation: modalIn 180ms ease-out both;
    }

    .thin-scroll::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    .thin-scroll::-webkit-scrollbar-track {
      background: transparent;
    }
    .thin-scroll::-webkit-scrollbar-thumb {
      background: #e5e7eb;
      border-radius: 9999px;
    }
    .thin-scroll::-webkit-scrollbar-thumb:hover {
      background: #d1d5db;
    }

    /* Hide number input arrows */
    input[type="number"]::-webkit-outer-spin-button,
    input[type="number"]::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    input[type="number"] { -moz-appearance: textfield; }
  </style>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen">
  <div id="root"></div>
  <script type="text/babel">
    // ========================================
    // 🔧 Utils & Constants
    // ========================================
    const { useState, useEffect, useMemo, useRef, useCallback } = React;

    const EXPENSE_CATEGORIES = [
      { key: '식비',      emoji: '🍚', label: '식비',      color: 'orange',
        text: 'text-orange-700', bg: 'bg-orange-50',  ring: 'ring-orange-200', bar: 'bg-orange-400', dot: 'bg-orange-400' },
      { key: '교통',      emoji: '🚌', label: '교통',      color: 'sky',
        text: 'text-sky-700',    bg: 'bg-sky-50',     ring: 'ring-sky-200',    bar: 'bg-sky-400',    dot: 'bg-sky-400' },
      { key: '쇼핑',      emoji: '🛍️', label: '쇼핑',     color: 'pink',
        text: 'text-pink-700',   bg: 'bg-pink-50',    ring: 'ring-pink-200',   bar: 'bg-pink-400',   dot: 'bg-pink-400' },
      { key: '문화생활',  emoji: '🎬', label: '문화생활',  color: 'violet',
        text: 'text-violet-700', bg: 'bg-violet-50',  ring: 'ring-violet-200', bar: 'bg-violet-400', dot: 'bg-violet-400' },
      { key: '주거',      emoji: '🏠', label: '주거',      color: 'amber',
        text: 'text-amber-700',  bg: 'bg-amber-50',   ring: 'ring-amber-200',  bar: 'bg-amber-400',  dot: 'bg-amber-400' },
      { key: '의료',      emoji: '💊', label: '의료',      color: 'red',
        text: 'text-red-700',    bg: 'bg-red-50',     ring: 'ring-red-200',    bar: 'bg-red-400',    dot: 'bg-red-400' },
      { key: '기타',      emoji: '🗂️', label: '기타',     color: 'gray',
        text: 'text-gray-700',   bg: 'bg-gray-100',   ring: 'ring-gray-200',   bar: 'bg-gray-400',   dot: 'bg-gray-400' },
    ];

    const INCOME_CATEGORIES = [
      { key: '급여', emoji: '💼', label: '급여', color: 'emerald',
        text: 'text-emerald-700', bg: 'bg-emerald-50', ring: 'ring-emerald-200', bar: 'bg-emerald-400', dot: 'bg-emerald-400' },
      { key: '용돈', emoji: '💝', label: '용돈', color: 'teal',
        text: 'text-teal-700',    bg: 'bg-teal-50',    ring: 'ring-teal-200',    bar: 'bg-teal-400',    dot: 'bg-teal-400' },
      { key: '기타', emoji: '💰', label: '기타', color: 'lime',
        text: 'text-lime-700',    bg: 'bg-lime-50',    ring: 'ring-lime-200',    bar: 'bg-lime-400',    dot: 'bg-lime-400' },
    ];

    const CATEGORY_MAP = {
      expense: Object.fromEntries(EXPENSE_CATEGORIES.map(c => [c.key, c])),
      income:  Object.fromEntries(INCOME_CATEGORIES.map(c => [c.key, c])),
    };

    function getCategory(type, key) {
      return CATEGORY_MAP[type]?.[key] || CATEGORY_MAP.expense['기타'];
    }

    function formatCurrency(n) {
      const v = Number(n) || 0;
      return '₩' + v.toLocaleString('ko-KR');
    }

    function formatSignedCurrency(n, sign) {
      const v = Math.abs(Number(n) || 0);
      // No sign for zero — "+₩0" / "−₩0" looks like a strikethrough
      if (v === 0) return formatCurrency(0);
      const prefix = sign === '+' ? '+' : sign === '-' ? '−' : '';
      return prefix + formatCurrency(v);
    }

    function todayISO() {
      const d = new Date();
      return [
        d.getFullYear(),
        String(d.getMonth() + 1).padStart(2, '0'),
        String(d.getDate()).padStart(2, '0'),
      ].join('-');
    }

    function parseISO(s) {
      // Returns Date for "YYYY-MM-DD" in local time
      const [y, m, d] = s.split('-').map(Number);
      return new Date(y, m - 1, d);
    }

    function ymKey(s) {
      // "YYYY-MM-DD" -> "YYYY-MM"
      return s.slice(0, 7);
    }

    const WEEKDAYS = ['일', '월', '화', '수', '목', '금', '토'];

    function formatGroupDate(iso) {
      const d = parseISO(iso);
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      const wd = WEEKDAYS[d.getDay()];
      return `${y}. ${m}. ${day}. (${wd})`;
    }

    function formatYearMonth(ym) {
      // "2026-04" -> "2026년 4월"
      const [y, m] = ym.split('-');
      return `${y}년 ${parseInt(m, 10)}월`;
    }

    function shiftMonth(ym, delta) {
      const [y, m] = ym.split('-').map(Number);
      const d = new Date(y, m - 1 + delta, 1);
      return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
    }

    function currentYM() {
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
    }

    // Hex colors for SVG (Tailwind 400 shade) — used by donut chart & calendar
    const CATEGORY_HEX = {
      '식비':     '#fb923c', // orange-400
      '교통':     '#38bdf8', // sky-400
      '쇼핑':     '#f472b6', // pink-400
      '문화생활': '#a78bfa', // violet-400
      '주거':     '#fbbf24', // amber-400
      '의료':     '#f87171', // red-400
      '기타':     '#9ca3af', // gray-400 (expense fallback)
    };

    // Compact Korean number formatter for tight spaces (calendar cells)
    // 850000 → "85만", 32000 → "3.2만", 6500 → "6.5천", 850 → "850"
    function formatCompactKR(n) {
      const v = Math.abs(Number(n) || 0);
      if (v >= 10_000) {
        const man = v / 10_000;
        const rounded = Math.round(man * 10) / 10;
        return rounded + '만';
      }
      if (v >= 1000) {
        return (Math.round(v / 100) / 10) + '천';
      }
      return v.toLocaleString('ko-KR');
    }

    // ========================================
    // 📡 API & data hook
    // ========================================
    const API_BASE_URL = '/api';

    async function parseApiResponse(res) {
      let payload = null;
      try { payload = await res.json(); } catch (_) {}
      if (!res.ok || !payload || payload.success === false) {
        const msg = (payload && payload.message) || `요청 실패 (${res.status})`;
        throw new Error(msg);
      }
      return payload.data;
    }

    function useTransactions() {
      const [transactions, setTransactions] = useState([]);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);

      const fetchAll = useCallback(async () => {
        setLoading(true);
        setError(null);
        try {
          const res = await fetch(`${API_BASE_URL}/transactions`);
          const data = await parseApiResponse(res);
          setTransactions(Array.isArray(data) ? data : []);
        } catch (err) {
          setError(err.message || '알 수 없는 오류가 발생했습니다.');
        } finally {
          setLoading(false);
        }
      }, []);

      useEffect(() => { fetchAll(); }, [fetchAll]);

      const addTransaction = useCallback(async (payload) => {
        const res = await fetch(`${API_BASE_URL}/transactions`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });
        const created = await parseApiResponse(res);
        await fetchAll();
        return created;
      }, [fetchAll]);

      const deleteTransaction = useCallback(async (id) => {
        const res = await fetch(`${API_BASE_URL}/transactions/${id}`, { method: 'DELETE' });
        await parseApiResponse(res);
        await fetchAll();
      }, [fetchAll]);

      return { transactions, loading, error, addTransaction, deleteTransaction, refetch: fetchAll };
    }

    // ========================================
    // 🎨 Design System
    // ========================================
    function Button({ variant = 'primary', size = 'md', disabled, onClick, type = 'button', children, className = '', ...rest }) {
      const sizes = {
        sm: 'px-3 py-1.5 text-sm',
        md: 'px-4 py-2 text-sm',
        lg: 'px-5 py-3 text-base',
      };
      const variants = {
        primary:   'bg-indigo-600 text-white hover:bg-indigo-700 focus:ring-indigo-300 shadow-sm',
        secondary: 'bg-white text-gray-700 border border-gray-200 hover:bg-gray-50 focus:ring-gray-200',
        danger:    'bg-red-600 text-white hover:bg-red-700 focus:ring-red-300 shadow-sm',
        success:   'bg-emerald-600 text-white hover:bg-emerald-700 focus:ring-emerald-300 shadow-sm',
        ghost:     'bg-transparent text-gray-600 hover:bg-gray-100 focus:ring-gray-200',
      };
      return (
        <button
          type={type}
          onClick={onClick}
          disabled={disabled}
          className={`inline-flex items-center justify-center gap-1.5 rounded-xl font-medium transition
                      focus:outline-none focus:ring-4 focus:ring-offset-0
                      disabled:opacity-50 disabled:cursor-not-allowed
                      ${sizes[size]} ${variants[variant]} ${className}`}
          {...rest}
        >
          {children}
        </button>
      );
    }

    function Input({ label, error, type = 'text', value, onChange, placeholder, disabled, className = '', maxLength, min, step, id, name, required, ...rest }) {
      const inputId = id || (label ? `inp-${label}` : undefined);
      return (
        <div className={`flex flex-col gap-1.5 ${className}`}>
          {label && (
            <label htmlFor={inputId} className="text-xs font-medium text-gray-600">
              {label}
            </label>
          )}
          <input
            id={inputId}
            name={name}
            type={type}
            value={value}
            onChange={onChange}
            placeholder={placeholder}
            disabled={disabled}
            maxLength={maxLength}
            min={min}
            step={step}
            required={required}
            className={`w-full rounded-xl border bg-white px-3.5 py-2.5 text-sm text-gray-800
                        placeholder:text-gray-400 transition
                        focus:outline-none focus:ring-4 focus:ring-indigo-100 focus:border-indigo-300
                        disabled:bg-gray-50 disabled:text-gray-400
                        ${error ? 'border-red-300' : 'border-gray-200'}`}
            {...rest}
          />
          {error && <span className="text-xs text-red-600">{error}</span>}
        </div>
      );
    }

    function Select({ label, error, value, onChange, children, className = '', id, name, ...rest }) {
      const selectId = id || (label ? `sel-${label}` : undefined);
      return (
        <div className={`flex flex-col gap-1.5 ${className}`}>
          {label && (
            <label htmlFor={selectId} className="text-xs font-medium text-gray-600">
              {label}
            </label>
          )}
          <select
            id={selectId}
            name={name}
            value={value}
            onChange={onChange}
            className={`w-full appearance-none rounded-xl border bg-white px-3.5 py-2.5 text-sm text-gray-800
                        transition focus:outline-none focus:ring-4 focus:ring-indigo-100 focus:border-indigo-300
                        bg-no-repeat bg-right pr-10
                        ${error ? 'border-red-300' : 'border-gray-200'}`}
            style={{
              backgroundImage:
                "url(\"data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%239ca3af' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='m6 8 4 4 4-4'/%3e%3c/svg%3e\")",
              backgroundSize: '1.25rem',
              backgroundPosition: 'right 0.75rem center',
            }}
            {...rest}
          >
            {children}
          </select>
          {error && <span className="text-xs text-red-600">{error}</span>}
        </div>
      );
    }

    function Card({ children, className = '', ...rest }) {
      return (
        <div
          className={`bg-white rounded-2xl shadow-sm border border-gray-100 ${className}`}
          {...rest}
        >
          {children}
        </div>
      );
    }

    function Badge({ type, categoryKey, className = '' }) {
      const c = getCategory(type, categoryKey);
      return (
        <span
          className={`inline-flex items-center gap-1 rounded-lg px-2 py-0.5 text-xs font-medium
                      ring-1 ring-inset ${c.bg} ${c.text} ${c.ring} ${className}`}
        >
          <span className="leading-none">{c.emoji}</span>
          <span>{c.label}</span>
        </span>
      );
    }

    function Chip({ active, onClick, children, className = '' }) {
      return (
        <button
          type="button"
          onClick={onClick}
          className={`inline-flex items-center gap-1 rounded-full px-3 py-1.5 text-xs font-medium transition
                      focus:outline-none focus:ring-2 focus:ring-indigo-200
                      ${active
                        ? 'bg-indigo-600 text-white border border-indigo-600 shadow-sm'
                        : 'bg-white text-gray-600 border border-gray-200 hover:bg-gray-50'}
                      ${className}`}
        >
          {children}
        </button>
      );
    }

    function Modal({ isOpen, onClose, title, children, size = 'md' }) {
      useEffect(() => {
        if (!isOpen) return;
        const onKey = (e) => { if (e.key === 'Escape') onClose?.(); };
        document.addEventListener('keydown', onKey);
        const prev = document.body.style.overflow;
        document.body.style.overflow = 'hidden';
        return () => {
          document.removeEventListener('keydown', onKey);
          document.body.style.overflow = prev;
        };
      }, [isOpen, onClose]);

      if (!isOpen) return null;
      const sizes = { sm: 'max-w-sm', md: 'max-w-md', lg: 'max-w-lg' };

      return (
        <div
          className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/30 backdrop-blur-sm"
          onClick={onClose}
          role="dialog"
          aria-modal="true"
          aria-label={title}
        >
          <div
            className={`w-full ${sizes[size]} bg-white rounded-2xl shadow-2xl border border-gray-100 modal-in`}
            onClick={(e) => e.stopPropagation()}
          >
            {title && (
              <div className="px-6 pt-6 pb-3">
                <h3 className="text-lg font-semibold text-gray-900">{title}</h3>
              </div>
            )}
            <div className={title ? 'px-6 pb-6' : 'p-6'}>
              {children}
            </div>
          </div>
        </div>
      );
    }

    // ========================================
    // 🧩 Layout — MonthNavigator, SummaryCard
    // ========================================
    function MonthNavigator({ ym, onChange }) {
      const isCurrent = ym === currentYM();
      return (
        <div className="flex items-center gap-2">
          <button
            type="button"
            onClick={() => onChange(shiftMonth(ym, -1))}
            aria-label="이전 달"
            className="w-9 h-9 inline-flex items-center justify-center rounded-full
                       border border-gray-200 bg-white text-gray-600 hover:bg-gray-50
                       focus:outline-none focus:ring-2 focus:ring-indigo-200 transition"
          >
            <svg width="16" height="16" viewBox="0 0 20 20" fill="none">
              <path d="M12 5l-5 5 5 5" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"/>
            </svg>
          </button>
          <div className="px-3 py-1.5 min-w-[8rem] text-center text-base font-semibold text-gray-900 tabular-nums">
            {formatYearMonth(ym)}
          </div>
          <button
            type="button"
            onClick={() => onChange(shiftMonth(ym, 1))}
            aria-label="다음 달"
            className="w-9 h-9 inline-flex items-center justify-center rounded-full
                       border border-gray-200 bg-white text-gray-600 hover:bg-gray-50
                       focus:outline-none focus:ring-2 focus:ring-indigo-200 transition"
          >
            <svg width="16" height="16" viewBox="0 0 20 20" fill="none">
              <path d="M8 5l5 5-5 5" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"/>
            </svg>
          </button>
          {!isCurrent && (
            <Button variant="ghost" size="sm" onClick={() => onChange(currentYM())}>
              오늘
            </Button>
          )}
        </div>
      );
    }

    function SummaryCard({ label, amount, tone = 'indigo', sign }) {
      const tones = {
        emerald: { dot: 'bg-emerald-400', text: 'text-emerald-600' },
        red:     { dot: 'bg-red-400',     text: 'text-red-600' },
        indigo:  { dot: 'bg-indigo-400',  text: 'text-indigo-600' },
      };
      const t = tones[tone] || tones.indigo;

      // Render the ₩ symbol smaller and lighter so its W-with-double-bar
      // glyph doesn't visually slash through the digits at large sizes.
      const v = Math.abs(Number(amount) || 0);
      const prefix = v > 0 ? (sign === '+' ? '+' : sign === '-' ? '−' : '') : '';

      return (
        <Card className="p-5">
          <div className="flex items-center gap-2 text-xs font-medium text-gray-500">
            <span className={`w-1.5 h-1.5 rounded-full ${t.dot}`}></span>
            {label}
          </div>
          <div className={`mt-3 flex items-baseline gap-0.5 text-2xl sm:text-3xl font-bold tabular-nums ${t.text}`}>
            {prefix && <span>{prefix}</span>}
            <span className="text-[0.6em] font-semibold opacity-70 translate-y-[-0.05em]">₩</span>
            <span>{v.toLocaleString('ko-KR')}</span>
          </div>
        </Card>
      );
    }

    // ========================================
    // 📄 Sub-views
    // ========================================

    // ---- Transaction Form ----
    function TransactionForm({ onAdd }) {
      const [type, setType] = useState('expense');
      const [amount, setAmount] = useState('');
      const [category, setCategory] = useState(EXPENSE_CATEGORIES[0].key);
      const [date, setDate] = useState(todayISO());
      const [memo, setMemo] = useState('');
      const [errors, setErrors] = useState({});

      const categories = type === 'expense' ? EXPENSE_CATEGORIES : INCOME_CATEGORIES;

      // Reset category when type changes if not present in new list
      useEffect(() => {
        if (!categories.some(c => c.key === category)) {
          setCategory(categories[0].key);
        }
      }, [type]); // eslint-disable-line

      function validate() {
        const e = {};
        const amt = Number(amount);
        if (!amount || isNaN(amt) || amt <= 0) e.amount = '0보다 큰 금액을 입력하세요';
        if (!date) e.date = '날짜를 선택하세요';
        return e;
      }

      const [submitting, setSubmitting] = useState(false);
      const [submitError, setSubmitError] = useState(null);

      async function handleSubmit(ev) {
        ev.preventDefault();
        if (submitting) return;
        const e = validate();
        setErrors(e);
        if (Object.keys(e).length > 0) return;

        setSubmitError(null);
        setSubmitting(true);
        try {
          await onAdd({
            type,
            amount: Number(amount),
            category,
            date,
            memo: memo.trim(),
          });
          setAmount('');
          setMemo('');
          setErrors({});
        } catch (err) {
          setSubmitError(err.message || '저장에 실패했어요. 잠시 후 다시 시도해주세요.');
        } finally {
          setSubmitting(false);
        }
      }

      const isExpense = type === 'expense';

      return (
        <Card className="p-5">
          <h2 className="text-base font-semibold text-gray-900">내역 추가</h2>
          <p className="text-xs text-gray-500 mt-1">지출 또는 수입을 기록하세요.</p>

          {/* Type toggle */}
          <div className="mt-4 inline-flex w-full p-1 rounded-xl bg-gray-100">
            <button
              type="button"
              onClick={() => setType('expense')}
              aria-pressed={isExpense}
              className={`flex-1 py-2 text-sm font-medium rounded-lg transition
                          ${isExpense
                            ? 'bg-white text-red-600 shadow-sm'
                            : 'text-gray-500 hover:text-gray-700'}`}
            >
              지출
            </button>
            <button
              type="button"
              onClick={() => setType('income')}
              aria-pressed={!isExpense}
              className={`flex-1 py-2 text-sm font-medium rounded-lg transition
                          ${!isExpense
                            ? 'bg-white text-emerald-600 shadow-sm'
                            : 'text-gray-500 hover:text-gray-700'}`}
            >
              수입
            </button>
          </div>

          <form onSubmit={handleSubmit} className="mt-4 flex flex-col gap-3">
            <Input
              label="금액"
              type="number"
              min="0"
              step="1"
              value={amount}
              onChange={(e) => setAmount(e.target.value)}
              placeholder="0"
              error={errors.amount}
              inputMode="numeric"
            />

            <Select
              label="카테고리"
              value={category}
              onChange={(e) => setCategory(e.target.value)}
            >
              {categories.map(c => (
                <option key={c.key} value={c.key}>
                  {c.emoji} {c.label}
                </option>
              ))}
            </Select>

            <Input
              label="날짜"
              type="date"
              value={date}
              onChange={(e) => setDate(e.target.value)}
              error={errors.date}
            />

            <Input
              label="메모 (선택)"
              type="text"
              value={memo}
              onChange={(e) => setMemo(e.target.value)}
              placeholder="간단한 메모"
              maxLength={60}
            />
            <div className="text-[10px] text-gray-400 -mt-1.5 text-right tabular-nums">
              {memo.length}/60
            </div>

            {submitError && (
              <div className="text-xs text-red-700 bg-red-50 border border-red-100 rounded-xl px-3 py-2">
                {submitError}
              </div>
            )}

            <Button
              type="submit"
              variant={isExpense ? 'primary' : 'success'}
              size="lg"
              className="mt-1 w-full"
              disabled={submitting}
            >
              {submitting
                ? '저장 중...'
                : isExpense ? '− 지출 추가' : '+ 수입 추가'}
            </Button>
          </form>
        </Card>
      );
    }

    // ---- Category Breakdown (donut chart, this month, expenses) ----
    function CategoryBreakdown({ transactions, ym }) {
      const stats = useMemo(() => {
        const filtered = transactions.filter(
          t => t.type === 'expense' && ymKey(t.date) === ym
        );
        const total = filtered.reduce((s, t) => s + t.amount, 0);
        const byCat = {};
        for (const t of filtered) {
          byCat[t.category] = (byCat[t.category] || 0) + t.amount;
        }
        const rows = Object.entries(byCat)
          .map(([key, amount]) => ({ key, amount, pct: total > 0 ? amount / total : 0 }))
          .sort((a, b) => b.amount - a.amount);
        return { total, rows };
      }, [transactions, ym]);

      // SVG donut config
      const SIZE = 132;
      const STROKE = 18;
      const RADIUS = (SIZE - STROKE) / 2;
      const CIRC = 2 * Math.PI * RADIUS;
      const CENTER = SIZE / 2;

      // Compute starting angle for each segment
      const segments = useMemo(() => {
        let cum = 0;
        return stats.rows.map(r => {
          const startAngle = cum * 360;
          cum += r.pct;
          return { ...r, startAngle };
        });
      }, [stats.rows]);

      return (
        <Card className="p-5">
          <div className="flex items-center justify-between gap-2">
            <h2 className="text-base font-semibold text-gray-900">카테고리별 지출</h2>
            <span className="inline-flex items-center gap-1 rounded-full bg-gray-100 px-2 py-0.5 text-[11px] font-medium text-gray-500">
              <svg width="10" height="10" viewBox="0 0 10 10" aria-hidden="true">
                <circle cx="5" cy="5" r="3.5" fill="none" stroke="currentColor" strokeWidth="1.5" />
              </svg>
              도넛 차트
            </span>
          </div>

          {stats.rows.length === 0 ? (
            <div className="mt-6 py-10 text-center text-sm text-gray-400">
              이번 달 지출 내역이 없어요
            </div>
          ) : (
            <div className="mt-5 flex items-center gap-4">
              {/* Donut */}
              <div className="relative shrink-0" style={{ width: SIZE, height: SIZE }}>
                <svg width={SIZE} height={SIZE} viewBox={`0 0 ${SIZE} ${SIZE}`}>
                  {/* Background ring */}
                  <circle
                    cx={CENTER} cy={CENTER} r={RADIUS}
                    fill="none" stroke="#f3f4f6" strokeWidth={STROKE}
                  />
                  {/* Segments */}
                  {segments.map(seg => {
                    const segLen = Math.max(seg.pct * CIRC, 0.01);
                    return (
                      <circle
                        key={seg.key}
                        cx={CENTER} cy={CENTER} r={RADIUS}
                        fill="none"
                        stroke={CATEGORY_HEX[seg.key] || '#9ca3af'}
                        strokeWidth={STROKE}
                        strokeDasharray={`${segLen} ${CIRC - segLen}`}
                        transform={`rotate(${seg.startAngle - 90} ${CENTER} ${CENTER})`}
                      />
                    );
                  })}
                </svg>
                {/* Center label */}
                <div className="absolute inset-0 flex flex-col items-center justify-center pointer-events-none">
                  <span className="text-[10px] text-gray-500">총 지출</span>
                  <span className="mt-0.5 text-[15px] font-bold text-gray-900 tabular-nums">
                    {formatCurrency(stats.total)}
                  </span>
                </div>
              </div>

              {/* Legend */}
              <ul className="flex-1 min-w-0 flex flex-col gap-2">
                {stats.rows.map(({ key, amount, pct }) => {
                  const c = getCategory('expense', key);
                  return (
                    <li key={key} className="flex items-center justify-between gap-2 fade-in">
                      <span className="flex items-center gap-1.5 min-w-0">
                        <span
                          className="w-2 h-2 rounded-full shrink-0"
                          style={{ background: CATEGORY_HEX[key] || '#9ca3af' }}
                          aria-hidden="true"
                        />
                        <span className="text-sm shrink-0" aria-hidden="true">{c.emoji}</span>
                        <span className="text-sm font-medium text-gray-800 truncate">{c.label}</span>
                      </span>
                      <span className="text-right shrink-0 leading-tight">
                        <span className="block text-xs font-semibold text-gray-900 tabular-nums">
                          {formatCurrency(amount)}
                        </span>
                        <span className="block text-[10px] text-gray-400 tabular-nums">
                          {(pct * 100).toFixed(1)}%
                        </span>
                      </span>
                    </li>
                  );
                })}
              </ul>
            </div>
          )}
        </Card>
      );
    }

    // ---- Monthly Calendar ----
    function MonthlyCalendar({ transactions, ym, selectedDate, onSelectDate }) {
      const cells = useMemo(() => {
        const [y, m] = ym.split('-').map(Number);
        const lastDay = new Date(y, m, 0).getDate();
        const startDow = new Date(y, m - 1, 1).getDay();
        const totalCells = Math.ceil((startDow + lastDay) / 7) * 7;

        // Aggregate per-date
        const byDate = {};
        for (const t of transactions) {
          if (ymKey(t.date) !== ym) continue;
          const d = byDate[t.date] || { income: 0, expense: 0, count: 0, cats: [] };
          d.count++;
          if (t.type === 'income') d.income += t.amount;
          else {
            d.expense += t.amount;
            if (!d.cats.includes(t.category)) d.cats.push(t.category);
          }
          byDate[t.date] = d;
        }

        const out = [];
        for (let i = 0; i < totalCells; i++) {
          const day = i - startDow + 1;
          if (day < 1 || day > lastDay) {
            out.push({ key: `pad-${i}`, empty: true, dow: i % 7 });
          } else {
            const iso = `${y}-${String(m).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
            const data = byDate[iso] || { income: 0, expense: 0, count: 0, cats: [] };
            out.push({ key: iso, iso, day, dow: i % 7, ...data });
          }
        }
        return out;
      }, [transactions, ym]);

      const today = todayISO();

      return (
        <Card className="p-4 sm:p-5">
          <div className="flex items-center justify-between gap-3">
            <div>
              <h2 className="text-base font-semibold text-gray-900">월별 캘린더</h2>
              <p className="text-xs text-gray-500 mt-0.5">날짜를 누르면 그날의 내역만 모아볼 수 있어요.</p>
            </div>
            {selectedDate && (
              <Button variant="ghost" size="sm" onClick={() => onSelectDate(null)}>
                전체 보기
              </Button>
            )}
          </div>

          {/* Weekday header */}
          <div className="mt-4 grid grid-cols-7 gap-1 sm:gap-1.5">
            {WEEKDAYS.map((w, i) => (
              <div
                key={w}
                className={`text-center text-[11px] font-semibold py-1.5
                            ${i === 0 ? 'text-red-500' : i === 6 ? 'text-sky-500' : 'text-gray-400'}`}
              >
                {w}
              </div>
            ))}
          </div>

          {/* Day cells */}
          <div className="grid grid-cols-7 gap-1 sm:gap-1.5">
            {cells.map(cell => {
              if (cell.empty) {
                return <div key={cell.key} className="aspect-[1/1] sm:aspect-[5/4]" />;
              }
              const isToday = cell.iso === today;
              const isSelected = cell.iso === selectedDate;
              const has = cell.count > 0;

              const dayColor = isToday
                ? '' // overridden by pill style below
                : cell.dow === 0
                  ? 'text-red-500'
                  : cell.dow === 6
                    ? 'text-sky-500'
                    : 'text-gray-700';

              return (
                <button
                  key={cell.key}
                  type="button"
                  onClick={() => onSelectDate(isSelected ? null : cell.iso)}
                  aria-label={`${cell.day}일${has ? ` · ${cell.count}건` : ''}`}
                  aria-pressed={isSelected}
                  className={`relative aspect-[1/1] sm:aspect-[5/4] rounded-xl p-1 sm:p-2
                              flex flex-col items-stretch text-left transition
                              focus:outline-none focus:ring-2 focus:ring-indigo-300
                              ${isSelected
                                ? 'bg-indigo-50 ring-2 ring-indigo-400'
                                : has
                                  ? 'bg-white hover:bg-gray-50 ring-1 ring-gray-100'
                                  : 'bg-gray-50/60 hover:bg-gray-100 ring-1 ring-transparent'}
                            `}
                >
                  {/* Day number */}
                  <div className="flex items-center justify-between">
                    {isToday ? (
                      <span className="inline-flex items-center justify-center w-5 h-5 rounded-full bg-indigo-600 text-white text-[11px] font-bold tabular-nums">
                        {cell.day}
                      </span>
                    ) : (
                      <span className={`text-xs font-semibold tabular-nums ${dayColor}`}>
                        {cell.day}
                      </span>
                    )}
                    {/* Category dots (top-right) */}
                    {has && cell.cats.length > 0 && (
                      <span className="hidden sm:flex items-center gap-0.5">
                        {cell.cats.slice(0, 3).map(cat => (
                          <span
                            key={cat}
                            className="w-1.5 h-1.5 rounded-full"
                            style={{ background: CATEGORY_HEX[cat] || '#9ca3af' }}
                            aria-hidden="true"
                          />
                        ))}
                      </span>
                    )}
                  </div>

                  {/* Amounts */}
                  {has && (
                    <div className="mt-auto flex flex-col items-end gap-0.5 leading-tight">
                      {cell.income > 0 && (
                        <span className="text-[10px] sm:text-[11px] font-semibold text-emerald-600 tabular-nums truncate max-w-full">
                          +{formatCompactKR(cell.income)}
                        </span>
                      )}
                      {cell.expense > 0 && (
                        <span className="text-[10px] sm:text-[11px] font-semibold text-red-500 tabular-nums truncate max-w-full">
                          −{formatCompactKR(cell.expense)}
                        </span>
                      )}
                    </div>
                  )}
                </button>
              );
            })}
          </div>
        </Card>
      );
    }

    // ---- Transaction List ----
    function TransactionList({ transactions, ym, selectedDate, onClearSelectedDate, onDelete }) {
      const [search, setSearch] = useState('');
      const [filter, setFilter] = useState('all'); // 'all' | 'income' | 'expense' | category key (e.g. 'cat:식비:expense')

      // Transactions for the selected month
      const monthly = useMemo(
        () => transactions.filter(t => ymKey(t.date) === ym),
        [transactions, ym]
      );

      // Categories actually present this month (for chip rendering)
      const monthCats = useMemo(() => {
        const seen = new Set();
        const list = [];
        for (const t of monthly) {
          const key = `${t.type}:${t.category}`;
          if (seen.has(key)) continue;
          seen.add(key);
          list.push({ type: t.type, key: t.category });
        }
        // Stable order: expense first, then income; alphabetical within
        list.sort((a, b) => {
          if (a.type !== b.type) return a.type === 'expense' ? -1 : 1;
          return a.key.localeCompare(b.key, 'ko');
        });
        return list;
      }, [monthly]);

      // Apply filter + search + selectedDate
      const filtered = useMemo(() => {
        return monthly.filter(t => {
          if (selectedDate && t.date !== selectedDate) return false;
          if (filter === 'income' && t.type !== 'income') return false;
          if (filter === 'expense' && t.type !== 'expense') return false;
          if (filter.startsWith('cat:')) {
            const [, cat, type] = filter.split(':');
            if (t.category !== cat || t.type !== type) return false;
          }
          if (search.trim()) {
            const q = search.trim().toLowerCase();
            if (!(t.memo || '').toLowerCase().includes(q)) return false;
          }
          return true;
        });
      }, [monthly, filter, search, selectedDate]);

      // Group by date desc
      const groups = useMemo(() => {
        const byDate = {};
        for (const t of filtered) {
          (byDate[t.date] ||= []).push(t);
        }
        const dates = Object.keys(byDate).sort((a, b) => (a < b ? 1 : -1));
        return dates.map(date => {
          const items = byDate[date].slice().sort((a, b) => b.id - a.id);
          const income = items.filter(i => i.type === 'income').reduce((s, i) => s + i.amount, 0);
          const expense = items.filter(i => i.type === 'expense').reduce((s, i) => s + i.amount, 0);
          return { date, items, income, expense };
        });
      }, [filtered]);

      return (
        <Card className="p-5">
          <div className="flex items-center justify-between gap-3 flex-wrap">
            <div className="flex items-center gap-2 min-w-0 flex-wrap">
              <h2 className="text-base font-semibold text-gray-900 shrink-0">전체 내역</h2>
              {selectedDate && (
                <span className="inline-flex items-center gap-1.5 rounded-full bg-indigo-50 text-indigo-700 px-2.5 py-1 text-xs font-medium ring-1 ring-inset ring-indigo-100">
                  <span aria-hidden="true">📍</span>
                  <span className="tabular-nums">{formatGroupDate(selectedDate)}</span>
                  <button
                    type="button"
                    onClick={onClearSelectedDate}
                    aria-label="날짜 선택 해제"
                    className="ml-0.5 -mr-0.5 inline-flex items-center justify-center w-4 h-4 rounded-full text-indigo-500 hover:text-indigo-800 hover:bg-indigo-100 transition"
                  >
                    <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
                      <path d="M2 2l6 6M8 2l-6 6" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round"/>
                    </svg>
                  </button>
                </span>
              )}
            </div>
            <span className="text-xs text-gray-500 tabular-nums shrink-0">
              {filtered.length}건
            </span>
          </div>

          {/* Search */}
          <div className="mt-4">
            <Input
              type="text"
              value={search}
              onChange={(e) => setSearch(e.target.value)}
              placeholder="메모로 검색"
              aria-label="메모 검색"
            />
          </div>

          {/* Filters */}
          <div className="mt-3 flex flex-wrap gap-1.5">
            <Chip active={filter === 'all'} onClick={() => setFilter('all')}>전체</Chip>
            <Chip active={filter === 'income'} onClick={() => setFilter('income')}>수입</Chip>
            <Chip active={filter === 'expense'} onClick={() => setFilter('expense')}>지출</Chip>
            {monthCats.map(({ type, key }) => {
              const c = getCategory(type, key);
              const v = `cat:${key}:${type}`;
              return (
                <Chip key={v} active={filter === v} onClick={() => setFilter(v)}>
                  <span>{c.emoji}</span>
                  <span>{c.label}</span>
                </Chip>
              );
            })}
          </div>

          {/* List */}
          <div className="mt-4 max-h-[520px] overflow-y-auto thin-scroll pr-1">
            {groups.length === 0 ? (
              <div className="py-16 text-center">
                <div className="text-4xl">🗒️</div>
                <p className="mt-3 text-sm text-gray-400">
                  {selectedDate ? '이 날짜의 내역이 없어요' : '표시할 내역이 없어요'}
                </p>
                {selectedDate && (
                  <button
                    type="button"
                    onClick={onClearSelectedDate}
                    className="mt-2 text-xs text-indigo-600 hover:text-indigo-700 font-medium"
                  >
                    전체 보기로 돌아가기
                  </button>
                )}
              </div>
            ) : (
              <div className="flex flex-col gap-5">
                {groups.map(group => (
                  <section key={group.date}>
                    <header
                      className="sticky top-0 z-10 bg-white/90 backdrop-blur
                                 -mx-1 px-1 py-1.5 flex items-center justify-between
                                 text-xs"
                    >
                      <span className="font-medium text-gray-700 tabular-nums">
                        {formatGroupDate(group.date)}
                      </span>
                      <span className="flex items-center gap-3 tabular-nums">
                        {group.income > 0 && (
                          <span className="text-emerald-600">{formatSignedCurrency(group.income, '+')}</span>
                        )}
                        {group.expense > 0 && (
                          <span className="text-red-600">{formatSignedCurrency(group.expense, '-')}</span>
                        )}
                      </span>
                    </header>
                    <ul className="mt-1 flex flex-col">
                      {group.items.map(t => (
                        <li
                          key={t.id}
                          className="fade-in group flex items-center gap-3 py-2.5 px-2 -mx-2
                                     rounded-xl hover:bg-gray-50 transition"
                        >
                          <Badge type={t.type} categoryKey={t.category} />
                          <div className="flex-1 min-w-0">
                            {t.memo ? (
                              <p className="text-sm text-gray-800 truncate">{t.memo}</p>
                            ) : (
                              <p className="text-sm text-gray-300">메모 없음</p>
                            )}
                          </div>
                          <div
                            className={`text-sm font-semibold tabular-nums whitespace-nowrap
                                        ${t.type === 'income' ? 'text-emerald-600' : 'text-red-600'}`}
                          >
                            {formatSignedCurrency(t.amount, t.type === 'income' ? '+' : '-')}
                          </div>
                          <button
                            type="button"
                            onClick={() => onDelete(t)}
                            aria-label="삭제"
                            className="opacity-0 group-hover:opacity-100 transition
                                       text-xs text-red-600 hover:text-red-700
                                       px-2 py-1 rounded-md hover:bg-red-50
                                       focus:opacity-100 focus:outline-none focus:ring-2 focus:ring-red-200"
                          >
                            삭제
                          </button>
                        </li>
                      ))}
                    </ul>
                  </section>
                ))}
              </div>
            )}
          </div>
        </Card>
      );
    }

    // ---- Confirm Delete Modal ----

    // ========================================
    // 🚀 App
    // ========================================
    function App() {
      const {
        transactions,
        loading,
        error,
        addTransaction: apiAddTransaction,
        deleteTransaction: apiDeleteTransaction,
        refetch,
      } = useTransactions();

      const [ym, setYm] = useState(currentYM());
      const [selectedDate, setSelectedDate] = useState(null);
      const [pendingDelete, setPendingDelete] = useState(null);
      const [deleting, setDeleting] = useState(false);

      // Clear selected date when month changes (if it's outside the new month)
      useEffect(() => {
        if (selectedDate && ymKey(selectedDate) !== ym) {
          setSelectedDate(null);
        }
      }, [ym, selectedDate]);

      // Monthly summary
      const summary = useMemo(() => {
        const monthly = transactions.filter(t => ymKey(t.date) === ym);
        const income = monthly.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);
        const expense = monthly.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0);
        return { income, expense, balance: income - expense };
      }, [transactions, ym]);

      const addTransaction = useCallback(async (data) => {
        await apiAddTransaction(data);
        // Snap month view to the new transaction's month and clear selection
        setYm(ymKey(data.date));
        setSelectedDate(null);
      }, [apiAddTransaction]);

      const requestDelete = useCallback((t) => setPendingDelete(t), []);
      const cancelDelete = useCallback(() => {
        if (deleting) return;
        setPendingDelete(null);
      }, [deleting]);

      const confirmDelete = useCallback(async () => {
        if (!pendingDelete || deleting) return;
        setDeleting(true);
        try {
          await apiDeleteTransaction(pendingDelete.id);
          setPendingDelete(null);
        } catch (err) {
          console.error('[deleteTransaction]', err);
          alert(err.message || '삭제에 실패했어요. 잠시 후 다시 시도해주세요.');
        } finally {
          setDeleting(false);
        }
      }, [pendingDelete, deleting, apiDeleteTransaction]);

      // Initial load: full-screen loading until first fetch resolves
      if (loading && transactions.length === 0 && !error) {
        return <LoadingScreen />;
      }
      // Initial load failed and no cached data: full-screen error
      if (error && transactions.length === 0) {
        return <ErrorScreen message={error} onRetry={refetch} />;
      }

      return (
        <div className="min-h-screen">
          <div className="max-w-6xl mx-auto px-4 sm:px-6 py-6 sm:py-10">
            {/* Header */}
            <header className="flex flex-wrap items-center justify-between gap-4">
              <div className="flex items-center gap-3">
                <div className="w-10 h-10 rounded-2xl bg-gradient-to-br from-indigo-500 to-violet-500 text-white flex items-center justify-center text-lg shadow-sm">
                  💸
                </div>
                <div>
                  <h1 className="text-xl sm:text-2xl font-bold tracking-tight text-gray-900">가계부</h1>
                  <p className="text-xs text-gray-500">하루의 작은 기록이 한 달의 큰 그림이 됩니다.</p>
                </div>
              </div>
              <MonthNavigator ym={ym} onChange={setYm} />
            </header>

            {/* Summary cards */}
            <section className="mt-6 grid grid-cols-1 sm:grid-cols-3 gap-3 sm:gap-4">
              <SummaryCard label="수입"  amount={summary.income}  tone="emerald" sign="+" />
              <SummaryCard label="지출"  amount={summary.expense} tone="red"     sign="-" />
              <SummaryCard
                label="잔액"
                amount={summary.balance}
                tone={summary.balance < 0 ? 'red' : 'indigo'}
                sign={summary.balance < 0 ? '-' : undefined}
              />
            </section>

            {/* Calendar (full width) */}
            <section className="mt-6">
              <MonthlyCalendar
                transactions={transactions}
                ym={ym}
                selectedDate={selectedDate}
                onSelectDate={setSelectedDate}
              />
            </section>

            {/* Main grid */}
            <section className="mt-6 grid grid-cols-1 lg:grid-cols-3 gap-4 sm:gap-6">
              <div className="lg:col-span-1 flex flex-col gap-4 sm:gap-6">
                <TransactionForm onAdd={addTransaction} />
                <CategoryBreakdown transactions={transactions} ym={ym} />
              </div>
              <div className="lg:col-span-2">
                <TransactionList
                  transactions={transactions}
                  ym={ym}
                  selectedDate={selectedDate}
                  onClearSelectedDate={() => setSelectedDate(null)}
                  onDelete={requestDelete}
                />
              </div>
            </section>

            {/* Footer */}
            <footer className="mt-10 text-center text-xs text-gray-400">
              © 2026 가계부 · 단일 파일 React 데모
            </footer>
          </div>

          <ConfirmDeleteModal
            target={pendingDelete}
            onCancel={cancelDelete}
            onConfirm={confirmDelete}
          />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
