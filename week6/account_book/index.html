<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>가계부</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", Roboto, "Helvetica Neue", Arial, sans-serif;
    }
    /* Subtle fade-in for list items */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-in {
      animation: fadeInUp 0.25s ease-out;
    }
    /* Custom scrollbar for long lists */
    .thin-scroll::-webkit-scrollbar { width: 6px; }
    .thin-scroll::-webkit-scrollbar-thumb {
      background-color: rgba(100,116,139,0.3);
      border-radius: 9999px;
    }
  </style>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo, useEffect, useRef, useCallback, createContext, useContext } = React;

    // ========================================
    // 🔧 API config
    // ========================================

    const API_BASE_URL = '/api';

    // ========================================
    // 🔧 Utils & Constants
    // ========================================

    const WEEKDAYS = ['일', '월', '화', '수', '목', '금', '토'];

    const EXPENSE_CATEGORIES = [
      { key: '식비',     emoji: '🍚', color: 'bg-orange-100 text-orange-700 ring-orange-200' },
      { key: '교통',     emoji: '🚌', color: 'bg-sky-100 text-sky-700 ring-sky-200' },
      { key: '쇼핑',     emoji: '🛍️', color: 'bg-pink-100 text-pink-700 ring-pink-200' },
      { key: '문화생활', emoji: '🎬', color: 'bg-violet-100 text-violet-700 ring-violet-200' },
      { key: '주거',     emoji: '🏠', color: 'bg-amber-100 text-amber-700 ring-amber-200' },
      { key: '의료',     emoji: '💊', color: 'bg-red-100 text-red-700 ring-red-200' },
      { key: '기타',     emoji: '🗂️', color: 'bg-gray-100 text-gray-700 ring-gray-200' },
    ];

    const INCOME_CATEGORIES = [
      { key: '급여',   emoji: '💼', color: 'bg-emerald-100 text-emerald-700 ring-emerald-200' },
      { key: '용돈',   emoji: '💝', color: 'bg-teal-100 text-teal-700 ring-teal-200' },
      { key: '기타',   emoji: '💰', color: 'bg-lime-100 text-lime-700 ring-lime-200' },
    ];

    const ALL_CATEGORIES = [
      ...EXPENSE_CATEGORIES,
      ...INCOME_CATEGORIES.filter(c => !EXPENSE_CATEGORIES.some(e => e.key === c.key)),
    ];

    function getCategoryMeta(key) {
      return ALL_CATEGORIES.find(c => c.key === key) || { key, emoji: '📌', color: 'bg-gray-100 text-gray-700 ring-gray-200' };
    }

    function formatCurrency(n) {
      return '₩' + Math.abs(n).toLocaleString('ko-KR');
    }

    function pad2(n) { return n < 10 ? '0' + n : '' + n; }

    function formatDateLong(dateStr) {
      // Parse as local midnight to avoid TZ drift
      const d = new Date(dateStr + 'T00:00:00');
      const y = d.getFullYear();
      const m = pad2(d.getMonth() + 1);
      const day = pad2(d.getDate());
      const w = WEEKDAYS[d.getDay()];
      return `${y}. ${m}. ${day}. (${w})`;
    }

    function ym(dateStr) {
      // dateStr: YYYY-MM-DD -> "YYYY-MM"
      return (dateStr || '').slice(0, 7);
    }

    function ymLabel(ymStr) {
      const [y, m] = ymStr.split('-');
      return `${y}년 ${parseInt(m, 10)}월`;
    }

    function addMonths(ymStr, delta) {
      const [y, m] = ymStr.split('-').map(Number);
      const d = new Date(y, m - 1 + delta, 1);
      return `${d.getFullYear()}-${pad2(d.getMonth() + 1)}`;
    }

    function todayStr() {
      const d = new Date();
      return `${d.getFullYear()}-${pad2(d.getMonth() + 1)}-${pad2(d.getDate())}`;
    }

    function currentYM() {
      const d = new Date();
      return `${d.getFullYear()}-${pad2(d.getMonth() + 1)}`;
    }

    // ========================================
    // 📡 useTransactions hook (backed by /api)
    // ========================================

    async function parseApiResponse(res) {
      let payload = null;
      try { payload = await res.json(); } catch (_e) {}
      if (!res.ok || !payload || payload.success === false) {
        const msg = (payload && payload.message) || `요청 실패 (${res.status})`;
        throw new Error(msg);
      }
      return payload.data;
    }

    function useTransactions() {
      const [transactions, setTransactions] = useState([]);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);

      const fetchAll = useCallback(async () => {
        setLoading(true);
        setError(null);
        try {
          const res = await fetch(`${API_BASE_URL}/transactions`);
          const data = await parseApiResponse(res);
          setTransactions(Array.isArray(data) ? data : []);
        } catch (err) {
          setError(err.message || '알 수 없는 오류가 발생했습니다.');
        } finally {
          setLoading(false);
        }
      }, []);

      useEffect(() => {
        fetchAll();
      }, [fetchAll]);

      const addTransaction = useCallback(async (payload) => {
        const res = await fetch(`${API_BASE_URL}/transactions`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });
        const created = await parseApiResponse(res);
        await fetchAll();
        return created;
      }, [fetchAll]);

      const deleteTransaction = useCallback(async (id) => {
        const res = await fetch(`${API_BASE_URL}/transactions/${id}`, {
          method: 'DELETE',
        });
        await parseApiResponse(res);
        await fetchAll();
      }, [fetchAll]);

      return {
        transactions,
        loading,
        error,
        addTransaction,
        deleteTransaction,
        refetch: fetchAll,
      };
    }

    // ========================================
    // 🎨 Design System Components
    // ========================================

    function Button({ variant = 'primary', size = 'md', className = '', children, ...props }) {
      const base = 'inline-flex items-center justify-center font-medium rounded-xl transition-colors focus:outline-none focus:ring-2 focus:ring-offset-1 disabled:opacity-50 disabled:cursor-not-allowed';
      const sizes = {
        sm: 'text-xs px-3 py-1.5',
        md: 'text-sm px-4 py-2',
        lg: 'text-base px-5 py-2.5',
      };
      const variants = {
        primary:   'bg-indigo-600 text-white hover:bg-indigo-700 focus:ring-indigo-400',
        secondary: 'bg-white text-gray-700 border border-gray-200 hover:bg-gray-50 focus:ring-gray-300',
        danger:    'bg-red-600 text-white hover:bg-red-700 focus:ring-red-400',
        ghost:     'bg-transparent text-gray-600 hover:bg-gray-100 focus:ring-gray-200',
        success:   'bg-emerald-600 text-white hover:bg-emerald-700 focus:ring-emerald-400',
      };
      return (
        <button className={`${base} ${sizes[size]} ${variants[variant]} ${className}`} {...props}>
          {children}
        </button>
      );
    }

    function Input({ label, error, className = '', id, ...props }) {
      const inputId = id || `in-${Math.random().toString(36).slice(2, 7)}`;
      return (
        <div className={className}>
          {label && (
            <label htmlFor={inputId} className="block text-xs font-medium text-gray-600 mb-1">
              {label}
            </label>
          )}
          <input
            id={inputId}
            className={`w-full px-3 py-2 text-sm bg-white border rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-300 focus:border-indigo-400 transition ${
              error ? 'border-red-300' : 'border-gray-200'
            }`}
            {...props}
          />
          {error && <p className="mt-1 text-xs text-red-500">{error}</p>}
        </div>
      );
    }

    function Select({ label, error, className = '', children, id, ...props }) {
      const selectId = id || `sel-${Math.random().toString(36).slice(2, 7)}`;
      return (
        <div className={className}>
          {label && (
            <label htmlFor={selectId} className="block text-xs font-medium text-gray-600 mb-1">
              {label}
            </label>
          )}
          <select
            id={selectId}
            className={`w-full px-3 py-2 text-sm bg-white border rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-300 focus:border-indigo-400 transition ${
              error ? 'border-red-300' : 'border-gray-200'
            }`}
            {...props}
          >
            {children}
          </select>
          {error && <p className="mt-1 text-xs text-red-500">{error}</p>}
        </div>
      );
    }

    function Card({ className = '', children }) {
      return (
        <div className={`bg-white rounded-2xl shadow-sm border border-gray-100 ${className}`}>
          {children}
        </div>
      );
    }

    function Badge({ category, className = '' }) {
      const meta = getCategoryMeta(category);
      return (
        <span className={`inline-flex items-center gap-1 px-2.5 py-0.5 rounded-full text-xs font-medium ring-1 ring-inset ${meta.color} ${className}`}>
          <span className="leading-none">{meta.emoji}</span>
          <span>{meta.key}</span>
        </span>
      );
    }

    function Chip({ active, onClick, children }) {
      return (
        <button
          type="button"
          onClick={onClick}
          className={`px-3 py-1.5 text-xs font-medium rounded-full transition-colors border ${
            active
              ? 'bg-indigo-600 text-white border-indigo-600'
              : 'bg-white text-gray-600 border-gray-200 hover:bg-gray-50'
          }`}
        >
          {children}
        </button>
      );
    }

    function Modal({ isOpen, onClose, title, children, size = 'md' }) {
      useEffect(() => {
        function onKey(e) {
          if (e.key === 'Escape') onClose?.();
        }
        if (isOpen) {
          document.addEventListener('keydown', onKey);
          return () => document.removeEventListener('keydown', onKey);
        }
      }, [isOpen, onClose]);

      if (!isOpen) return null;
      const widths = { sm: 'max-w-sm', md: 'max-w-md', lg: 'max-w-lg' };
      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center p-4">
          <div
            className="absolute inset-0 bg-black/30 backdrop-blur-sm"
            onClick={onClose}
            aria-hidden="true"
          />
          <div
            role="dialog"
            aria-modal="true"
            aria-labelledby="modal-title"
            className={`relative w-full ${widths[size]} bg-white rounded-2xl shadow-xl border border-gray-100 overflow-hidden`}
          >
            {title && (
              <div className="px-5 py-4 border-b border-gray-100">
                <h3 id="modal-title" className="text-base font-semibold text-gray-800">{title}</h3>
              </div>
            )}
            <div className="p-5">{children}</div>
          </div>
        </div>
      );
    }

    // ========================================
    // 🧩 Layout / Summary Components
    // ========================================

    function MonthNavigator({ ymStr, onPrev, onNext, onToday }) {
      const isCurrent = ymStr === currentYM();
      return (
        <div className="flex items-center gap-2">
          <Button variant="secondary" size="sm" onClick={onPrev} aria-label="이전 달">
            <span aria-hidden="true">←</span>
          </Button>
          <div className="px-3 py-1.5 min-w-[112px] text-center">
            <div className="text-lg font-semibold text-gray-800">{ymLabel(ymStr)}</div>
          </div>
          <Button variant="secondary" size="sm" onClick={onNext} aria-label="다음 달">
            <span aria-hidden="true">→</span>
          </Button>
          {!isCurrent && (
            <Button variant="ghost" size="sm" onClick={onToday} className="ml-1">
              오늘
            </Button>
          )}
        </div>
      );
    }

    function SummaryCard({ label, amount, tone = 'neutral' }) {
      const tones = {
        income:  { text: 'text-emerald-600', bg: 'bg-emerald-50', dot: 'bg-emerald-500' },
        expense: { text: 'text-red-500',     bg: 'bg-red-50',     dot: 'bg-red-500' },
        neutral: { text: amount >= 0 ? 'text-indigo-600' : 'text-red-500',
                   bg: 'bg-indigo-50', dot: 'bg-indigo-500' },
      };
      const t = tones[tone];
      return (
        <Card className="p-5">
          <div className="flex items-center gap-2 mb-2">
            <span className={`w-1.5 h-1.5 rounded-full ${t.dot}`}></span>
            <span className="text-xs text-gray-500">{label}</span>
          </div>
          <div className={`text-2xl font-bold tracking-tight ${t.text}`}>
            {tone === 'expense' && amount > 0 ? '−' : ''}
            {tone === 'income' && amount > 0 ? '+' : ''}
            {formatCurrency(amount)}
          </div>
        </Card>
      );
    }

    // ========================================
    // 🕓 Loading & Error states
    // ========================================

    function LoadingSkeleton() {
      return (
        <div className="space-y-6" aria-busy="true" aria-live="polite">
          <section className="grid grid-cols-1 sm:grid-cols-3 gap-3">
            {[0, 1, 2].map(i => (
              <Card key={i} className="p-5 animate-pulse">
                <div className="h-3 w-16 bg-gray-200 rounded mb-3" />
                <div className="h-7 w-32 bg-gray-200 rounded" />
              </Card>
            ))}
          </section>

          <main className="grid grid-cols-1 lg:grid-cols-3 gap-5">
            <div className="lg:col-span-1 space-y-5">
              <Card className="p-5 animate-pulse">
                <div className="h-4 w-24 bg-gray-200 rounded mb-4" />
                <div className="h-10 bg-gray-100 rounded-xl mb-3" />
                <div className="grid grid-cols-2 gap-3">
                  <div className="h-10 bg-gray-100 rounded-xl" />
                  <div className="h-10 bg-gray-100 rounded-xl" />
                  <div className="h-10 bg-gray-100 rounded-xl" />
                  <div className="h-10 bg-gray-100 rounded-xl" />
                </div>
              </Card>
              <Card className="p-5 animate-pulse">
                <div className="h-4 w-32 bg-gray-200 rounded mb-4" />
                <div className="space-y-3">
                  {[0, 1, 2, 3].map(i => (
                    <div key={i}>
                      <div className="h-3 w-full bg-gray-100 rounded mb-1.5" />
                      <div className="h-2 w-full bg-gray-100 rounded-full" />
                    </div>
                  ))}
                </div>
              </Card>
            </div>
            <div className="lg:col-span-2">
              <Card className="p-5 animate-pulse">
                <div className="h-4 w-24 bg-gray-200 rounded mb-4" />
                <div className="h-10 bg-gray-100 rounded-xl mb-3" />
                <div className="flex gap-2 mb-4">
                  {[0, 1, 2, 3].map(i => (
                    <div key={i} className="h-7 w-14 bg-gray-100 rounded-full" />
                  ))}
                </div>
                <div className="space-y-3">
                  {[0, 1, 2, 3, 4].map(i => (
                    <div key={i} className="flex items-center gap-3">
                      <div className="h-6 w-16 bg-gray-100 rounded-full" />
                      <div className="flex-1 h-4 bg-gray-100 rounded" />
                      <div className="h-4 w-20 bg-gray-100 rounded" />
                    </div>
                  ))}
                </div>
              </Card>
            </div>
          </main>
        </div>
      );
    }

    function ErrorCard({ message, onRetry }) {
      return (
        <div className="max-w-lg mx-auto mt-10">
          <Card className="p-6 text-center">
            <div className="text-4xl mb-2">😓</div>
            <h2 className="text-base font-semibold text-gray-800 mb-1">
              데이터를 불러오지 못했어요
            </h2>
            <p className="text-xs text-gray-500 mb-4">
              서버와 통신 중 문제가 발생했습니다.
            </p>
            <div className="p-3 bg-red-50 text-red-600 text-xs rounded-xl border border-red-100 mb-5 break-words">
              {message}
            </div>
            <div className="flex justify-center">
              <Button variant="primary" onClick={onRetry}>
                재시도
              </Button>
            </div>
          </Card>
        </div>
      );
    }

    // ========================================
    // 📄 Page: Add Transaction Form
    // ========================================

    function TransactionForm({ onAdd }) {
      const [type, setType] = useState('expense');
      const [amount, setAmount] = useState('');
      const [category, setCategory] = useState(EXPENSE_CATEGORIES[0].key);
      const [date, setDate] = useState(todayStr());
      const [memo, setMemo] = useState('');
      const [errors, setErrors] = useState({});
      const [submitting, setSubmitting] = useState(false);
      const [submitError, setSubmitError] = useState(null);

      const activeCategories = type === 'expense' ? EXPENSE_CATEGORIES : INCOME_CATEGORIES;

      // When type flips, snap category to the first valid one of that type
      useEffect(() => {
        if (!activeCategories.some(c => c.key === category)) {
          setCategory(activeCategories[0].key);
        }
        // eslint-disable-next-line
      }, [type]);

      function validate() {
        const e = {};
        const num = Number(amount);
        if (!amount || isNaN(num) || num <= 0) e.amount = '금액은 0보다 커야 합니다.';
        if (!date) e.date = '날짜를 입력해주세요.';
        setErrors(e);
        return Object.keys(e).length === 0;
      }

      async function handleSubmit(ev) {
        ev.preventDefault();
        if (submitting) return;
        if (!validate()) return;
        setSubmitError(null);
        setSubmitting(true);
        try {
          await onAdd({
            type,
            amount: Number(amount),
            category,
            date,
            memo: memo.trim(),
          });
          // reset form (keep type selection for convenience)
          setAmount('');
          setMemo('');
          setDate(todayStr());
          setErrors({});
        } catch (err) {
          setSubmitError(err.message || '저장에 실패했어요. 잠시 후 다시 시도해주세요.');
        } finally {
          setSubmitting(false);
        }
      }

      return (
        <Card className="p-5">
          <div className="flex items-center justify-between mb-4">
            <h2 className="text-sm font-semibold text-gray-800">내역 추가</h2>
          </div>

          <form onSubmit={handleSubmit} className="space-y-4">
            {/* Type toggle */}
            <div className="flex items-center p-1 bg-gray-100 rounded-xl w-fit">
              <button
                type="button"
                onClick={() => setType('expense')}
                className={`px-4 py-1.5 text-sm font-medium rounded-lg transition-colors ${
                  type === 'expense' ? 'bg-white shadow-sm text-red-600' : 'text-gray-500'
                }`}
                aria-pressed={type === 'expense'}
                disabled={submitting}
              >
                지출
              </button>
              <button
                type="button"
                onClick={() => setType('income')}
                className={`px-4 py-1.5 text-sm font-medium rounded-lg transition-colors ${
                  type === 'income' ? 'bg-white shadow-sm text-emerald-600' : 'text-gray-500'
                }`}
                aria-pressed={type === 'income'}
                disabled={submitting}
              >
                수입
              </button>
            </div>

            <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
              <Input
                type="number"
                label="금액"
                placeholder="0"
                value={amount}
                onChange={(e) => setAmount(e.target.value)}
                error={errors.amount}
                min="0"
                inputMode="numeric"
                disabled={submitting}
              />
              <Select
                label="카테고리"
                value={category}
                onChange={(e) => setCategory(e.target.value)}
                disabled={submitting}
              >
                {activeCategories.map(c => (
                  <option key={c.key} value={c.key}>
                    {c.emoji} {c.key}
                  </option>
                ))}
              </Select>
              <Input
                type="date"
                label="날짜"
                value={date}
                onChange={(e) => setDate(e.target.value)}
                error={errors.date}
                disabled={submitting}
              />
              <Input
                label="메모 (선택)"
                placeholder="예: 점심 식사"
                value={memo}
                onChange={(e) => setMemo(e.target.value)}
                maxLength={60}
                disabled={submitting}
              />
            </div>

            {submitError && (
              <div className="text-xs text-red-600 bg-red-50 border border-red-100 rounded-xl px-3 py-2">
                {submitError}
              </div>
            )}

            <div className="flex justify-end pt-1">
              <Button
                type="submit"
                variant={type === 'income' ? 'success' : 'primary'}
                disabled={submitting}
              >
                {submitting
                  ? '저장 중...'
                  : (type === 'income' ? '+ 수입 추가' : '− 지출 추가')}
              </Button>
            </div>
          </form>
        </Card>
      );
    }

    // ========================================
    // 📄 Page: Category Breakdown (pure Tailwind bars)
    // ========================================

    function CategoryBreakdown({ transactions }) {
      const breakdown = useMemo(() => {
        const expenses = transactions.filter(t => t.type === 'expense');
        const total = expenses.reduce((sum, t) => sum + Number(t.amount || 0), 0);
        const byCat = {};
        for (const t of expenses) {
          const amt = Number(t.amount || 0);
          byCat[t.category] = (byCat[t.category] || 0) + amt;
        }
        const rows = Object.entries(byCat)
          .map(([cat, amt]) => ({
            category: cat,
            amount: amt,
            pct: total > 0 ? (amt / total) * 100 : 0,
          }))
          .sort((a, b) => b.amount - a.amount);
        return { rows, total };
      }, [transactions]);

      // Color mapping for bars (aligned with badge colors)
      const barColors = {
        '식비':     'bg-orange-400',
        '교통':     'bg-sky-400',
        '쇼핑':     'bg-pink-400',
        '문화생활': 'bg-violet-400',
        '주거':     'bg-amber-400',
        '의료':     'bg-red-400',
        '기타':     'bg-gray-400',
      };

      return (
        <Card className="p-5">
          <div className="flex items-baseline justify-between mb-4">
            <h2 className="text-sm font-semibold text-gray-800">카테고리별 지출</h2>
            <span className="text-xs text-gray-400">
              총 {formatCurrency(breakdown.total)}
            </span>
          </div>

          {breakdown.rows.length === 0 ? (
            <div className="py-10 text-center text-sm text-gray-400">
              이번 달 지출 내역이 없어요.
            </div>
          ) : (
            <ul className="space-y-3">
              {breakdown.rows.map(row => (
                <li key={row.category}>
                  <div className="flex items-center justify-between text-xs mb-1.5">
                    <div className="flex items-center gap-1.5">
                      <span>{getCategoryMeta(row.category).emoji}</span>
                      <span className="font-medium text-gray-700">{row.category}</span>
                    </div>
                    <div className="flex items-center gap-2 tabular-nums">
                      <span className="text-gray-500">{row.pct.toFixed(1)}%</span>
                      <span className="font-semibold text-gray-800">{formatCurrency(row.amount)}</span>
                    </div>
                  </div>
                  <div className="w-full h-2 bg-gray-100 rounded-full overflow-hidden">
                    <div
                      className={`h-full rounded-full transition-all ${barColors[row.category] || 'bg-indigo-400'}`}
                      style={{ width: `${Math.max(row.pct, 2)}%` }}
                      role="progressbar"
                      aria-valuenow={row.pct}
                      aria-valuemin="0"
                      aria-valuemax="100"
                    />
                  </div>
                </li>
              ))}
            </ul>
          )}
        </Card>
      );
    }

    // ========================================
    // 📄 Page: Transaction List
    // ========================================

    function TransactionList({ transactions, onRequestDelete }) {
      const [filter, setFilter] = useState('all'); // 'all' | 'income' | 'expense' | category key
      const [search, setSearch] = useState('');

      const filtered = useMemo(() => {
        let list = transactions;
        if (filter === 'income') list = list.filter(t => t.type === 'income');
        else if (filter === 'expense') list = list.filter(t => t.type === 'expense');
        else if (filter !== 'all') list = list.filter(t => t.category === filter);

        const q = search.trim().toLowerCase();
        if (q) list = list.filter(t => (t.memo || '').toLowerCase().includes(q));

        // sort descending by date, then by id so ordering is stable
        return [...list].sort((a, b) => {
          if (a.date !== b.date) return a.date < b.date ? 1 : -1;
          return (a.id < b.id ? 1 : -1);
        });
      }, [transactions, filter, search]);

      const grouped = useMemo(() => {
        const g = {};
        for (const t of filtered) {
          (g[t.date] = g[t.date] || []).push(t);
        }
        return Object.entries(g); // already in descending date order due to pre-sort
      }, [filtered]);

      // Categories present in this month's data — so chips aren't overwhelming
      const presentCategories = useMemo(() => {
        const set = new Set(transactions.map(t => t.category));
        return ALL_CATEGORIES.filter(c => set.has(c.key));
      }, [transactions]);

      return (
        <Card className="p-5">
          <div className="flex items-center justify-between mb-4">
            <h2 className="text-sm font-semibold text-gray-800">전체 내역</h2>
            <span className="text-xs text-gray-400">{filtered.length}건</span>
          </div>

          {/* Search */}
          <div className="mb-3">
            <Input
              type="text"
              placeholder="메모 검색..."
              value={search}
              onChange={(e) => setSearch(e.target.value)}
            />
          </div>

          {/* Filter chips */}
          <div className="flex flex-wrap gap-2 mb-4">
            <Chip active={filter === 'all'} onClick={() => setFilter('all')}>전체</Chip>
            <Chip active={filter === 'income'} onClick={() => setFilter('income')}>수입</Chip>
            <Chip active={filter === 'expense'} onClick={() => setFilter('expense')}>지출</Chip>
            {presentCategories.map(c => (
              <Chip key={c.key} active={filter === c.key} onClick={() => setFilter(c.key)}>
                {c.emoji} {c.key}
              </Chip>
            ))}
          </div>

          {/* List */}
          {grouped.length === 0 ? (
            <div className="py-14 text-center">
              <div className="text-4xl mb-2">🗒️</div>
              <p className="text-sm text-gray-500">표시할 내역이 없어요.</p>
              <p className="text-xs text-gray-400 mt-1">필터나 검색어를 조정해보세요.</p>
            </div>
          ) : (
            <div className="space-y-6 max-h-[520px] overflow-y-auto thin-scroll pr-1">
              {grouped.map(([date, items]) => {
                const dayIncome = items.filter(i => i.type === 'income').reduce((s, i) => s + Number(i.amount || 0), 0);
                const dayExpense = items.filter(i => i.type === 'expense').reduce((s, i) => s + Number(i.amount || 0), 0);
                return (
                  <div key={date}>
                    <div className="flex items-baseline justify-between mb-2 sticky top-0 bg-white/90 backdrop-blur py-1 z-10">
                      <div className="text-xs font-semibold text-gray-600">
                        {formatDateLong(date)}
                      </div>
                      <div className="flex items-center gap-2 text-[11px]">
                        {dayIncome > 0 && (
                          <span className="text-emerald-600">+{formatCurrency(dayIncome)}</span>
                        )}
                        {dayExpense > 0 && (
                          <span className="text-red-500">−{formatCurrency(dayExpense)}</span>
                        )}
                      </div>
                    </div>
                    <ul className="divide-y divide-gray-100">
                      {items.map(t => (
                        <li
                          key={t.id}
                          className="py-2.5 flex items-center gap-3 fade-in group"
                        >
                          <Badge category={t.category} />
                          <div className="flex-1 min-w-0">
                            <p className="text-sm text-gray-800 truncate">
                              {t.memo || <span className="text-gray-400">메모 없음</span>}
                            </p>
                          </div>
                          <div className={`text-sm font-semibold tabular-nums ${
                            t.type === 'income' ? 'text-emerald-600' : 'text-red-500'
                          }`}>
                            {t.type === 'income' ? '+' : '−'}{formatCurrency(Number(t.amount || 0))}
                          </div>
                          <button
                            onClick={() => onRequestDelete(t)}
                            className="opacity-0 group-hover:opacity-100 transition-opacity text-gray-400 hover:text-red-500 text-xs px-2 py-1 rounded-lg hover:bg-red-50"
                            aria-label="삭제"
                          >
                            삭제
                          </button>
                        </li>
                      ))}
                    </ul>
                  </div>
                );
              })}
            </div>
          )}
        </Card>
      );
    }

    // ========================================
    // 🚀 App (root)
    // ========================================

    function App() {
      const {
        transactions,
        loading,
        error,
        addTransaction,
        deleteTransaction,
        refetch,
      } = useTransactions();

      const [viewYM, setViewYM] = useState(currentYM());
      const [pendingDelete, setPendingDelete] = useState(null);
      const [deleting, setDeleting] = useState(false);
      const [deleteError, setDeleteError] = useState(null);

      const monthTx = useMemo(
        () => transactions.filter(t => ym(t.date) === viewYM),
        [transactions, viewYM]
      );

      const { income, expense, balance } = useMemo(() => {
        const inc = monthTx
          .filter(t => t.type === 'income')
          .reduce((s, t) => s + Number(t.amount || 0), 0);
        const exp = monthTx
          .filter(t => t.type === 'expense')
          .reduce((s, t) => s + Number(t.amount || 0), 0);
        return { income: inc, expense: exp, balance: inc - exp };
      }, [monthTx]);

      async function handleAdd(payload) {
        const created = await addTransaction(payload);
        // jump view to the month of the newly added transaction
        const nextDate = (created && created.date) || payload.date;
        if (nextDate) setViewYM(ym(nextDate));
      }

      async function handleConfirmDelete() {
        if (!pendingDelete || deleting) return;
        setDeleteError(null);
        setDeleting(true);
        try {
          await deleteTransaction(pendingDelete.id);
          setPendingDelete(null);
        } catch (err) {
          setDeleteError(err.message || '삭제에 실패했어요. 잠시 후 다시 시도해주세요.');
        } finally {
          setDeleting(false);
        }
      }

      function closeDeleteModal() {
        if (deleting) return;
        setPendingDelete(null);
        setDeleteError(null);
      }

      return (
        <div className="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-6 lg:py-10">
          {/* Header */}
          <header className="mb-6 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
            <div>
              <h1 className="text-2xl font-bold text-gray-900 tracking-tight">
                <span className="inline-block mr-2">💰</span>가계부
              </h1>
              <p className="text-xs text-gray-500 mt-1">
                이번 달 수입과 지출을 한눈에 확인하세요.
              </p>
            </div>
            <MonthNavigator
              ymStr={viewYM}
              onPrev={() => setViewYM(addMonths(viewYM, -1))}
              onNext={() => setViewYM(addMonths(viewYM, +1))}
              onToday={() => setViewYM(currentYM())}
            />
          </header>

          {loading ? (
            <LoadingSkeleton />
          ) : error ? (
            <ErrorCard message={error} onRetry={refetch} />
          ) : (
            <>
              {/* Summary */}
              <section className="grid grid-cols-1 sm:grid-cols-3 gap-3 mb-6" aria-label="월간 요약">
                <SummaryCard label="총 수입" amount={income}  tone="income" />
                <SummaryCard label="총 지출" amount={expense} tone="expense" />
                <SummaryCard label="잔액"    amount={balance} tone="neutral" />
              </section>

              {/* Main Grid */}
              <main className="grid grid-cols-1 lg:grid-cols-3 gap-5">
                <div className="lg:col-span-1 space-y-5">
                  <TransactionForm onAdd={handleAdd} />
                  <CategoryBreakdown transactions={monthTx} />
                </div>
                <div className="lg:col-span-2">
                  <TransactionList
                    transactions={monthTx}
                    onRequestDelete={(t) => {
                      setDeleteError(null);
                      setPendingDelete(t);
                    }}
                  />
                </div>
              </main>
            </>
          )}

          <footer className="mt-10 text-center text-xs text-gray-400">
            <p>가계부 — React + Tailwind single-file demo</p>
          </footer>

          {/* Delete confirmation */}
          <Modal
            isOpen={!!pendingDelete}
            onClose={closeDeleteModal}
            title="내역 삭제"
            size="sm"
          >
            {pendingDelete && (
              <div>
                <p className="text-sm text-gray-600 mb-4">
                  아래 내역을 정말 삭제하시겠어요? 이 작업은 되돌릴 수 없어요.
                </p>
                <div className="p-3 bg-gray-50 rounded-xl border border-gray-100 mb-4">
                  <div className="flex items-center justify-between mb-1.5">
                    <Badge category={pendingDelete.category} />
                    <span className={`text-sm font-semibold ${
                      pendingDelete.type === 'income' ? 'text-emerald-600' : 'text-red-500'
                    }`}>
                      {pendingDelete.type === 'income' ? '+' : '−'}
                      {formatCurrency(Number(pendingDelete.amount || 0))}
                    </span>
                  </div>
                  <div className="text-xs text-gray-500">
                    {formatDateLong(pendingDelete.date)}
                    {pendingDelete.memo && ` · ${pendingDelete.memo}`}
                  </div>
                </div>

                {deleteError && (
                  <div className="text-xs text-red-600 bg-red-50 border border-red-100 rounded-xl px-3 py-2 mb-4">
                    {deleteError}
                  </div>
                )}

                <div className="flex justify-end gap-2">
                  <Button
                    variant="secondary"
                    onClick={closeDeleteModal}
                    disabled={deleting}
                  >
                    취소
                  </Button>
                  <Button
                    variant="danger"
                    onClick={handleConfirmDelete}
                    disabled={deleting}
                  >
                    {deleting ? '삭제 중...' : '삭제'}
                  </Button>
                </div>
              </div>
            )}
          </Modal>
        </div>
      );
    }

    // ========================================
    // Rendering
    // ========================================

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
