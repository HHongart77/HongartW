<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>이미지 업로드 테스트</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes toastIn {
      from { opacity: 0; transform: translate(-50%, 10px); }
      to   { opacity: 1; transform: translate(-50%, 0); }
    }
    .toast-anim { animation: toastIn 0.2s ease-out; }
  </style>
</head>
<body class="bg-slate-100 min-h-screen">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useRef, useCallback, useEffect } = React;

    // ========================================
    // ⚙️ Config
    // ========================================

    const API_BASE_URL = `${window.location.origin}/api`;
    const IMAGEKIT_UPLOAD_URL = 'https://upload.imagekit.io/api/v1/files/upload';

    // ========================================
    // 🎨 Design System Components
    // ========================================

    function Button({ variant = 'primary', size = 'md', disabled, onClick, children, className = '', title }) {
      const base = 'inline-flex items-center justify-center gap-1.5 font-medium rounded-lg transition-all disabled:opacity-50 disabled:cursor-not-allowed';
      const variants = {
        primary: 'bg-blue-600 hover:bg-blue-700 text-white',
        secondary: 'bg-slate-200 hover:bg-slate-300 text-slate-800',
        danger: 'bg-red-500 hover:bg-red-600 text-white',
        ghost: 'bg-transparent hover:bg-slate-100 text-slate-700',
      };
      const sizes = { sm: 'px-3 py-1.5 text-sm', md: 'px-4 py-2 text-sm', lg: 'px-6 py-3 text-base' };
      return (
        <button
          onClick={onClick}
          disabled={disabled}
          title={title}
          className={`${base} ${variants[variant]} ${sizes[size]} ${className}`}
        >
          {children}
        </button>
      );
    }

    function Card({ children, className = '' }) {
      return (
        <div className={`bg-white rounded-2xl shadow-sm border border-slate-200 p-6 ${className}`}>
          {children}
        </div>
      );
    }

    function Badge({ children, variant = 'default', title }) {
      const variants = {
        default: 'bg-slate-100 text-slate-700',
        success: 'bg-green-100 text-green-700',
        warning: 'bg-amber-100 text-amber-700',
        danger: 'bg-red-100 text-red-700',
        info: 'bg-blue-100 text-blue-700',
      };
      return (
        <span
          title={title}
          className={`inline-flex items-center gap-1 px-2 py-0.5 rounded text-xs font-medium ${variants[variant]}`}
        >
          {children}
        </span>
      );
    }

    function Toast({ message, onClose }) {
      useEffect(() => {
        if (!message) return;
        const t = setTimeout(onClose, 1800);
        return () => clearTimeout(t);
      }, [message, onClose]);

      if (!message) return null;
      return (
        <div className="fixed bottom-8 left-1/2 -translate-x-1/2 z-50 toast-anim">
          <div className="bg-slate-900/90 backdrop-blur text-white px-4 py-2 rounded-full text-sm shadow-lg">
            {message}
          </div>
        </div>
      );
    }

    // ========================================
    // 📤 ImageKit Upload Helpers
    // ========================================

    async function getImageKitAuth() {
      const res = await fetch(`${API_BASE_URL}/imagekit/auth`);
      if (!res.ok) throw new Error(`인증 요청 실패 (${res.status})`);
      const json = await res.json();
      if (!json?.success || !json?.data) throw new Error('인증 응답이 올바르지 않습니다.');
      return json.data;
    }

    async function uploadToImageKit(file) {
      const auth = await getImageKitAuth();
      const form = new FormData();
      form.append('file', file);
      form.append('fileName', file.name);
      form.append('publicKey', auth.publicKey);
      form.append('signature', auth.signature);
      form.append('expire', String(auth.expire));
      form.append('token', auth.token);

      const res = await fetch(IMAGEKIT_UPLOAD_URL, { method: 'POST', body: form });
      const json = await res.json().catch(() => ({}));
      if (!res.ok) {
        const msg = json?.message || `업로드 실패 (${res.status})`;
        throw new Error(msg);
      }
      return json; // { url, fileId, name, size, thumbnailUrl, ... }
    }

    // ========================================
    // 📄 ImageUploadPage
    // ========================================

    function formatBytes(bytes) {
      if (!bytes || bytes === 0) return '0 B';
      const k = 1024;
      const sizes = ['B', 'KB', 'MB', 'GB'];
      const i = Math.floor(Math.log(bytes) / Math.log(k));
      return `${(bytes / Math.pow(k, i)).toFixed(2)} ${sizes[i]}`;
    }

    function StatusBadge({ status, error }) {
      if (status === 'uploading') {
        return (
          <span className="inline-flex items-center gap-1.5 px-2 py-0.5 rounded text-xs font-medium bg-blue-600 text-white">
            <span className="spinner" />
            업로드 중…
          </span>
        );
      }
      if (status === 'success') {
        return <Badge variant="success">✅ 완료</Badge>;
      }
      if (status === 'error') {
        return (
          <Badge variant="danger" title={error || '에러'}>
            ❌ 실패
          </Badge>
        );
      }
      return null;
    }

    function ImageUploadPage() {
      const [images, setImages] = useState([]);
      const [isDragging, setIsDragging] = useState(false);
      const [toast, setToast] = useState('');
      const inputRef = useRef(null);

      // 개별 이미지 상태 업데이트
      const updateImage = useCallback((id, patch) => {
        setImages(prev => prev.map(img => (img.id === id ? { ...img, ...patch } : img)));
      }, []);

      // 업로드 실행 (개별 비동기)
      const startUpload = useCallback(async (item) => {
        try {
          const result = await uploadToImageKit(item.file);
          updateImage(item.id, {
            status: 'success',
            cdnUrl: result.url,
            fileId: result.fileId,
            thumbnailUrl: result.thumbnailUrl,
            name: result.name || item.name,
            size: result.size || item.size,
          });
        } catch (err) {
          updateImage(item.id, {
            status: 'error',
            error: err?.message || '알 수 없는 오류',
          });
        }
      }, [updateImage]);

      const addFiles = useCallback((fileList) => {
        const files = Array.from(fileList).filter(f => f.type.startsWith('image/'));
        if (!files.length) return;

        const newItems = files.map(file => ({
          id: `${Date.now()}-${Math.random().toString(36).slice(2, 8)}`,
          file,
          localUrl: URL.createObjectURL(file),
          name: file.name,
          size: file.size,
          type: file.type,
          status: 'uploading',
          cdnUrl: null,
          fileId: null,
          thumbnailUrl: null,
          error: null,
        }));

        setImages(prev => [...prev, ...newItems]);

        // 병렬 업로드
        newItems.forEach(item => { startUpload(item); });
      }, [startUpload]);

      const handleSelect = (e) => {
        if (e.target.files?.length) addFiles(e.target.files);
        e.target.value = '';
      };

      const handleDrop = (e) => {
        e.preventDefault();
        setIsDragging(false);
        if (e.dataTransfer.files?.length) addFiles(e.dataTransfer.files);
      };

      const handleRemove = (id) => {
        setImages(prev => {
          const target = prev.find(i => i.id === id);
          if (target?.localUrl) URL.revokeObjectURL(target.localUrl);
          return prev.filter(i => i.id !== id);
        });
      };

      const handleClearAll = () => {
        images.forEach(i => { if (i.localUrl) URL.revokeObjectURL(i.localUrl); });
        setImages([]);
      };

      const handleRetry = (item) => {
        updateImage(item.id, { status: 'uploading', error: null });
        startUpload(item);
      };

      const handleCopy = async (url) => {
        try {
          await navigator.clipboard.writeText(url);
          setToast('복사됨!');
        } catch {
          // fallback
          const ta = document.createElement('textarea');
          ta.value = url;
          document.body.appendChild(ta);
          ta.select();
          try { document.execCommand('copy'); setToast('복사됨!'); } catch { setToast('복사 실패'); }
          document.body.removeChild(ta);
        }
      };

      // cleanup on unmount
      useEffect(() => () => {
        images.forEach(i => { if (i.localUrl) URL.revokeObjectURL(i.localUrl); });
        // eslint-disable-next-line react-hooks/exhaustive-deps
      }, []);

      const totalSize = images.reduce((sum, i) => sum + (i.size || 0), 0);
      const successCount = images.filter(i => i.status === 'success').length;
      const uploadingCount = images.filter(i => i.status === 'uploading').length;
      const errorCount = images.filter(i => i.status === 'error').length;

      return (
        <div className="max-w-5xl mx-auto p-6 space-y-6">
          <header className="space-y-2">
            <h1 className="text-3xl font-bold text-slate-900">🖼️ ImageKit 업로드 테스트</h1>
            <p className="text-slate-500">
              클릭 또는 드래그&드롭으로 이미지를 선택하면 <span className="font-medium text-slate-700">ImageKit</span>에 자동 업로드됩니다.
            </p>
          </header>

          <Card>
            <div
              onClick={() => inputRef.current?.click()}
              onDragOver={(e) => { e.preventDefault(); setIsDragging(true); }}
              onDragLeave={() => setIsDragging(false)}
              onDrop={handleDrop}
              className={`cursor-pointer border-2 border-dashed rounded-xl p-10 text-center transition-all ${
                isDragging
                  ? 'border-blue-500 bg-blue-50'
                  : 'border-slate-300 hover:border-blue-400 hover:bg-slate-50'
              }`}
              role="button"
              tabIndex={0}
              aria-label="이미지 업로드 영역"
            >
              <div className="text-5xl mb-3">📤</div>
              <p className="text-slate-700 font-medium mb-1">
                {isDragging ? '여기에 놓아주세요' : '클릭하거나 이미지를 드래그해서 업로드하세요'}
              </p>
              <p className="text-xs text-slate-400">PNG, JPG, GIF, WEBP 등 · 여러 장 선택 가능 · 선택 즉시 ImageKit으로 업로드</p>
              <input
                ref={inputRef}
                type="file"
                accept="image/*"
                multiple
                onChange={handleSelect}
                className="hidden"
              />
            </div>
          </Card>

          <div className="flex flex-wrap items-center justify-between gap-3">
            <div className="flex flex-wrap items-center gap-2">
              <Badge variant="info">전체 {images.length}장</Badge>
              {uploadingCount > 0 && <Badge variant="warning">업로드 중 {uploadingCount}</Badge>}
              {successCount > 0 && <Badge variant="success">완료 {successCount}</Badge>}
              {errorCount > 0 && <Badge variant="danger">실패 {errorCount}</Badge>}
              <Badge>{formatBytes(totalSize)}</Badge>
            </div>
            {images.length > 0 && (
              <Button variant="danger" size="sm" onClick={handleClearAll}>
                전체 삭제
              </Button>
            )}
          </div>

          {images.length === 0 ? (
            <Card className="text-center py-12">
              <div className="text-4xl mb-2">🗂️</div>
              <p className="text-slate-500">아직 업로드된 이미지가 없습니다.</p>
            </Card>
          ) : (
            <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4">
              {images.map(img => {
                const displayUrl = img.cdnUrl || img.localUrl;
                return (
                  <Card key={img.id} className="p-3 space-y-2 flex flex-col">
                    <div className="relative aspect-square bg-slate-100 rounded-lg overflow-hidden">
                      <img
                        src={displayUrl}
                        alt={img.name}
                        className={`w-full h-full object-cover transition-opacity ${
                          img.status === 'uploading' ? 'opacity-60' : 'opacity-100'
                        }`}
                      />
                      <div className="absolute top-2 left-2">
                        <StatusBadge status={img.status} error={img.error} />
                      </div>
                      {img.status === 'uploading' && (
                        <div className="absolute inset-0 flex items-center justify-center pointer-events-none">
                          <div className="bg-black/40 text-white text-xs px-2 py-1 rounded">
                            업로드 중…
                          </div>
                        </div>
                      )}
                    </div>

                    <div className="space-y-1">
                      <p className="text-xs font-medium text-slate-800 truncate" title={img.name}>
                        {img.name}
                      </p>
                      <div className="flex items-center justify-between text-[11px] text-slate-500">
                        <span>{formatBytes(img.size)}</span>
                        <span className="uppercase">{(img.type || '').replace('image/', '')}</span>
                      </div>
                      {img.status === 'error' && (
                        <p
                          className="text-[11px] text-red-600 line-clamp-2"
                          title={img.error}
                        >
                          {img.error}
                        </p>
                      )}
                    </div>

                    {img.status === 'success' && img.cdnUrl && (
                      <div className="space-y-1.5">
                        <div className="flex items-center gap-1.5 bg-slate-50 border border-slate-200 rounded-md px-2 py-1">
                          <span className="text-[10px] text-slate-400 flex-shrink-0">URL</span>
                          <span
                            className="text-[11px] text-slate-700 truncate flex-1"
                            title={img.cdnUrl}
                          >
                            {img.cdnUrl}
                          </span>
                        </div>
                        <div className="grid grid-cols-2 gap-1.5">
                          <Button
                            variant="secondary"
                            size="sm"
                            className="!px-2 !py-1 !text-[11px]"
                            onClick={() => handleCopy(img.cdnUrl)}
                          >
                            📋 복사
                          </Button>
                          <a
                            href={img.cdnUrl}
                            target="_blank"
                            rel="noopener noreferrer"
                            className="inline-flex items-center justify-center gap-1 px-2 py-1 text-[11px] font-medium rounded-lg bg-slate-200 hover:bg-slate-300 text-slate-800 transition-all"
                          >
                            🔗 열기
                          </a>
                        </div>
                      </div>
                    )}

                    <div className="flex-1" />

                    <div className="flex gap-1.5">
                      {img.status === 'error' && (
                        <Button
                          variant="secondary"
                          size="sm"
                          className="flex-1 !text-[11px]"
                          onClick={() => handleRetry(img)}
                        >
                          재시도
                        </Button>
                      )}
                      <Button
                        variant="ghost"
                        size="sm"
                        className={`${img.status === 'error' ? 'flex-1' : 'w-full'} text-red-600 hover:bg-red-50 !text-[11px]`}
                        onClick={() => handleRemove(img.id)}
                      >
                        삭제
                      </Button>
                    </div>
                  </Card>
                );
              })}
            </div>
          )}

          <Toast message={toast} onClose={() => setToast('')} />
        </div>
      );
    }

    // ========================================
    // 🚀 App
    // ========================================

    function App() {
      return <ImageUploadPage />;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
