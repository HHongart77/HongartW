<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Midjourney</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    html, body { background: #191919; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans KR", sans-serif; }
    *::-webkit-scrollbar { width: 8px; height: 8px; }
    *::-webkit-scrollbar-track { background: transparent; }
    *::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
    *::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

    @keyframes shimmer {
      0% { background-position: -400px 0; }
      100% { background-position: 400px 0; }
    }
    .shimmer {
      background: linear-gradient(90deg, #252525 0%, #2f2f2f 50%, #252525 100%);
      background-size: 800px 100%;
      animation: shimmer 1.4s infinite linear;
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-in-up { animation: fadeInUp 0.35s ease-out; }

    @keyframes toastIn {
      from { opacity: 0; transform: translate(-50%, 10px); }
      to { opacity: 1; transform: translate(-50%, 0); }
    }
    .toast-in { animation: toastIn 0.25s ease-out; }

    .masonry { column-gap: 12px; }
    @media (min-width: 640px) { .masonry { column-count: 2; } }
    @media (min-width: 900px) { .masonry { column-count: 3; } }
    @media (min-width: 1280px) { .masonry { column-count: 4; } }
    @media (min-width: 1600px) { .masonry { column-count: 5; } }
    .masonry-item { break-inside: avoid; margin-bottom: 12px; }

    .glass {
      background: rgba(25,25,25,0.85);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      height: 4px;
      background: rgba(255,255,255,0.12);
      border-radius: 2px;
      outline: none;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 14px; height: 14px;
      border-radius: 50%;
      background: #fff;
      cursor: pointer;
      border: 2px solid #7c5cfc;
    }
    input[type="range"]::-moz-range-thumb {
      width: 14px; height: 14px;
      border-radius: 50%;
      background: #fff;
      cursor: pointer;
      border: 2px solid #7c5cfc;
    }

    .gradient-text {
      background: linear-gradient(135deg, #fff 0%, #b49dff 50%, #7c5cfc 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo, useCallback, createContext, useContext } = React;

    // ========================================
    // Constants & Utils
    // ========================================
    const STYLES = [
      { id: 'photorealistic', label: '사실적', icon: '📷',
        keyword: 'hyperrealistic photography, ultra-detailed, sharp focus, professional DSLR, natural lighting, 8k resolution' },
      { id: 'anime', label: '애니메이션', icon: '🎌',
        keyword: 'anime illustration style, Studio Ghibli inspired, vibrant colors, clean linework, detailed background, manga aesthetic' },
      { id: 'oil-painting', label: '유화', icon: '🎨',
        keyword: 'oil painting on canvas, impressionist brushstrokes, rich texture, painterly style, museum quality artwork, classical art' },
      { id: 'watercolor', label: '수채화', icon: '💧',
        keyword: 'delicate watercolor painting, soft washes, flowing pigments, translucent layers, paper texture, artistic illustration' },
      { id: 'pixel-art', label: '픽셀 아트', icon: '👾',
        keyword: 'pixel art style, 16-bit retro game aesthetic, isometric view, vibrant palette, crisp pixels, indie game art' },
      { id: 'cinematic', label: '시네마틱', icon: '🎬',
        keyword: 'cinematic photography, dramatic lighting, movie still, anamorphic lens bokeh, color graded, epic composition, film look' },
      { id: 'abstract', label: '추상화', icon: '🌀',
        keyword: 'abstract expressionism, bold geometric shapes, dynamic composition, vivid contrasting colors, modern art, creative interpretation' },
      { id: 'fantasy', label: '판타지', icon: '🐉',
        keyword: 'epic fantasy digital art, intricate details, magical atmosphere, otherworldly lighting, concept art style, highly detailed' },
    ];

    const ASPECT_RATIOS = [
      { id: '1:1', label: '1:1', w: 640, h: 640 },
      { id: '16:9', label: '16:9', w: 896, h: 504 },
      { id: '4:3', label: '4:3', w: 800, h: 600 },
      { id: '9:16', label: '9:16', w: 504, h: 896 },
      { id: '3:2', label: '3:2', w: 840, h: 560 },
    ];

    const ACCENT_COLORS = [
      { id: 'purple', label: '퍼플', value: '#7c5cfc' },
      { id: 'pink', label: '핑크', value: '#ec4899' },
      { id: 'blue', label: '블루', value: '#3b82f6' },
      { id: 'green', label: '그린', value: '#10b981' },
    ];

    const STORAGE = {
      GALLERY: 'mj_gallery',
      FAVORITES: 'mj_favorites',
      HISTORY: 'mj_history',
      SETTINGS: 'mj_settings',
    };

    const loadLS = (key, fallback) => {
      try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; }
      catch { return fallback; }
    };
    const saveLS = (key, val) => {
      try { localStorage.setItem(key, JSON.stringify(val)); } catch {}
    };

    const uid = () => Math.random().toString(36).slice(2, 10) + Date.now().toString(36);

    const formatTime = (ts) => {
      const d = new Date(ts);
      const diff = (Date.now() - ts) / 1000;
      if (diff < 60) return '방금 전';
      if (diff < 3600) return `${Math.floor(diff/60)}분 전`;
      if (diff < 86400) return `${Math.floor(diff/3600)}시간 전`;
      return `${d.getMonth()+1}월 ${d.getDate()}일`;
    };

    // ========================================
    // Toast Context
    // ========================================
    const ToastContext = createContext(null);

    function ToastProvider({ children }) {
      const [toasts, setToasts] = useState([]);
      const show = useCallback((msg) => {
        const id = uid();
        setToasts(t => [...t, { id, msg }]);
        setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 2400);
      }, []);
      return (
        <ToastContext.Provider value={show}>
          {children}
          <div className="fixed top-5 left-1/2 -translate-x-1/2 z-[100] flex flex-col gap-2 pointer-events-none">
            {toasts.map(t => (
              <div key={t.id} className="toast-in px-4 py-2.5 rounded-lg bg-[#252525] border border-white/10 shadow-2xl text-sm text-white pointer-events-auto">
                {t.msg}
              </div>
            ))}
          </div>
        </ToastContext.Provider>
      );
    }
    const useToast = () => useContext(ToastContext);

    // ========================================
    // Design System
    // ========================================
    function Button({ children, variant = 'primary', size = 'md', className = '', disabled, onClick, type = 'button', title }) {
      const base = 'inline-flex items-center justify-center gap-2 font-medium rounded-lg transition-all duration-150 disabled:opacity-40 disabled:cursor-not-allowed';
      const sizes = { sm: 'px-2.5 py-1.5 text-xs', md: 'px-3.5 py-2 text-sm', lg: 'px-5 py-2.5 text-base' };
      const variants = {
        primary: 'bg-white text-black hover:bg-white/90 active:bg-white/80',
        secondary: 'bg-[#2f2f2f] text-white hover:bg-[#3a3a3a] border border-white/10',
        ghost: 'bg-transparent text-white/80 hover:bg-white/5',
        danger: 'bg-red-600 text-white hover:bg-red-700',
        accent: 'bg-[#7c5cfc] text-white hover:bg-[#6d4de6]',
      };
      return (
        <button type={type} title={title} disabled={disabled} onClick={onClick}
          className={`${base} ${sizes[size]} ${variants[variant]} ${className}`}>
          {children}
        </button>
      );
    }

    function IconBtn({ children, onClick, title, active = false, className = '' }) {
      return (
        <button onClick={onClick} title={title}
          className={`relative inline-flex items-center justify-center w-9 h-9 rounded-lg transition-colors ${active ? 'bg-white/10 text-white' : 'text-white/60 hover:text-white hover:bg-white/5'} ${className}`}>
          {children}
        </button>
      );
    }

    function Chip({ children, onRemove, className = '' }) {
      return (
        <span className={`inline-flex items-center gap-1.5 px-2 py-1 rounded-md bg-white/5 border border-white/10 text-xs text-white/80 ${className}`}>
          {children}
          {onRemove && (
            <button onClick={onRemove} className="ml-0.5 text-white/40 hover:text-white">×</button>
          )}
        </span>
      );
    }

    function Modal({ isOpen, onClose, title, children, size = 'md' }) {
      if (!isOpen) return null;
      const sizes = { sm: 'max-w-sm', md: 'max-w-lg', lg: 'max-w-2xl', xl: 'max-w-4xl' };
      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center p-4" onClick={onClose}>
          <div className="absolute inset-0 bg-black/70 backdrop-blur-sm"></div>
          <div onClick={e => e.stopPropagation()} className={`relative w-full ${sizes[size]} bg-[#1f1f1f] border border-white/10 rounded-xl shadow-2xl fade-in-up max-h-[90vh] flex flex-col`}>
            <div className="flex items-center justify-between px-5 py-4 border-b border-white/10">
              <h3 className="text-base font-semibold">{title}</h3>
              <button onClick={onClose} className="text-white/50 hover:text-white text-xl leading-none">×</button>
            </div>
            <div className="p-5 overflow-y-auto">{children}</div>
          </div>
        </div>
      );
    }

    // ========================================
    // Icons (inline SVG)
    // ========================================
    const Icon = {
      Sparkle: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 3l1.9 5.8L19.7 10l-5.8 1.9L12 17.7l-1.9-5.8L4.3 10l5.8-1.2z"/></svg>,
      Home: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 12l9-9 9 9"/><path d="M5 10v10h14V10"/></svg>,
      Image: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="9" r="2"/><path d="M21 15l-5-5L5 21"/></svg>,
      Star: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polygon points="12 2 15 8.5 22 9.3 17 14.1 18.2 21 12 17.8 5.8 21 7 14.1 2 9.3 9 8.5"/></svg>,
      StarFill: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><polygon points="12 2 15 8.5 22 9.3 17 14.1 18.2 21 12 17.8 5.8 21 7 14.1 2 9.3 9 8.5"/></svg>,
      Clock: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>,
      Settings: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 00.3 1.8l.1.1a2 2 0 11-2.8 2.8l-.1-.1a1.7 1.7 0 00-1.8-.3 1.7 1.7 0 00-1 1.5V21a2 2 0 01-4 0v-.1a1.7 1.7 0 00-1.1-1.5 1.7 1.7 0 00-1.8.3l-.1.1a2 2 0 11-2.8-2.8l.1-.1a1.7 1.7 0 00.3-1.8 1.7 1.7 0 00-1.5-1H3a2 2 0 010-4h.1a1.7 1.7 0 001.5-1.1 1.7 1.7 0 00-.3-1.8l-.1-.1a2 2 0 112.8-2.8l.1.1a1.7 1.7 0 001.8.3H9a1.7 1.7 0 001-1.5V3a2 2 0 014 0v.1a1.7 1.7 0 001 1.5 1.7 1.7 0 001.8-.3l.1-.1a2 2 0 112.8 2.8l-.1.1a1.7 1.7 0 00-.3 1.8V9a1.7 1.7 0 001.5 1H21a2 2 0 010 4h-.1a1.7 1.7 0 00-1.5 1z"/></svg>,
      Search: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>,
      Grid: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>,
      List: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><circle cx="3.5" cy="6" r="1"/><circle cx="3.5" cy="12" r="1"/><circle cx="3.5" cy="18" r="1"/></svg>,
      Paperclip: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 11.5l-8.5 8.5a5.5 5.5 0 01-7.8-7.8l9.2-9.2a3.7 3.7 0 115.2 5.2L9.9 17.3a1.8 1.8 0 11-2.6-2.6l7.6-7.6"/></svg>,
      Palette: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="13.5" cy="6.5" r="1.5"/><circle cx="17.5" cy="10.5" r="1.5"/><circle cx="8.5" cy="7.5" r="1.5"/><circle cx="6.5" cy="12.5" r="1.5"/><path d="M12 2a10 10 0 100 20c1.1 0 2-.9 2-2 0-.5-.2-1-.5-1.4-.4-.4-.5-.9-.5-1.4 0-1.1.9-2 2-2h2.4a5.6 5.6 0 005.6-5.6A10 10 0 0012 2z"/></svg>,
      Send: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M22 2L11 13"/><path d="M22 2l-7 20-4-9-9-4z"/></svg>,
      Download: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><path d="M7 10l5 5 5-5"/><path d="M12 15V3"/></svg>,
      Copy: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>,
      Maximize: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg>,
      Trash: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>,
      Plus: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
      X: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
    };

    // ========================================
    // Sidebar
    // ========================================
    const NAV_ITEMS = [
      { id: 'home', label: '홈', icon: Icon.Home },
      { id: 'my-images', label: '내 이미지', icon: Icon.Image },
      { id: 'favorites', label: '즐겨찾기', icon: Icon.Star },
      { id: 'history', label: '히스토리', icon: Icon.Clock },
      { id: 'settings', label: '설정', icon: Icon.Settings },
    ];

    function Sidebar({ active, onChange, accent }) {
      return (
        <>
          <aside className="hidden md:flex flex-col w-[240px] shrink-0 bg-[#111111] border-r border-white/5 h-screen sticky top-0">
            <div className="px-5 py-5 flex items-center gap-2.5">
              <div className="w-8 h-8 rounded-lg flex items-center justify-center text-white" style={{ background: `linear-gradient(135deg, ${accent}, #b49dff)` }}>
                <Icon.Sparkle/>
              </div>
              <span className="text-[15px] font-semibold gradient-text">My Midjourney</span>
            </div>
            <div className="h-px bg-white/5 mx-4 my-2"></div>
            <nav className="flex-1 px-3 py-2 space-y-0.5">
              {NAV_ITEMS.map(item => {
                const I = item.icon;
                const isActive = active === item.id;
                return (
                  <button key={item.id} onClick={() => onChange(item.id)}
                    className={`w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm transition-colors ${isActive ? 'bg-white/10 text-white' : 'text-white/60 hover:text-white hover:bg-white/5'}`}>
                    <I/>
                    <span>{item.label}</span>
                  </button>
                );
              })}
            </nav>
            <div className="p-4 border-t border-white/5">
              <div className="flex items-center gap-3 px-2 py-2 rounded-lg hover:bg-white/5 cursor-pointer">
                <div className="w-8 h-8 rounded-full bg-gradient-to-br from-purple-500 to-pink-500 flex items-center justify-center text-xs font-bold">U</div>
                <div className="flex-1 min-w-0">
                  <div className="text-sm font-medium truncate">게스트 유저</div>
                  <div className="text-[11px] text-white/40 truncate">로컬 저장소</div>
                </div>
              </div>
            </div>
          </aside>

          <nav className="md:hidden fixed bottom-0 inset-x-0 z-40 bg-[#111111] border-t border-white/5 flex justify-around px-2 py-2">
            {NAV_ITEMS.map(item => {
              const I = item.icon;
              const isActive = active === item.id;
              return (
                <button key={item.id} onClick={() => onChange(item.id)}
                  className={`flex flex-col items-center gap-0.5 px-3 py-1.5 rounded-md ${isActive ? 'text-white' : 'text-white/50'}`}>
                  <I/>
                  <span className="text-[10px]">{item.label}</span>
                </button>
              );
            })}
          </nav>
        </>
      );
    }

    // ========================================
    // TopBar
    // ========================================
    function TopBar({ search, onSearch, view, onView, styleFilter, onStyleFilter, title }) {
      const [openFilter, setOpenFilter] = useState(false);
      return (
        <div className="sticky top-0 z-20 bg-[#191919]/90 backdrop-blur-md border-b border-white/5 px-4 md:px-6 py-3 flex items-center gap-3">
          <h2 className="text-lg font-semibold mr-2 hidden sm:block">{title}</h2>
          <div className="flex-1 max-w-md relative">
            <div className="absolute left-3 top-1/2 -translate-y-1/2 text-white/40"><Icon.Search/></div>
            <input value={search} onChange={e => onSearch(e.target.value)} placeholder="검색..."
              className="w-full bg-[#252525] border border-white/5 rounded-lg pl-9 pr-3 py-2 text-sm placeholder:text-white/30 focus:outline-none focus:border-white/20"/>
          </div>
          <div className="relative">
            <Button variant="secondary" size="sm" onClick={() => setOpenFilter(o => !o)}>
              {styleFilter ? STYLES.find(s => s.id === styleFilter)?.label : '필터'}
              <span className="text-white/40">▾</span>
            </Button>
            {openFilter && (
              <>
                <div className="fixed inset-0 z-30" onClick={() => setOpenFilter(false)}></div>
                <div className="absolute right-0 top-full mt-2 z-40 w-44 bg-[#252525] border border-white/10 rounded-lg shadow-2xl py-1.5 fade-in-up">
                  <button onClick={() => { onStyleFilter(null); setOpenFilter(false); }}
                    className={`w-full text-left px-3 py-2 text-sm hover:bg-white/5 ${!styleFilter ? 'text-white' : 'text-white/70'}`}>
                    모든 스타일
                  </button>
                  {STYLES.map(s => (
                    <button key={s.id} onClick={() => { onStyleFilter(s.id); setOpenFilter(false); }}
                      className={`w-full text-left px-3 py-2 text-sm hover:bg-white/5 flex items-center gap-2 ${styleFilter === s.id ? 'text-white' : 'text-white/70'}`}>
                      <span>{s.icon}</span><span>{s.label}</span>
                    </button>
                  ))}
                </div>
              </>
            )}
          </div>
          <div className="flex items-center bg-[#252525] border border-white/5 rounded-lg p-0.5">
            <button onClick={() => onView('grid')} title="그리드 보기"
              className={`p-1.5 rounded ${view === 'grid' ? 'bg-white/10 text-white' : 'text-white/50'}`}><Icon.Grid/></button>
            <button onClick={() => onView('list')} title="리스트 보기"
              className={`p-1.5 rounded ${view === 'list' ? 'bg-white/10 text-white' : 'text-white/50'}`}><Icon.List/></button>
          </div>
        </div>
      );
    }

    // ========================================
    // Image Card
    // ========================================
    function ImageCard({ item, isFav, onToggleFav, onOpen, onCopyPrompt, onDownload, variantIndex }) {
      const [imgState, setImgState] = React.useState('loading'); // 'loading' | 'loaded' | 'error'

      return (
        <div className="masonry-item group relative overflow-hidden rounded-lg bg-[#252525] cursor-pointer transition-transform duration-200 hover:scale-[1.01] shadow-lg hover:shadow-2xl"
          onClick={() => imgState === 'loaded' && onOpen(item)}>

          {/* 로딩 스켈레톤 */}
          {imgState === 'loading' && (
            <div className="w-full shimmer" style={{ aspectRatio: '1/1', minHeight: 200 }}>
              <div className="w-full h-full flex flex-col items-center justify-center gap-2 text-white/20">
                <div className="w-6 h-6 border-2 border-white/20 border-t-white/60 rounded-full animate-spin"></div>
                <span className="text-[10px]">생성 중...</span>
              </div>
            </div>
          )}

          {/* 오류 상태 */}
          {imgState === 'error' && (
            <div className="w-full flex flex-col items-center justify-center gap-2 text-white/30 bg-[#1a1a1a]" style={{ aspectRatio: '1/1', minHeight: 200 }}>
              <span className="text-2xl">⚠️</span>
              <span className="text-[11px]">이미지 로드 실패</span>
              <button onClick={(e) => { e.stopPropagation(); setImgState('loading'); }}
                className="text-[10px] px-2 py-1 rounded bg-white/10 hover:bg-white/20 text-white/60">재시도</button>
            </div>
          )}

          <img
            src={item.url}
            alt={item.prompt}
            loading="lazy"
            onLoad={() => setImgState('loaded')}
            onError={() => setImgState('error')}
            className={`w-full block object-cover transition-opacity duration-300 ${imgState === 'loaded' ? 'opacity-100' : 'opacity-0 absolute inset-0'}`}
          />

          <div className="absolute top-2 left-2 px-2 py-0.5 rounded bg-black/60 backdrop-blur text-[10px] font-semibold text-white/90">
            U{variantIndex + 1}
          </div>

          {item.refs && item.refs.length > 0 && (
            <div className="absolute top-2 left-10 px-2 py-0.5 rounded bg-[#7c5cfc]/80 backdrop-blur text-[10px] font-semibold text-white">
              참조 {item.refs.length}
            </div>
          )}

          <button onClick={(e) => { e.stopPropagation(); onToggleFav(item.id); }}
            className={`absolute top-2 right-2 w-8 h-8 rounded-full flex items-center justify-center backdrop-blur transition-all ${isFav ? 'bg-yellow-400/90 text-black' : 'bg-black/50 text-white/80 opacity-0 group-hover:opacity-100 hover:bg-black/70'}`}>
            {isFav ? <Icon.StarFill/> : <Icon.Star/>}
          </button>

          <div className="absolute inset-x-0 bottom-0 p-3 bg-gradient-to-t from-black/90 via-black/50 to-transparent opacity-0 group-hover:opacity-100 transition-opacity">
            <p className="text-xs text-white/90 line-clamp-2 mb-2">{item.prompt}</p>
            <div className="flex items-center gap-1" onClick={e => e.stopPropagation()}>
              <button onClick={() => onDownload(item)} title="다운로드" className="px-2 py-1 rounded bg-white/10 hover:bg-white/20 text-white text-[11px] flex items-center gap-1"><Icon.Download/>다운로드</button>
              <button onClick={() => onCopyPrompt(item.prompt)} title="프롬프트 복사" className="px-2 py-1 rounded bg-white/10 hover:bg-white/20 text-white text-[11px] flex items-center gap-1"><Icon.Copy/>복사</button>
              <button onClick={() => onOpen(item)} title="확대" className="px-2 py-1 rounded bg-white/10 hover:bg-white/20 text-white text-[11px] flex items-center gap-1"><Icon.Maximize/></button>
            </div>
          </div>
        </div>
      );
    }

    function SkeletonCard({ aspect = 1 }) {
      const h = 240 / aspect;
      return <div className="masonry-item rounded-lg overflow-hidden shimmer" style={{ height: `${h}px` }}></div>;
    }

    // ========================================
    // Gallery
    // ========================================
    function Gallery({ items, favorites, onToggleFav, onOpen, onCopy, onDownload, generating, emptyMsg, view }) {
      if (generating > 0) {
        return (
          <div className="masonry px-4 md:px-6 py-4">
            {Array.from({ length: 4 }).map((_, i) => <SkeletonCard key={`sk-${i}`} aspect={[1, 16/9, 4/3, 3/2][i]}/>)}
            {items.map((item, i) => (
              <ImageCard key={item.id} item={item} variantIndex={i % 4}
                isFav={favorites.includes(item.id)}
                onToggleFav={onToggleFav} onOpen={onOpen} onCopyPrompt={onCopy} onDownload={onDownload}/>
            ))}
          </div>
        );
      }

      if (items.length === 0) {
        return (
          <div className="flex-1 flex flex-col items-center justify-center px-6 py-20 text-center">
            <div className="w-20 h-20 rounded-2xl bg-gradient-to-br from-[#7c5cfc]/20 to-pink-500/20 flex items-center justify-center mb-4 text-[#b49dff]">
              <Icon.Sparkle/>
            </div>
            <h3 className="text-lg font-semibold mb-1">{emptyMsg.title}</h3>
            <p className="text-sm text-white/50 max-w-xs">{emptyMsg.desc}</p>
          </div>
        );
      }

      if (view === 'list') {
        return (
          <div className="px-4 md:px-6 py-4 space-y-3">
            {items.map((item) => (
              <div key={item.id} onClick={() => onOpen(item)}
                className="flex gap-4 p-3 bg-[#252525] hover:bg-[#2f2f2f] rounded-lg cursor-pointer border border-white/5">
                <img src={item.url} alt="" className="w-24 h-24 rounded object-cover shrink-0"/>
                <div className="flex-1 min-w-0">
                  <p className="text-sm text-white line-clamp-2">{item.prompt}</p>
                  <div className="mt-2 flex items-center gap-2 text-xs text-white/50 flex-wrap">
                    <span>{formatTime(item.timestamp)}</span>
                    {item.style && <span className="px-2 py-0.5 rounded bg-white/5">{STYLES.find(s => s.id === item.style)?.label}</span>}
                    {item.refs && item.refs.length > 0 && <span className="px-2 py-0.5 rounded bg-[#7c5cfc]/20 text-[#b49dff]">참조 {item.refs.length}</span>}
                  </div>
                </div>
                <button onClick={(e) => { e.stopPropagation(); onToggleFav(item.id); }}
                  className={`shrink-0 w-8 h-8 rounded-full flex items-center justify-center ${favorites.includes(item.id) ? 'text-yellow-400' : 'text-white/40 hover:text-white'}`}>
                  {favorites.includes(item.id) ? <Icon.StarFill/> : <Icon.Star/>}
                </button>
              </div>
            ))}
          </div>
        );
      }

      return (
        <div className="masonry px-4 md:px-6 py-4">
          {items.map((item, i) => (
            <ImageCard key={item.id} item={item} variantIndex={i % 4}
              isFav={favorites.includes(item.id)}
              onToggleFav={onToggleFav} onOpen={onOpen} onCopyPrompt={onCopy} onDownload={onDownload}/>
          ))}
        </div>
      );
    }

    // ========================================
    // Prompt Bar (key feature)
    // ========================================
    function PromptBar({ onGenerate, generating, defaultStyle, useOpenAI }) {
      const [text, setText] = useState('');
      const [style, setStyle] = useState(defaultStyle || null);
      const [aspect, setAspect] = useState('1:1');
      const [refs, setRefs] = useState([]);
      const [refWeight, setRefWeight] = useState(50);
      const [refUrl, setRefUrl] = useState('');
      const [openPanel, setOpenPanel] = useState(null);
      const toast = useToast();
      const fileRef = useRef(null);

      const addRef = useCallback(() => {
        const url = refUrl.trim();
        if (!url) return;
        if (refs.length >= 3) { toast('최대 3개까지만 추가할 수 있습니다'); return; }
        setRefs(r => [...r, { url, id: uid() }]);
        setRefUrl('');
        toast('참조 이미지가 추가되었습니다');
      }, [refUrl, refs.length, toast]);

      const removeRef = (id) => setRefs(r => r.filter(x => x.id !== id));

      const handlePaste = (e) => {
        const items = e.clipboardData?.items;
        if (!items) return;
        for (const it of items) {
          if (it.type.indexOf('image') === 0) {
            const file = it.getAsFile();
            const reader = new FileReader();
            reader.onload = (ev) => {
              if (refs.length >= 3) { toast('최대 3개까지만 추가할 수 있습니다'); return; }
              setRefs(r => [...r, { url: ev.target.result, id: uid() }]);
              toast('붙여넣은 이미지가 추가되었습니다');
            };
            reader.readAsDataURL(file);
            e.preventDefault();
            return;
          }
        }
      };

      const handleFile = (e) => {
        const file = e.target.files?.[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
          if (refs.length >= 3) { toast('최대 3개까지만 추가할 수 있습니다'); return; }
          setRefs(r => [...r, { url: ev.target.result, id: uid() }]);
          toast('참조 이미지가 추가되었습니다');
        };
        reader.readAsDataURL(file);
        e.target.value = '';
      };

      const handleSubmit = () => {
        if (!text.trim()) { toast('프롬프트를 입력해주세요'); return; }
        if (generating) return;
        onGenerate({ text: text.trim(), style, aspect, refs, refWeight });
        setText('');
      };

      const handleKey = (e) => {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSubmit(); }
      };

      const currentStyle = STYLES.find(s => s.id === style);

      return (
        <div className="sticky bottom-0 pb-16 md:pb-0 z-30 pointer-events-none">
          <div className="relative pointer-events-auto">
            {openPanel === 'refs' && (
              <div className="absolute bottom-full left-4 right-4 md:left-6 md:right-auto md:w-[420px] mb-2 fade-in-up">
                <div className="bg-[#1f1f1f] border border-white/10 rounded-xl shadow-2xl p-4">
                  <div className="flex items-center justify-between mb-3">
                    <h4 className="text-sm font-semibold">이미지 참조 추가</h4>
                    <button onClick={() => setOpenPanel(null)} className="text-white/40 hover:text-white"><Icon.X/></button>
                  </div>
                  <div className="flex gap-2 mb-3">
                    <input value={refUrl} onChange={e => setRefUrl(e.target.value)} onPaste={handlePaste}
                      onKeyDown={e => e.key === 'Enter' && (e.preventDefault(), addRef())}
                      placeholder="이미지 URL 또는 드래그앤드롭 (예: https://...jpg)"
                      className="flex-1 bg-[#252525] border border-white/10 rounded-lg px-3 py-2 text-xs placeholder:text-white/30 focus:outline-none focus:border-white/20"/>
                    <Button size="sm" variant="secondary" onClick={addRef}>URL 추가</Button>
                  </div>
                  <button onClick={() => fileRef.current?.click()}
                    className="w-full mb-3 px-3 py-2 rounded-lg border border-dashed border-white/15 text-xs text-white/60 hover:text-white hover:border-white/30">
                    또는 파일 업로드 (클릭)
                  </button>
                  <input ref={fileRef} type="file" accept="image/*" onChange={handleFile} className="hidden"/>
                  <div className="mb-3">
                    <div className="flex items-center justify-between mb-1.5">
                      <span className="text-xs text-white/60">참조 강도 (--iw)</span>
                      <span className="text-xs font-mono text-white">{refWeight}%</span>
                    </div>
                    <input type="range" min="0" max="100" value={refWeight}
                      onChange={e => setRefWeight(parseInt(e.target.value))}
                      className="w-full"/>
                  </div>
                  <div>
                    <div className="text-xs text-white/60 mb-2">추가된 참조 이미지 ({refs.length}/3)</div>
                    <div className="flex flex-wrap gap-2">
                      {refs.map(r => (
                        <div key={r.id} className="relative w-16 h-16 rounded-lg overflow-hidden border border-white/10 group">
                          <img src={r.url} alt="" className="w-full h-full object-cover"/>
                          <button onClick={() => removeRef(r.id)}
                            className="absolute top-0.5 right-0.5 w-5 h-5 rounded-full bg-black/80 text-white flex items-center justify-center opacity-0 group-hover:opacity-100">
                            <Icon.X/>
                          </button>
                        </div>
                      ))}
                      {refs.length < 3 && (
                        <button onClick={() => fileRef.current?.click()}
                          className="w-16 h-16 rounded-lg border border-dashed border-white/15 flex items-center justify-center text-white/40 hover:text-white hover:border-white/30">
                          <Icon.Plus/>
                        </button>
                      )}
                    </div>
                  </div>
                </div>
              </div>
            )}

            {openPanel === 'style' && (
              <div className="absolute bottom-full left-4 md:left-6 mb-2 fade-in-up">
                <div className="bg-[#1f1f1f] border border-white/10 rounded-xl shadow-2xl p-2 grid grid-cols-2 gap-1 w-64">
                  <button onClick={() => { setStyle(null); setOpenPanel(null); }}
                    className={`col-span-2 px-3 py-2 text-left text-xs rounded hover:bg-white/5 ${!style ? 'text-white bg-white/5' : 'text-white/70'}`}>
                    스타일 없음
                  </button>
                  {STYLES.map(s => (
                    <button key={s.id} onClick={() => { setStyle(s.id); setOpenPanel(null); }}
                      className={`px-3 py-2 text-left text-xs rounded hover:bg-white/5 flex items-center gap-2 ${style === s.id ? 'text-white bg-white/5' : 'text-white/70'}`}>
                      <span>{s.icon}</span><span>{s.label}</span>
                    </button>
                  ))}
                </div>
              </div>
            )}

            {openPanel === 'aspect' && (
              <div className="absolute bottom-full left-4 md:left-[170px] mb-2 fade-in-up">
                <div className="bg-[#1f1f1f] border border-white/10 rounded-xl shadow-2xl p-1.5 w-32">
                  {ASPECT_RATIOS.map(a => (
                    <button key={a.id} onClick={() => { setAspect(a.id); setOpenPanel(null); }}
                      className={`w-full px-3 py-2 text-left text-xs rounded hover:bg-white/5 ${aspect === a.id ? 'text-white bg-white/5' : 'text-white/70'}`}>
                      {a.label}
                    </button>
                  ))}
                </div>
              </div>
            )}

            <div className="mx-3 md:mx-6 mb-3 md:mb-4">
              <div className="glass border border-white/10 rounded-2xl shadow-2xl p-2">
                {refs.length > 0 && (
                  <div className="flex items-center gap-1.5 px-2 pt-1 pb-2 border-b border-white/5 mb-2">
                    <span className="text-[10px] text-white/50 mr-1">참조:</span>
                    {refs.map(r => (
                      <div key={r.id} className="relative w-8 h-8 rounded overflow-hidden border border-white/10 group">
                        <img src={r.url} alt="" className="w-full h-full object-cover"/>
                        <button onClick={() => removeRef(r.id)}
                          className="absolute inset-0 bg-black/60 text-white flex items-center justify-center opacity-0 group-hover:opacity-100">
                          <Icon.X/>
                        </button>
                      </div>
                    ))}
                    <span className="text-[10px] text-white/40 ml-1 font-mono">--iw {(refWeight/100).toFixed(2)}</span>
                  </div>
                )}

                <div className="flex items-center gap-1">
                  <IconBtn onClick={() => setOpenPanel(p => p === 'refs' ? null : 'refs')} title="이미지 참조" active={openPanel === 'refs' || refs.length > 0}>
                    <Icon.Paperclip/>
                    {refs.length > 0 && <span className="absolute -top-0.5 -right-0.5 w-4 h-4 rounded-full bg-[#7c5cfc] text-[9px] flex items-center justify-center text-white">{refs.length}</span>}
                  </IconBtn>
                  <IconBtn onClick={() => setOpenPanel(p => p === 'style' ? null : 'style')} title="스타일" active={openPanel === 'style' || !!style}>
                    {currentStyle ? <span className="text-base">{currentStyle.icon}</span> : <Icon.Palette/>}
                  </IconBtn>
                  <IconBtn onClick={() => setOpenPanel(p => p === 'aspect' ? null : 'aspect')} title="비율" active={openPanel === 'aspect'}>
                    <span className="text-[10px] font-mono font-semibold">{aspect}</span>
                  </IconBtn>

                  <div className="w-px h-6 bg-white/10 mx-1"></div>

                  <input value={text} onChange={e => setText(e.target.value)} onKeyDown={handleKey}
                    placeholder="프롬프트를 입력하세요..."
                    className="flex-1 bg-transparent px-2 py-2 text-sm text-white placeholder:text-white/30 focus:outline-none min-w-0"/>

                  {/* 모드 배지 */}
                  <span className={`hidden md:flex shrink-0 text-[10px] px-2 py-0.5 rounded-full border items-center gap-1 ${useOpenAI ? 'border-purple-500/40 bg-purple-500/10 text-purple-400' : 'border-white/10 bg-white/5 text-white/30'}`}>
                    {useOpenAI ? '⚡ DALL-E 3' : '🎲 데모'}
                  </span>

                  <Button onClick={handleSubmit} disabled={generating || !text.trim()} variant="primary" size="md" className="shrink-0">
                    {generating ? (
                      <><span className="inline-block w-3 h-3 border-2 border-black border-t-transparent rounded-full animate-spin"></span>생성중</>
                    ) : (
                      <><Icon.Send/>생성</>
                    )}
                  </Button>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ========================================
    // Detail Modal
    // ========================================
    function DetailModal({ item, isOpen, onClose, onCopy, onDownload, onToggleFav, isFav, onDelete }) {
      if (!item) return null;
      return (
        <Modal isOpen={isOpen} onClose={onClose} title="이미지 상세" size="xl">
          <div className="grid md:grid-cols-[1fr_300px] gap-5">
            <div className="rounded-lg overflow-hidden bg-black">
              <img src={item.url} alt="" className="w-full h-auto max-h-[70vh] object-contain"/>
            </div>
            <div className="space-y-4">
              <div>
                <div className="text-xs text-white/50 mb-1.5">입력 프롬프트</div>
                <p className="text-sm text-white leading-relaxed">{item.prompt}</p>
              </div>
              {item.translatedPrompt && (
                <div>
                  <div className="text-xs text-white/50 mb-1.5">🌐 번역된 프롬프트 (실제 사용)</div>
                  <p className="text-[11px] text-white/40 leading-relaxed bg-white/5 rounded-lg p-2">{item.translatedPrompt}</p>
                </div>
              )}
              {item.revisedPrompt && (
                <div>
                  <div className="text-xs text-white/50 mb-1.5">⚡ DALL-E 3 확장 프롬프트</div>
                  <p className="text-[11px] text-white/40 leading-relaxed bg-white/5 rounded-lg p-2">{item.revisedPrompt}</p>
                </div>
              )}
              <div className="flex flex-wrap gap-1.5">
                {item.style && <Chip>{STYLES.find(s => s.id === item.style)?.icon} {STYLES.find(s => s.id === item.style)?.label}</Chip>}
                {item.aspect && <Chip>{item.aspect}</Chip>}
                {item.refs && item.refs.length > 0 && <Chip className="bg-[#7c5cfc]/20 border-[#7c5cfc]/30 text-[#b49dff]">참조 {item.refs.length}개 · --iw {(item.refWeight/100).toFixed(2)}</Chip>}
              </div>
              {item.refs && item.refs.length > 0 && (
                <div>
                  <div className="text-xs text-white/50 mb-2">참조 이미지</div>
                  <div className="flex flex-wrap gap-2">
                    {item.refs.map(r => (
                      <div key={r.id} className="w-14 h-14 rounded-lg overflow-hidden border border-white/10">
                        <img src={r.url} alt="" className="w-full h-full object-cover"/>
                      </div>
                    ))}
                  </div>
                </div>
              )}
              <div className="text-xs text-white/50">{formatTime(item.timestamp)}</div>
              <div className="flex flex-wrap gap-2 pt-3 border-t border-white/10">
                <Button size="sm" variant="secondary" onClick={() => onCopy(item.prompt)}><Icon.Copy/>프롬프트 복사</Button>
                <Button size="sm" variant="secondary" onClick={() => onDownload(item)}><Icon.Download/>다운로드</Button>
                <Button size="sm" variant={isFav ? 'accent' : 'secondary'} onClick={() => onToggleFav(item.id)}>
                  {isFav ? <Icon.StarFill/> : <Icon.Star/>}
                  {isFav ? '즐겨찾기됨' : '즐겨찾기'}
                </Button>
                <Button size="sm" variant="danger" onClick={() => { onDelete(item.id); onClose(); }}><Icon.Trash/>삭제</Button>
              </div>
            </div>
          </div>
        </Modal>
      );
    }

    // ========================================
    // Settings Page
    // ========================================
    function SettingsPage({ settings, onChange, onClearAll }) {
      const [confirm, setConfirm] = useState(false);
      const [showKey, setShowKey] = useState(false);
      const toast = useToast();

      const handleSaveKey = (val) => {
        onChange({ ...settings, openaiKey: val });
      };

      return (
        <div className="max-w-2xl mx-auto px-4 md:px-6 py-6 space-y-6 pb-24">
          <h2 className="text-xl font-semibold">설정</h2>

          {/* OpenAI API 섹션 */}
          <div className="bg-[#252525] border border-white/5 rounded-xl p-5 space-y-4">
            <div className="flex items-start justify-between gap-4">
              <div>
                <div className="text-sm font-medium mb-1 flex items-center gap-2">
                  <span>OpenAI DALL-E 3</span>
                  <span className={`text-[10px] px-2 py-0.5 rounded-full font-medium ${settings.useOpenAI && settings.openaiKey ? 'bg-green-500/20 text-green-400' : 'bg-white/10 text-white/40'}`}>
                    {settings.useOpenAI && settings.openaiKey ? '활성' : '비활성'}
                  </span>
                </div>
                <div className="text-xs text-white/50">API 키를 입력하면 실제 DALL-E 3로 이미지를 생성합니다</div>
              </div>
              <button
                onClick={() => onChange({ ...settings, useOpenAI: !settings.useOpenAI })}
                disabled={!settings.openaiKey}
                className={`relative w-11 h-6 rounded-full transition-colors shrink-0 disabled:opacity-40 ${settings.useOpenAI && settings.openaiKey ? 'bg-[#7c5cfc]' : 'bg-white/15'}`}>
                <span className={`absolute top-0.5 w-5 h-5 rounded-full bg-white transition-transform ${settings.useOpenAI && settings.openaiKey ? 'translate-x-5' : 'translate-x-0.5'}`}></span>
              </button>
            </div>

            {/* API Key 입력 */}
            <div>
              <label className="text-xs text-white/50 mb-1.5 block">OpenAI API Key</label>
              <div className="flex gap-2">
                <div className="flex-1 flex items-center bg-black/40 border border-white/10 rounded-lg overflow-hidden focus-within:border-[#7c5cfc] transition-colors">
                  <input
                    type={showKey ? 'text' : 'password'}
                    value={settings.openaiKey || ''}
                    onChange={e => handleSaveKey(e.target.value)}
                    placeholder="sk-..."
                    className="flex-1 bg-transparent text-sm text-white px-3 py-2.5 outline-none placeholder-white/20"
                  />
                  <button
                    onClick={() => setShowKey(v => !v)}
                    className="px-3 text-white/40 hover:text-white/70 transition-colors text-xs"
                  >
                    {showKey ? '숨기기' : '보기'}
                  </button>
                </div>
                <button
                  onClick={() => { onChange({ ...settings, openaiKey: '' }); toast('API 키가 삭제되었습니다'); }}
                  className="px-3 py-2 text-xs rounded-lg bg-white/5 hover:bg-red-500/20 text-white/50 hover:text-red-400 border border-white/5 transition-colors"
                >
                  삭제
                </button>
              </div>
              <p className="text-[11px] text-white/30 mt-1.5">
                API 키는 브라우저 LocalStorage에만 저장되며 서버로 전송되지 않습니다.
              </p>
            </div>

            {/* 비용 안내 */}
            <div className="bg-yellow-500/5 border border-yellow-500/15 rounded-lg p-3">
              <p className="text-[11px] text-yellow-400/80 font-medium mb-1">💰 DALL-E 3 비용 안내</p>
              <p className="text-[11px] text-white/40">이미지 1장 생성 시 약 <span className="text-white/60">$0.04</span> (1024×1024 기준) · 4장 생성 시 약 <span className="text-white/60">$0.16</span></p>
              <p className="text-[11px] text-white/40 mt-0.5">와이드 비율 (1792×1024) 선택 시 장당 <span className="text-white/60">$0.08</span></p>
            </div>
          </div>

          {/* 데모 모드 안내 */}
          <div className="bg-[#252525] border border-white/5 rounded-xl p-5">
            <div className="flex items-start justify-between gap-4">
              <div>
                <div className="text-sm font-medium mb-1">데모 모드</div>
                <div className="text-xs text-white/50">API 키 없이 Picsum 랜덤 이미지로 UI를 테스트합니다 (무료)</div>
              </div>
              <span className={`text-[10px] px-2 py-1 rounded-full ${!settings.useOpenAI || !settings.openaiKey ? 'bg-green-500/20 text-green-400' : 'bg-white/10 text-white/40'}`}>
                {!settings.useOpenAI || !settings.openaiKey ? '현재 사용 중' : '비활성'}
              </span>
            </div>
          </div>

          <div className="bg-[#252525] border border-white/5 rounded-xl p-5">
            <div className="text-sm font-medium mb-3">강조 색상</div>
            <div className="flex gap-3">
              {ACCENT_COLORS.map(c => (
                <button key={c.id} onClick={() => onChange({ ...settings, accent: c.value })}
                  className={`w-10 h-10 rounded-full border-2 transition-all ${settings.accent === c.value ? 'border-white scale-110' : 'border-white/10'}`}
                  style={{ background: c.value }} title={c.label}/>
              ))}
            </div>
          </div>

          <div className="bg-[#252525] border border-white/5 rounded-xl p-5">
            <div className="text-sm font-medium mb-3">기본 스타일</div>
            <div className="grid grid-cols-2 sm:grid-cols-4 gap-2">
              <button onClick={() => onChange({ ...settings, defaultStyle: null })}
                className={`px-3 py-2 rounded-lg text-xs border ${!settings.defaultStyle ? 'border-white text-white bg-white/5' : 'border-white/10 text-white/60 hover:text-white'}`}>
                없음
              </button>
              {STYLES.map(s => (
                <button key={s.id} onClick={() => onChange({ ...settings, defaultStyle: s.id })}
                  className={`px-3 py-2 rounded-lg text-xs border flex items-center gap-1.5 justify-center ${settings.defaultStyle === s.id ? 'border-white text-white bg-white/5' : 'border-white/10 text-white/60 hover:text-white'}`}>
                  <span>{s.icon}</span><span>{s.label}</span>
                </button>
              ))}
            </div>
          </div>

          <div className="bg-[#252525] border border-red-500/20 rounded-xl p-5">
            <div className="text-sm font-medium mb-1 text-red-400">데이터 관리</div>
            <div className="text-xs text-white/50 mb-3">모든 이미지, 즐겨찾기, 히스토리가 삭제됩니다. 되돌릴 수 없습니다.</div>
            {!confirm ? (
              <Button variant="danger" size="sm" onClick={() => setConfirm(true)}><Icon.Trash/>모든 데이터 삭제</Button>
            ) : (
              <div className="flex gap-2">
                <Button variant="danger" size="sm" onClick={() => { onClearAll(); setConfirm(false); }}>정말 삭제</Button>
                <Button variant="ghost" size="sm" onClick={() => setConfirm(false)}>취소</Button>
              </div>
            )}
          </div>
        </div>
      );
    }

    // ========================================
    // History View
    // ========================================
    function HistoryView({ history, onClear }) {
      if (history.length === 0) {
        return (
          <div className="flex-1 flex flex-col items-center justify-center px-6 py-20 text-center">
            <div className="w-20 h-20 rounded-2xl bg-white/5 flex items-center justify-center mb-4 text-white/60"><Icon.Clock/></div>
            <h3 className="text-lg font-semibold mb-1">히스토리가 비어있습니다</h3>
            <p className="text-sm text-white/50">생성한 프롬프트가 여기에 기록됩니다</p>
          </div>
        );
      }
      return (
        <div className="max-w-3xl mx-auto px-4 md:px-6 py-6 pb-24">
          <div className="flex items-center justify-between mb-4">
            <h2 className="text-xl font-semibold">히스토리</h2>
            <Button variant="ghost" size="sm" onClick={onClear}><Icon.Trash/>전체 삭제</Button>
          </div>
          <div className="space-y-2">
            {history.map(h => (
              <div key={h.id} className="bg-[#252525] border border-white/5 rounded-lg p-4 hover:bg-[#2f2f2f] transition-colors">
                <div className="flex items-start justify-between gap-4">
                  <div className="flex-1 min-w-0">
                    <p className="text-sm text-white line-clamp-2 mb-2">{h.prompt}</p>
                    <div className="flex flex-wrap gap-1.5 text-[11px] text-white/50">
                      <span>{formatTime(h.timestamp)}</span>
                      {h.style && <span>· {STYLES.find(s => s.id === h.style)?.label}</span>}
                      {h.aspect && <span>· {h.aspect}</span>}
                      {h.refs > 0 && <span>· 참조 {h.refs}개</span>}
                    </div>
                  </div>
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    // ========================================
    // App
    // ========================================
    function App() {
      const [page, setPage] = useState('home');
      const [gallery, setGallery] = useState(() => loadLS(STORAGE.GALLERY, []));
      const [favorites, setFavorites] = useState(() => loadLS(STORAGE.FAVORITES, []));
      const [history, setHistory] = useState(() => loadLS(STORAGE.HISTORY, []));
      const [settings, setSettings] = useState(() => loadLS(STORAGE.SETTINGS, { apiMode: false, accent: '#7c5cfc', defaultStyle: null, openaiKey: '', useOpenAI: false }));
      const [generating, setGenerating] = useState(0);
      const [search, setSearch] = useState('');
      const [view, setView] = useState('grid');
      const [styleFilter, setStyleFilter] = useState(null);
      const [detail, setDetail] = useState(null);
      const toast = useToast();

      useEffect(() => saveLS(STORAGE.GALLERY, gallery), [gallery]);
      useEffect(() => saveLS(STORAGE.FAVORITES, favorites), [favorites]);
      useEffect(() => saveLS(STORAGE.HISTORY, history), [history]);
      useEffect(() => saveLS(STORAGE.SETTINGS, settings), [settings]);

      const handleGenerate = useCallback(async ({ text, style, aspect, refs, refWeight }) => {
        setGenerating(4);
        const ar = ASPECT_RATIOS.find(a => a.id === aspect) || ASPECT_RATIOS[0];
        const base = Date.now();
        const hist = { id: uid(), prompt: text, style, aspect, refs: refs.length, timestamp: base };
        setHistory(h => [hist, ...h].slice(0, 50));

        // OpenAI DALL-E 3 모드
        if (settings.useOpenAI && settings.openaiKey) {
          const styleKw = STYLES.find(s => s.id === style)?.keyword || '';

          // 한국어 감지 → 영어 번역 (DALL-E 3도 영어가 훨씬 정확)
          const hasKorean = /[\uAC00-\uD7A3]/.test(text);
          let englishText = text;
          if (hasKorean) {
            toast('한국어 프롬프트를 번역 중...');
            try {
              const translateResp = await fetch(
                `https://text.pollinations.ai/${encodeURIComponent(
                  `Translate this image generation prompt to English. Output ONLY the English translation, no explanation, no quotes:\n${text}`
                )}`
              );
              const translated = (await translateResp.text()).trim();
              if (translated && translated.length > 3 && !/[\uAC00-\uD7A3]/.test(translated)) {
                englishText = translated;
              }
            } catch (_) {}
          }

          // 이미지 참조: 실제 URL을 텍스트로 힌트로 포함 (영어로, 깔끔하게)
          const refHint = refs.length > 0
            ? `Inspired by the visual style and composition of the reference image(s). Weight: ${(refWeight / 100).toFixed(1)}.`
            : '';

          // 4장 각각 variation 힌트 (구도/앵글 다양화)
          const variations = [
            'wide establishing shot',
            'close-up detailed view',
            'medium shot, slightly different angle',
            'alternative composition, different perspective',
          ];

          // DALL-E 3는 n=1만 지원 → 4번 병렬 호출
          const dalleSize = (() => {
            if (aspect === '16:9' || aspect === '3:2') return '1792x1024';
            if (aspect === '9:16') return '1024x1792';
            return '1024x1024';
          })();

          try {
            const requests = Array.from({ length: 4 }).map((_, i) => {
              const parts = [
                englishText,
                variations[i],
                styleKw,
                refHint,
              ].filter(Boolean);
              const fullPrompt = parts.join('. ');

              return fetch('https://api.openai.com/v1/images/generations', {
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json',
                  'Authorization': `Bearer ${settings.openaiKey}`,
                },
                body: JSON.stringify({
                  model: 'dall-e-3',
                  prompt: fullPrompt,
                  n: 1,
                  size: dalleSize,
                  quality: 'standard',
                }),
              }).then(r => r.json());
            });

            const results = await Promise.all(requests);
            const newItems = results.map((res, i) => {
              if (res.error) throw new Error(res.error.message);
              return {
                id: uid(),
                url: res.data[0].url,
                prompt: text,
                revisedPrompt: res.data[0].revised_prompt,
                timestamp: base,
                style, aspect, refs, refWeight,
              };
            });

            setGallery(g => [...newItems, ...g]);
            setGenerating(0);
            toast(refs.length > 0 ? '참조 이미지가 반영된 이미지가 생성되었습니다!' : '이미지가 생성되었습니다!');
          } catch (err) {
            setGenerating(0);
            toast(`오류: ${err.message || 'API 호출에 실패했습니다'}`);
          }

        } else {
          // 데모 모드 — Pollinations.ai (무료 AI 이미지 생성)
          const styleKw = STYLES.find(s => s.id === style)?.keyword || '';
          const variations = [
            'wide shot',
            'close-up',
            'medium shot',
            'different angle',
          ];

          try {
            // 한국어 감지 → 영어로 번역 후 생성
            const hasKorean = /[\uAC00-\uD7A3]/.test(text);
            let englishText = text;

            if (hasKorean) {
              toast('한국어 프롬프트를 번역 중...');
              try {
                const translateResp = await fetch(
                  `https://text.pollinations.ai/${encodeURIComponent(
                    `Translate this image generation prompt to English. Output ONLY the English translation, no explanation, no quotes:\n${text}`
                  )}`
                );
                const translated = (await translateResp.text()).trim();
                // 번역 결과가 영어이고 너무 짧지 않으면 사용
                if (translated && translated.length > 3 && !/[\uAC00-\uD7A3]/.test(translated)) {
                  englishText = translated;
                }
              } catch (_) {
                // 번역 실패 시 원문 사용
              }
            }

            const newItems = Array.from({ length: 4 }).map((_, i) => {
              // 순서: 주제(영어) → variation → 스타일 키워드 (주제가 먼저 오도록)
              const parts = [englishText, variations[i], styleKw].filter(Boolean);
              const fullPrompt = parts.join(', ');
              const seed = base + i * 31 + Math.floor(Math.random() * 9999);
              const url = `https://image.pollinations.ai/prompt/${encodeURIComponent(fullPrompt)}?width=${ar.w}&height=${ar.h}&seed=${seed}&nologo=true&enhance=true`;
              return { id: uid(), url, prompt: text, translatedPrompt: hasKorean ? englishText : null, timestamp: base, style, aspect, refs, refWeight };
            });

            setGallery(g => [...newItems, ...g]);
            setGenerating(0);
            toast(refs.length > 0 ? '참조 이미지가 반영된 이미지가 생성되었습니다!' : '이미지가 생성되었습니다!');
          } catch (err) {
            setGenerating(0);
            toast(`오류: ${err.message || '이미지 생성에 실패했습니다'}`);
          }
        }
      }, [toast, settings.useOpenAI, settings.openaiKey]);

      const toggleFav = (id) => {
        setFavorites(f => {
          if (f.includes(id)) { toast('즐겨찾기에서 제거되었습니다'); return f.filter(x => x !== id); }
          toast('즐겨찾기에 추가되었습니다'); return [...f, id];
        });
      };

      const copyPrompt = (p) => {
        if (navigator.clipboard) {
          navigator.clipboard.writeText(p).then(() => toast('프롬프트가 복사되었습니다'));
        } else {
          toast('클립보드를 사용할 수 없습니다');
        }
      };

      const downloadImg = async (item) => {
        try {
          const r = await fetch(item.url);
          const blob = await r.blob();
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url; a.download = `mj-${item.id}.jpg`;
          document.body.appendChild(a); a.click(); a.remove();
          URL.revokeObjectURL(url);
          toast('다운로드가 시작되었습니다');
        } catch { toast('다운로드에 실패했습니다'); }
      };

      const deleteItem = (id) => {
        setGallery(g => g.filter(x => x.id !== id));
        setFavorites(f => f.filter(x => x !== id));
        toast('이미지가 삭제되었습니다');
      };

      const clearAll = () => {
        setGallery([]); setFavorites([]); setHistory([]);
        toast('모든 데이터가 삭제되었습니다');
      };

      const filtered = useMemo(() => {
        let src = gallery;
        if (page === 'favorites') src = src.filter(g => favorites.includes(g.id));
        if (search.trim()) src = src.filter(g => g.prompt.toLowerCase().includes(search.toLowerCase()));
        if (styleFilter) src = src.filter(g => g.style === styleFilter);
        return src;
      }, [gallery, favorites, page, search, styleFilter]);

      const pageTitles = { 'home': '탐색', 'my-images': '내 이미지', 'favorites': '즐겨찾기' };
      const emptyMessages = {
        'home': { title: '아직 생성된 이미지가 없어요', desc: '아래 프롬프트 바에 원하는 이미지를 설명해보세요' },
        'my-images': { title: '내 이미지가 없어요', desc: '첫 이미지를 생성해보세요' },
        'favorites': { title: '즐겨찾기가 비어있어요', desc: '마음에 드는 이미지에 별을 눌러보세요' },
      };

      const showGallery = page === 'home' || page === 'my-images' || page === 'favorites';

      return (
        <div className="min-h-screen flex" style={{ background: '#191919' }}>
          <Sidebar active={page} onChange={setPage} accent={settings.accent}/>
          <main className="flex-1 flex flex-col min-w-0 relative">
            {showGallery && (
              <>
                <TopBar search={search} onSearch={setSearch} view={view} onView={setView}
                  styleFilter={styleFilter} onStyleFilter={setStyleFilter} title={pageTitles[page]}/>
                <div className="flex-1 pb-32">
                  <Gallery items={filtered} favorites={favorites} onToggleFav={toggleFav}
                    onOpen={setDetail} onCopy={copyPrompt} onDownload={downloadImg}
                    generating={generating} emptyMsg={emptyMessages[page]} view={view}/>
                </div>
              </>
            )}
            {page === 'history' && <HistoryView history={history} onClear={() => { setHistory([]); toast('히스토리가 삭제되었습니다'); }}/>}
            {page === 'settings' && <SettingsPage settings={settings} onChange={setSettings} onClearAll={clearAll}/>}

            {showGallery && <PromptBar onGenerate={handleGenerate} generating={generating > 0} defaultStyle={settings.defaultStyle} useOpenAI={settings.useOpenAI && !!settings.openaiKey}/>}
          </main>

          <DetailModal item={detail} isOpen={!!detail} onClose={() => setDetail(null)}
            onCopy={copyPrompt} onDownload={downloadImg} onToggleFav={toggleFav}
            isFav={detail ? favorites.includes(detail.id) : false}
            onDelete={deleteItem}/>
        </div>
      );
    }

    // ========================================
    // Render
    // ========================================
    ReactDOM.createRoot(document.getElementById('root')).render(
      <ToastProvider><App/></ToastProvider>
    );
  </script>
</body>
</html>
