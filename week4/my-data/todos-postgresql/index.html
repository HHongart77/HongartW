<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
    .todo-enter { animation: slideIn 0.2s ease-out; }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body class="bg-stone-50 min-h-screen">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const API_BASE_URL = '/api';

    // ========================================
    // 유저 선택 / 생성 화면
    // ========================================
    function UserSelector({ onSelectUser }) {
      const [users, setUsers] = useState([]);
      const [loading, setLoading] = useState(true);
      const [showForm, setShowForm] = useState(false);
      const [name, setName] = useState('');
      const [email, setEmail] = useState('');
      const [error, setError] = useState('');

      const fetchUsers = () => {
        setLoading(true);
        fetch(`${API_BASE_URL}/users`)
          .then(r => r.json())
          .then(data => { setUsers(data); setLoading(false); })
          .catch(() => { setError('서버에 연결할 수 없습니다.'); setLoading(false); });
      };

      useEffect(() => { fetchUsers(); }, []);

      const createUser = async () => {
        if (!name.trim() || !email.trim()) return;
        setError('');
        try {
          const res = await fetch(`${API_BASE_URL}/users`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name: name.trim(), email: email.trim() }),
          });
          const data = await res.json();
          if (!res.ok) { setError(data.error); return; }
          setName(''); setEmail('');
          setShowForm(false);
          fetchUsers();
        } catch {
          setError('유저 생성에 실패했습니다.');
        }
      };

      const deleteUser = async (id, e) => {
        e.stopPropagation();
        if (!confirm('유저와 모든 Todo를 삭제하시겠습니까?')) return;
        await fetch(`${API_BASE_URL}/users/${id}`, { method: 'DELETE' });
        fetchUsers();
      };

      if (loading) return (
        <div className="max-w-lg mx-auto px-4 py-12 text-center text-stone-400">불러오는 중...</div>
      );

      return (
        <div className="max-w-lg mx-auto px-4 py-12">
          <header className="mb-8">
            <h1 className="text-2xl font-semibold text-stone-800">Todo</h1>
            <p className="text-sm text-stone-400 mt-1">사용할 계정을 선택하세요</p>
          </header>

          {error && (
            <div className="mb-4 px-4 py-3 bg-red-50 border border-red-200 rounded-xl text-sm text-red-600">
              {error}
            </div>
          )}

          {/* 유저 목록 */}
          <ul className="space-y-2 mb-6">
            {users.map(user => (
              <li
                key={user.id}
                onClick={() => onSelectUser(user)}
                className="group flex items-center justify-between px-4 py-3 bg-white rounded-xl border border-stone-100 hover:border-stone-300 cursor-pointer transition-all"
              >
                <div>
                  <p className="text-sm font-medium text-stone-800">{user.name}</p>
                  <p className="text-xs text-stone-400">{user.email}</p>
                </div>
                <button
                  onClick={(e) => deleteUser(user.id, e)}
                  className="opacity-0 group-hover:opacity-100 p-1 text-stone-300 hover:text-red-400 transition-all"
                  aria-label="유저 삭제"
                >
                  <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
                    <path strokeLinecap="round" strokeLinejoin="round" d="M6 18L18 6M6 6l12 12" />
                  </svg>
                </button>
              </li>
            ))}
            {users.length === 0 && !showForm && (
              <li className="text-center py-8 text-stone-300 text-sm">등록된 유저가 없습니다</li>
            )}
          </ul>

          {/* 유저 추가 폼 */}
          {showForm ? (
            <div className="bg-white border border-stone-200 rounded-xl p-4 space-y-3">
              <input
                type="text"
                value={name}
                onChange={e => setName(e.target.value)}
                placeholder="이름"
                className="w-full px-3 py-2 border border-stone-200 rounded-lg text-sm text-stone-800 placeholder:text-stone-300 focus:outline-none focus:border-stone-400"
              />
              <input
                type="email"
                value={email}
                onChange={e => setEmail(e.target.value)}
                onKeyDown={e => e.key === 'Enter' && createUser()}
                placeholder="이메일"
                className="w-full px-3 py-2 border border-stone-200 rounded-lg text-sm text-stone-800 placeholder:text-stone-300 focus:outline-none focus:border-stone-400"
              />
              <div className="flex gap-2">
                <button
                  onClick={createUser}
                  disabled={!name.trim() || !email.trim()}
                  className="flex-1 py-2 bg-stone-800 text-white text-sm rounded-lg hover:bg-stone-700 disabled:opacity-30 transition-all"
                >
                  추가
                </button>
                <button
                  onClick={() => { setShowForm(false); setError(''); }}
                  className="flex-1 py-2 border border-stone-200 text-stone-500 text-sm rounded-lg hover:bg-stone-50 transition-all"
                >
                  취소
                </button>
              </div>
            </div>
          ) : (
            <button
              onClick={() => setShowForm(true)}
              className="w-full py-3 border border-dashed border-stone-300 text-stone-400 text-sm rounded-xl hover:border-stone-400 hover:text-stone-600 transition-all"
            >
              + 새 계정 추가
            </button>
          )}
        </div>
      );
    }

    // ========================================
    // Todo 화면
    // ========================================
    function TodoView({ user, onBack }) {
      const [todos, setTodos] = useState([]);
      const [input, setInput] = useState('');
      const [loading, setLoading] = useState(true);
      const inputRef = useRef(null);

      const fetchTodos = () => {
        fetch(`${API_BASE_URL}/users/${user.id}/todos`)
          .then(r => r.json())
          .then(data => { setTodos(data); setLoading(false); })
          .catch(() => setLoading(false));
      };

      useEffect(() => { fetchTodos(); }, [user.id]);

      const addTodo = async () => {
        const text = input.trim();
        if (!text) return;
        const res = await fetch(`${API_BASE_URL}/todos`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text, user_id: user.id }),
        });
        const data = await res.json();
        setTodos(prev => [...prev, data]);
        setInput('');
        inputRef.current?.focus();
      };

      const toggleTodo = async (todo) => {
        const res = await fetch(`${API_BASE_URL}/todos/${todo.id}`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ done: !todo.done }),
        });
        const updated = await res.json();
        setTodos(prev => prev.map(t => t.id === updated.id ? updated : t));
      };

      const deleteTodo = async (id) => {
        await fetch(`${API_BASE_URL}/todos/${id}`, { method: 'DELETE' });
        setTodos(prev => prev.filter(t => t.id !== id));
      };

      const doneCount = todos.filter(t => t.done).length;

      return (
        <div className="max-w-lg mx-auto px-4 py-12">
          <header className="mb-8">
            <button
              onClick={onBack}
              className="text-xs text-stone-400 hover:text-stone-600 mb-3 flex items-center gap-1 transition-colors"
            >
              <svg className="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
                <path strokeLinecap="round" strokeLinejoin="round" d="M15 19l-7-7 7-7" />
              </svg>
              계정 선택
            </button>
            <h1 className="text-2xl font-semibold text-stone-800">{user.name}의 Todo</h1>
            {todos.length > 0 && (
              <p className="text-sm text-stone-400 mt-1">
                {doneCount}/{todos.length} completed
              </p>
            )}
          </header>

          {/* Input */}
          <div className="flex gap-2 mb-8">
            <input
              ref={inputRef}
              type="text"
              value={input}
              onChange={e => setInput(e.target.value)}
              onKeyDown={e => e.key === 'Enter' && addTodo()}
              placeholder="새 할 일 추가..."
              className="flex-1 px-4 py-3 bg-white border border-stone-200 rounded-xl text-stone-800 placeholder:text-stone-300 focus:outline-none focus:border-stone-400 transition-colors"
            />
            <button
              onClick={addTodo}
              disabled={!input.trim()}
              className="px-5 py-3 bg-stone-800 text-white rounded-xl font-medium hover:bg-stone-700 disabled:opacity-30 disabled:cursor-not-allowed transition-all"
            >
              Add
            </button>
          </div>

          {/* Todo List */}
          {loading ? (
            <div className="text-center py-16 text-stone-300 text-sm">불러오는 중...</div>
          ) : todos.length === 0 ? (
            <div className="text-center py-16 text-stone-300">
              <p className="text-4xl mb-3">+</p>
              <p className="text-sm">첫 번째 할 일을 추가하세요</p>
            </div>
          ) : (
            <ul className="space-y-2">
              {todos.map(todo => (
                <li
                  key={todo.id}
                  className="todo-enter group flex items-center gap-3 px-4 py-3 bg-white rounded-xl border border-stone-100 hover:border-stone-200 transition-all"
                >
                  <button
                    onClick={() => toggleTodo(todo)}
                    className={`flex-shrink-0 w-5 h-5 rounded-full border-2 transition-all flex items-center justify-center ${
                      todo.done ? 'bg-stone-800 border-stone-800' : 'border-stone-300 hover:border-stone-400'
                    }`}
                    aria-label={todo.done ? '미완료로 변경' : '완료로 변경'}
                  >
                    {todo.done && (
                      <svg className="w-3 h-3 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={3}>
                        <path strokeLinecap="round" strokeLinejoin="round" d="M5 13l4 4L19 7" />
                      </svg>
                    )}
                  </button>
                  <span className={`flex-1 text-sm transition-all ${todo.done ? 'text-stone-300 line-through' : 'text-stone-700'}`}>
                    {todo.text}
                  </span>
                  <button
                    onClick={() => deleteTodo(todo.id)}
                    className="opacity-0 group-hover:opacity-100 flex-shrink-0 p-1 text-stone-300 hover:text-red-400 transition-all"
                    aria-label="삭제"
                  >
                    <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
                      <path strokeLinecap="round" strokeLinejoin="round" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                  </button>
                </li>
              ))}
            </ul>
          )}
        </div>
      );
    }

    // ========================================
    // App Component
    // ========================================
    function App() {
      const [currentUser, setCurrentUser] = useState(null);

      if (!currentUser) {
        return <UserSelector onSelectUser={setCurrentUser} />;
      }

      return <TodoView user={currentUser} onBack={() => setCurrentUser(null)} />;
    }

    // ========================================
    // Render
    // ========================================
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
