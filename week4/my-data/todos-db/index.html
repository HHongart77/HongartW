<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo Manager (DB)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50 min-h-screen">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;

    // ========================================
    // 🎨 Design System Components
    // ========================================

    function Button({ children, onClick, variant = 'primary', size = 'md', disabled, className = '' }) {
      const base = 'font-medium rounded-lg transition-all focus:outline-none focus:ring-2 focus:ring-offset-1 disabled:opacity-40 disabled:cursor-not-allowed cursor-pointer';
      const variants = {
        primary:   'bg-indigo-600 text-white hover:bg-indigo-700 focus:ring-indigo-400',
        secondary: 'bg-gray-100 text-gray-700 hover:bg-gray-200 focus:ring-gray-300',
        danger:    'bg-red-500 text-white hover:bg-red-600 focus:ring-red-400',
        ghost:     'text-gray-500 hover:bg-gray-100 focus:ring-gray-300',
      };
      const sizes = { sm: 'px-3 py-1.5 text-xs', md: 'px-4 py-2 text-sm', lg: 'px-5 py-2.5 text-base' };
      return (
        <button onClick={onClick} disabled={disabled}
          className={`${base} ${variants[variant]} ${sizes[size]} ${className}`}>
          {children}
        </button>
      );
    }

    function Input({ value, onChange, placeholder, onKeyDown, className = '' }) {
      return (
        <input value={value} onChange={onChange} onKeyDown={onKeyDown} placeholder={placeholder}
          className={`w-full border border-gray-200 rounded-lg px-3 py-2 text-sm
            focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-transparent ${className}`} />
      );
    }

    function Modal({ isOpen, onClose, title, children }) {
      if (!isOpen) return null;
      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center">
          <div className="absolute inset-0 bg-black/40" onClick={onClose} />
          <div className="relative bg-white rounded-2xl shadow-xl p-6 w-full max-w-sm mx-4">
            <div className="flex items-center justify-between mb-4">
              <h3 className="font-semibold text-gray-800">{title}</h3>
              <button onClick={onClose} className="text-gray-400 hover:text-gray-600 text-xl leading-none">&times;</button>
            </div>
            {children}
          </div>
        </div>
      );
    }

    // ========================================
    // 🧩 Todo Item Component
    // ========================================

    function TodoItem({ todo, onToggle, onDelete, onEdit }) {
      const [editing, setEditing] = useState(false);
      const [editText, setEditText] = useState(todo.task);

      function handleSave() {
        if (editText.trim() && editText.trim() !== todo.task) {
          onEdit(todo.id, editText.trim());
        }
        setEditing(false);
      }

      return (
        <li className="flex items-center gap-3 p-3 rounded-xl hover:bg-gray-50 group transition-colors">
          {/* 체크 버튼 */}
          <button
            onClick={() => onToggle(todo.id, !todo.done)}
            className={`w-5 h-5 rounded-full border-2 flex-shrink-0 flex items-center justify-center transition-all ${
              todo.done ? 'bg-indigo-500 border-indigo-500' : 'border-gray-300 hover:border-indigo-400'
            }`}
          >
            {todo.done && (
              <svg className="w-3 h-3 text-white" viewBox="0 0 12 12" fill="none" stroke="currentColor" strokeWidth="2">
                <path d="M2 6l3 3 5-5" strokeLinecap="round" strokeLinejoin="round"/>
              </svg>
            )}
          </button>

          {/* 내용 */}
          {editing ? (
            <Input value={editText} onChange={e => setEditText(e.target.value)} className="flex-1"
              onKeyDown={e => { if (e.key === 'Enter') handleSave(); if (e.key === 'Escape') setEditing(false); }} />
          ) : (
            <span
              onDoubleClick={() => { setEditing(true); setEditText(todo.task); }}
              title="더블클릭으로 수정"
              className={`flex-1 text-sm cursor-pointer select-none ${
                todo.done ? 'line-through text-gray-400' : 'text-gray-700'
              }`}
            >
              {todo.task}
              {todo.user_name && (
                <span className="ml-2 text-xs text-gray-300">— {todo.user_name}</span>
              )}
            </span>
          )}

          {/* 액션 버튼 */}
          <div className="flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
            {editing
              ? <Button size="sm" onClick={handleSave}>저장</Button>
              : <Button size="sm" variant="ghost" onClick={() => { setEditing(true); setEditText(todo.task); }}>✏️</Button>
            }
            <Button size="sm" variant="ghost" onClick={() => onDelete(todo.id)}>🗑️</Button>
          </div>
        </li>
      );
    }

    // ========================================
    // 📄 App Component
    // ========================================

    function App() {
      const [users, setUsers]         = useState([]);
      const [todos, setTodos]         = useState([]);
      const [selectedUser, setSelectedUser] = useState(null); // null = 전체
      const [newTask, setNewTask]     = useState('');
      const [loading, setLoading]     = useState(true);
      const [error, setError]         = useState(null);
      const [showAddUser, setShowAddUser] = useState(false);
      const [newUserName, setNewUserName] = useState('');
      const [newUserEmail, setNewUserEmail] = useState('');
      const [userFormError, setUserFormError] = useState('');

      // ── 데이터 로드 ──────────────────────────────────────────────────────────
      async function fetchUsers() {
        const res = await fetch('/api/users');
        if (!res.ok) throw new Error('유저 로드 실패');
        return res.json();
      }

      async function fetchTodos(userId) {
        const qs = userId ? `?user_id=${userId}` : '';
        const res = await fetch(`/api/todos${qs}`);
        if (!res.ok) throw new Error('할 일 로드 실패');
        return res.json();
      }

      useEffect(() => {
        setLoading(true);
        setError(null);
        Promise.all([fetchUsers(), fetchTodos(selectedUser)])
          .then(([u, t]) => { setUsers(u); setTodos(t); })
          .catch(() => setError('서버에 연결할 수 없습니다. 서버가 실행 중인지 확인해주세요.'))
          .finally(() => setLoading(false));
      }, [selectedUser]);

      // ── 유저 추가 ─────────────────────────────────────────────────────────────
      async function addUser() {
        const name  = newUserName.trim();
        const email = newUserEmail.trim();
        if (!name || !email) { setUserFormError('이름과 이메일을 모두 입력해주세요.'); return; }
        const res  = await fetch('/api/users', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email }),
        });
        const data = await res.json();
        if (!res.ok) { setUserFormError(data.error); return; }
        setUsers(prev => [...prev, data]);
        setNewUserName('');
        setNewUserEmail('');
        setUserFormError('');
        setShowAddUser(false);
      }

      // ── 유저 삭제 ─────────────────────────────────────────────────────────────
      async function deleteUser(userId) {
        if (!confirm('사용자와 해당 사용자의 할 일이 모두 삭제됩니다. 계속할까요?')) return;
        await fetch(`/api/users/${userId}`, { method: 'DELETE' });
        setUsers(prev => prev.filter(u => u.id !== userId));
        if (selectedUser === userId) {
          setSelectedUser(null);
          setTodos([]);
        } else {
          setTodos(prev => prev.filter(t => t.user_id !== userId));
        }
      }

      // ── CRUD ─────────────────────────────────────────────────────────────────
      async function addTodo() {
        const task = newTask.trim();
        if (!task) return;
        const userId = selectedUser ?? users[0]?.id;
        if (!userId) return;

        const res = await fetch('/api/todos', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ task, user_id: userId }),
        });
        const created = await res.json();
        setTodos(prev => [...prev, created]);
        setNewTask('');
        // 유저 todo_count 갱신
        setUsers(prev => prev.map(u =>
          u.id === userId ? { ...u, todo_count: u.todo_count + 1 } : u
        ));
      }

      async function toggleTodo(id, done) {
        const res = await fetch(`/api/todos/${id}`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ done }),
        });
        const updated = await res.json();
        setTodos(prev => prev.map(t => t.id === id ? updated : t));
      }

      async function editTodo(id, task) {
        const res = await fetch(`/api/todos/${id}`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ task }),
        });
        const updated = await res.json();
        setTodos(prev => prev.map(t => t.id === id ? updated : t));
      }

      async function deleteTodo(id) {
        const todo = todos.find(t => t.id === id);
        await fetch(`/api/todos/${id}`, { method: 'DELETE' });
        setTodos(prev => prev.filter(t => t.id !== id));
        if (todo) {
          setUsers(prev => prev.map(u =>
            u.id === todo.user_id ? { ...u, todo_count: Math.max(0, u.todo_count - 1) } : u
          ));
        }
      }

      // ── 통계 ─────────────────────────────────────────────────────────────────
      const doneCount  = todos.filter(t => t.done).length;
      const totalCount = todos.length;
      const progressPct = totalCount > 0 ? Math.round((doneCount / totalCount) * 100) : 0;

      // ── 현재 선택된 유저 이름 ─────────────────────────────────────────────────
      const currentUserName = selectedUser
        ? users.find(u => u.id === selectedUser)?.name
        : null;

      // ── 에러 화면 ─────────────────────────────────────────────────────────────
      if (error) {
        return (
          <div className="min-h-screen flex items-center justify-center">
            <div className="text-center bg-white rounded-2xl shadow p-10">
              <p className="text-5xl mb-4">⚠️</p>
              <p className="text-red-600 font-semibold text-lg">{error}</p>
              <p className="text-gray-400 text-sm mt-2">
                터미널에서 <code className="bg-gray-100 px-1 rounded">node server.js</code>를 실행해주세요.
              </p>
              <Button className="mt-4" onClick={() => window.location.reload()}>다시 시도</Button>
            </div>
          </div>
        );
      }

      // ── 메인 렌더 ─────────────────────────────────────────────────────────────
      return (
        <div className="min-h-screen flex flex-col">
          {/* 헤더 */}
          <header className="bg-indigo-600 text-white px-6 py-4 shadow-lg">
            <div className="max-w-5xl mx-auto flex items-center justify-between">
              <div>
                <h1 className="text-xl font-bold tracking-tight">📋 Todo Manager</h1>
                <p className="text-indigo-200 text-xs mt-0.5">SQLite DB 기반 · 유저별 할 일 관리</p>
              </div>
              {!loading && totalCount > 0 && (
                <div className="text-right">
                  <p className="text-indigo-100 text-sm">{doneCount}/{totalCount} 완료 ({progressPct}%)</p>
                  <div className="mt-1.5 w-36 h-1.5 bg-indigo-400/60 rounded-full overflow-hidden">
                    <div className="h-full bg-white rounded-full transition-all duration-300"
                      style={{ width: `${progressPct}%` }} />
                  </div>
                </div>
              )}
            </div>
          </header>

          <div className="flex-1 flex max-w-5xl mx-auto w-full px-4 py-6 gap-6">
            {/* 사이드바 */}
            <aside className="w-56 flex-shrink-0">
              <div className="flex items-center justify-between mb-3 px-1">
                <h2 className="text-xs font-semibold text-gray-400 uppercase tracking-wider">사용자</h2>
                <button
                  onClick={() => { setShowAddUser(true); setUserFormError(''); }}
                  className="text-xs text-indigo-500 hover:text-indigo-700 font-medium"
                  title="사용자 추가"
                >
                  + 추가
                </button>
              </div>
              <nav className="space-y-1">
                {/* 전체 보기 */}
                <button
                  onClick={() => setSelectedUser(null)}
                  className={`w-full text-left px-3 py-2.5 rounded-xl text-sm transition-colors flex justify-between items-center ${
                    selectedUser === null ? 'bg-indigo-600 text-white shadow-sm' : 'text-gray-600 hover:bg-gray-100'
                  }`}
                >
                  <span className="font-medium">전체 보기</span>
                  <span className={`text-xs px-2 py-0.5 rounded-full ${
                    selectedUser === null ? 'bg-indigo-500 text-white' : 'bg-gray-200 text-gray-600'
                  }`}>
                    {users.reduce((s, u) => s + u.todo_count, 0)}
                  </span>
                </button>

                {/* 유저 목록 */}
                {users.map(user => (
                  <div key={user.id} className="relative group/user">
                    <button onClick={() => setSelectedUser(user.id)}
                      className={`w-full text-left px-3 py-2.5 rounded-xl transition-colors ${
                        selectedUser === user.id ? 'bg-indigo-600 text-white shadow-sm' : 'text-gray-600 hover:bg-gray-100'
                      }`}
                    >
                      <div className="flex justify-between items-center">
                        <span className="text-sm font-medium">{user.name}</span>
                        <span className={`text-xs px-2 py-0.5 rounded-full ${
                          selectedUser === user.id ? 'bg-indigo-500 text-white' : 'bg-gray-200 text-gray-600'
                        }`}>
                          {user.todo_count}
                        </span>
                      </div>
                      <p className={`text-xs mt-0.5 truncate ${
                        selectedUser === user.id ? 'text-indigo-200' : 'text-gray-400'
                      }`}>
                        {user.email}
                      </p>
                    </button>
                    {/* 삭제 버튼 */}
                    <button
                      onClick={() => deleteUser(user.id)}
                      className="absolute top-2 right-2 opacity-0 group-hover/user:opacity-100 transition-opacity text-xs text-red-400 hover:text-red-600 bg-white rounded px-1"
                      title="사용자 삭제"
                    >
                      ✕
                    </button>
                  </div>
                ))}
              </nav>
            </aside>

            {/* 유저 추가 모달 */}
            <Modal isOpen={showAddUser} onClose={() => setShowAddUser(false)} title="사용자 추가">
              <div className="space-y-3">
                <div>
                  <label className="block text-xs text-gray-500 mb-1">이름</label>
                  <Input value={newUserName} onChange={e => setNewUserName(e.target.value)}
                    placeholder="홍길동"
                    onKeyDown={e => e.key === 'Enter' && addUser()} />
                </div>
                <div>
                  <label className="block text-xs text-gray-500 mb-1">이메일</label>
                  <Input value={newUserEmail} onChange={e => setNewUserEmail(e.target.value)}
                    placeholder="hong@example.com"
                    onKeyDown={e => e.key === 'Enter' && addUser()} />
                </div>
                {userFormError && <p className="text-xs text-red-500">{userFormError}</p>}
                <div className="flex gap-2 pt-1">
                  <Button onClick={addUser} className="flex-1">추가</Button>
                  <Button variant="secondary" onClick={() => setShowAddUser(false)} className="flex-1">취소</Button>
                </div>
              </div>
            </Modal>

            {/* 메인 */}
            <main className="flex-1 bg-white rounded-2xl shadow-sm border border-gray-100 p-6 flex flex-col">
              {/* 입력 폼 */}
              <div className="flex gap-2 mb-5">
                <Input value={newTask} onChange={e => setNewTask(e.target.value)}
                  onKeyDown={e => e.key === 'Enter' && addTodo()}
                  placeholder={
                    currentUserName
                      ? `${currentUserName}의 할 일 추가... (Enter)`
                      : `${users[0]?.name ?? '첫 번째 유저'}의 할 일 추가... (Enter)`
                  } />
                <Button onClick={addTodo} disabled={!newTask.trim()}>추가</Button>
              </div>

              {/* 제목 */}
              <div className="flex items-center justify-between mb-3">
                <h2 className="font-semibold text-gray-700 text-sm">
                  {currentUserName ? `${currentUserName}의 할 일` : '전체 할 일'}
                </h2>
                {!loading && totalCount > 0 && (
                  <p className="text-xs text-gray-400">완료 {doneCount} · 미완료 {totalCount - doneCount}</p>
                )}
              </div>

              {/* 리스트 */}
              {loading ? (
                <div className="flex-1 flex items-center justify-center text-gray-400">
                  <span className="animate-spin mr-2 text-xl">⏳</span> 불러오는 중...
                </div>
              ) : todos.length === 0 ? (
                <div className="flex-1 flex flex-col items-center justify-center text-gray-400">
                  <p className="text-4xl mb-3">📭</p>
                  <p className="text-sm">할 일이 없습니다. 위에서 추가해보세요!</p>
                </div>
              ) : (
                <ul className="flex-1 divide-y divide-gray-50">
                  {/* 미완료 */}
                  {todos.filter(t => !t.done).map(todo => (
                    <TodoItem key={todo.id} todo={todo}
                      showUser={selectedUser === null}
                      onToggle={toggleTodo} onDelete={deleteTodo} onEdit={editTodo} />
                  ))}
                  {/* 구분선 */}
                  {todos.some(t => t.done) && todos.some(t => !t.done) && (
                    <li className="py-2 px-3">
                      <span className="text-xs text-gray-300 font-medium uppercase tracking-wider">완료됨</span>
                    </li>
                  )}
                  {/* 완료 */}
                  {todos.filter(t => t.done).map(todo => (
                    <TodoItem key={todo.id} todo={todo}
                      showUser={selectedUser === null}
                      onToggle={toggleTodo} onDelete={deleteTodo} onEdit={editTodo} />
                  ))}
                </ul>
              )}

              {!selectedUser && !loading && todos.length > 0 && (
                <p className="mt-4 pt-3 border-t border-gray-50 text-xs text-gray-300 text-center">
                  💡 사이드바에서 사용자를 선택하면 해당 유저의 할 일만 표시됩니다
                </p>
              )}
            </main>
          </div>
        </div>
      );
    }

    // ========================================
    // 🚀 렌더링
    // ========================================
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
