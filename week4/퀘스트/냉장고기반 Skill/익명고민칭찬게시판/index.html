    function Button({ variant = "primary", size = "md", disabled, onClick, className = "", children, type = "button", ...rest }) {
      const base = "inline-flex items-center justify-center font-medium rounded-full transition-all duration-200 active:scale-[0.97] focus:outline-none focus:ring-2 focus:ring-offset-2";
      const sizes = {
        sm: "px-3 py-1.5 text-xs",
        md: "px-4 py-2 text-sm",
        lg: "px-6 py-3 text-base"
      };
      const variants = {
        primary: "text-white shadow-sm hover:shadow-md focus:ring-blue-300",
        secondary: "bg-gray-100 text-gray-800 hover:bg-gray-200 focus:ring-gray-300",
        ghost: "bg-transparent text-gray-700 hover:bg-gray-100 focus:ring-gray-300",
        danger: "bg-red-500 text-white hover:bg-red-600 focus:ring-red-300"
      };
      const style = variant === "primary" ? { backgroundColor: "#007AFF" } : {};
      return (
        <button
          type={type}
          onClick={onClick}
          disabled={disabled}
          style={style}
          className={`${base} ${sizes[size]} ${variants[variant]} ${disabled ? "opacity-50 cursor-not-allowed" : ""} ${className}`}
          {...rest}
        >
          {children}
        </button>
      );
    }

    const Input = React.forwardRef(function Input({ label, error, className = "", ...rest }, ref) {

                       placeholder:text-gray-400 transition-all duration-200 ${className}`}
            {...rest}
          />
          {error && <p className="mt-1 text-xs text-red-500">{error}</p>}
        </div>
      );

    function Card({ className = "", children, onClick, hoverable = false }) {
      return (
        <div
          onClick={onClick}
          className={`bg-white rounded-3xl apple-card-shadow ${hoverable ? "cursor-pointer hover:apple-card-shadow-hover hover:-translate-y-0.5 transition-all duration-300" : ""} ${className}`}

          {children}
        </div>
      );

    function Badge({ children, variant = "default", className = "" }) {
      const variants = {
        default: "bg-gray-100 text-gray-700",
        blue: "bg-blue-50 text-blue-600",
        green: "bg-green-50 text-green-600",
        red: "bg-red-50 text-red-500",
        yellow: "bg-amber-50 text-amber-600",
        gray: "bg-gray-50 text-gray-500"
      };
      return (
        <span className={`inline-flex items-center px-2.5 py-1 rounded-full text-xs font-medium ${variants[variant]} ${className}`}>
          {children}
        </span>
      );
    }

    function Modal({ isOpen, onClose, title, children, size = "md" }) {
      useEffect(() => {
        if (!isOpen) return;
        const onKey = (e) => e.key === "Escape" && onClose();
        document.addEventListener("keydown", onKey);
        document.body.style.overflow = "hidden";
        return () => {
          document.removeEventListener("keydown", onKey);
          document.body.style.overflow = "";
        };
      }, [isOpen, onClose]);

      if (!isOpen) return null;

      const sizes = {
        sm: "max-w-md",
        md: "max-w-lg",
        lg: "max-w-2xl",
        xl: "max-w-3xl"
      };

      return (
        <div
          className="fixed inset-0 z-50 flex items-center justify-center p-4 animate-overlay-in"
          style={{ backgroundColor: "rgba(0,0,0,0.4)" }}
          onClick={onClose}
        >
          <div
            onClick={(e) => e.stopPropagation()}
            className={`relative w-full ${sizes[size]} max-h-[88vh] overflow-hidden bg-white rounded-3xl shadow-2xl animate-modal-in`}
          >
            <div className="sticky top-0 z-10 apple-blur flex items-center justify-between px-6 py-4 border-b border-gray-200/60">
              <h3 className="text-lg font-semibold tracking-tight">{title}</h3>
              <button
                onClick={onClose}
                aria-label="닫기"
                className="w-8 h-8 flex items-center justify-center rounded-full bg-gray-100 hover:bg-gray-200 transition"
              >
                <span className="text-gray-500 text-lg leading-none">×</span>
              </button>
            </div>
            <div className="overflow-y-auto nice-scroll px-6 py-5" style={{ maxHeight: "calc(88vh - 64px)" }}>
              {children}
            </div>
          </div>
        </div>
      );
    }

      const [activeCategory, setActiveCategory] = useState(CATEGORIES[0].name);

        const v = value.trim();
        if (!v) return;
        addIngredient(v);
        setValue("");
        inputRef.current?.focus();
      };

      const onKeyDown = (e) => {
        if (e.key === "Enter") {
          e.preventDefault();
          handleAdd();
        }
      };

      const currentCategory = CATEGORIES.find((c) => c.name === activeCategory);

      return (
        <Card className="p-6 md:p-8 animate-fade-in">

              ref={inputRef}
              value={value}
              placeholder="예: 계란, 양파, 당근..."
              onChange={(e) => setValue(e.target.value)}
              onKeyDown={onKeyDown}

              onClick={handleAdd}
              aria-label="재료 추가"
              className="shrink-0 w-12 h-12 flex items-center justify-center text-white rounded-2xl shadow-sm hover:shadow-md active:scale-95 transition-all"
              style={{ backgroundColor: "#007AFF" }}
            >
              <span className="text-xl leading-none">+</span>
            </button>
          </div>

          {ingredients.length > 0 ? (
            <div className="flex flex-wrap gap-2 mb-6 p-4 bg-gray-50 rounded-2xl">
              {ingredients.map((ing) => (
                <Tag key={ing} label={ing} onRemove={() => removeIngredient(ing)} />
              ))}
            </div>
          ) : (
            <div className="mb-6 p-6 bg-gray-50 rounded-2xl text-center">
              <p className="text-sm text-gray-400">아직 추가된 재료가 없습니다</p>
            </div>
          )}

          <div>
            <p className="text-xs font-medium text-gray-500 mb-3">카테고리별 빠른 추가</p>
            <div className="flex flex-wrap gap-2 mb-4">
              {CATEGORIES.map((cat) => (
                <button
                  key={cat.name}
                  onClick={() => setActiveCategory(cat.name)}
                  className={`px-4 py-2 text-xs font-medium rounded-full transition-all duration-200 border
                              ${activeCategory === cat.name
                                ? "text-white border-transparent shadow-sm"
                                : "bg-white text-gray-700 border-gray-200 hover:bg-gray-50"}`}
                  style={activeCategory === cat.name ? { backgroundColor: "#007AFF" } : {}}
                >
                  <span className="mr-1">{cat.emoji}</span>{cat.name}
                </button>
              ))}
            </div>
            <div className="flex flex-wrap gap-2">
              {currentCategory.items.map((item) => {
                const added = ingredients.includes(item);
                return (
                  <button
                    key={item}
                    onClick={() => !added && addIngredient(item)}
                    disabled={added}
                    className={`px-3 py-1.5 text-sm rounded-full border transition
                                ${added
                                  ? "bg-blue-50 text-blue-500 border-blue-100 cursor-not-allowed"
                                  : "bg-white text-gray-700 border-gray-200 hover:border-blue-300 hover:text-blue-500"}`}
                  >
                    {added ? "✓ " : "+ "}{item}
                  </button>
                );
              })}
            </div>
          </div>
        </Card>
      );
    }

    // ========================================
    // 📄 Recipe Card & List
    // ========================================

    function DifficultyBadge({ level }) {
      const map = {
        "쉬움": "green",
        "보통": "yellow",
        "어려움": "red"
      };
      return <Badge variant={map[level] || "default"}>{level}</Badge>;
    }

    function MatchBar({ percent }) {
      const color = percent >= 70 ? "#34C759" : percent >= 40 ? "#FF9500" : "#FF3B30";
      return (
        <div className="flex items-center gap-2">
          <div className="flex-1 h-1.5 bg-gray-100 rounded-full overflow-hidden">
            <div
              className="h-full rounded-full transition-all duration-500"
              style={{ width: `${percent}%`, backgroundColor: color }}
            />
          </div>
          <span className="text-xs font-semibold tabular-nums" style={{ color }}>
            {percent}%
          </span>
        </div>
      );
    }

    function RecipeCard({ recipe, ingredients, onClick }) {
      const { matched, total, percent } = recipe.match;
      return (
        <Card hoverable onClick={onClick} className="p-5 flex flex-col">
          <div className="flex items-start justify-between mb-3">
            <div className="flex items-center gap-3">
              <div className="w-12 h-12 flex items-center justify-center bg-gray-50 rounded-2xl text-2xl">
                {recipe.emoji}
              </div>
              <div>
                <h3 className="text-[16px] font-semibold tracking-tight">{recipe.name}</h3>
                <div className="flex items-center gap-2 mt-1">
                  <span className="text-xs text-gray-500">⏱ {recipe.time}분</span>
                  <DifficultyBadge level={recipe.difficulty} />
                </div>
              </div>
            </div>
          </div>

          <div className="flex flex-wrap gap-1.5 mb-4 min-h-[28px]">
            {recipe.ingredients.slice(0, 5).map((ing) => {
              const have = ingredients.includes(ing);
              return (
                <span
                  key={ing}
                  className={`text-[11px] px-2 py-0.5 rounded-full ${
                    have ? "bg-blue-50 text-blue-600" : "bg-gray-50 text-gray-400"
                  }`}
                >
                  {ing}
                </span>
              );
            })}
            {recipe.ingredients.length > 5 && (
              <span className="text-[11px] px-2 py-0.5 rounded-full bg-gray-50 text-gray-400">
                +{recipe.ingredients.length - 5}
              </span>
            )}
          </div>

          <div className="mt-auto">
            <div className="flex items-center justify-between mb-1.5">
              <span className="text-[11px] text-gray-500">재료 매칭</span>
              <span className="text-[11px] text-gray-500 tabular-nums">{matched} / {total}</span>
            </div>
            <MatchBar percent={percent} />
          </div>
        </Card>
      );
    }

    function RecipeList({ recipes, ingredients, sortBy, setSortBy, onSelect }) {
      const sortOptions = [
        { label: "매칭률순", value: "match" },
        { label: "시간순", value: "time" },
        { label: "난이도순", value: "difficulty" }
      ];

      if (ingredients.length === 0) {
        return (
          <Card className="p-10 text-center animate-fade-in">
            <div className="text-5xl mb-3">🥘</div>
            <h3 className="text-[17px] font-semibold tracking-tight mb-1">재료를 먼저 추가해 주세요</h3>
            <p className="text-sm text-gray-500">냉장고 속 재료를 입력하면 어울리는 레시피를 추천해 드려요.</p>
          </Card>
        );
      }

      return (
        <div className="animate-fade-in">
          <div className="flex items-center justify-between mb-4 px-1">
            <div>
              <h2 className="text-xl font-semibold tracking-tight">추천 레시피</h2>
              <p className="text-sm text-gray-500 mt-0.5">{recipes.length}개의 레시피를 찾았어요</p>
            </div>
            <SegmentedControl options={sortOptions} value={sortBy} onChange={setSortBy} />
          </div>

          {recipes.length === 0 ? (
            <Card className="p-10 text-center">
              <div className="text-5xl mb-3">🔍</div>
              <h3 className="text-[17px] font-semibold tracking-tight mb-1">어울리는 레시피가 없어요</h3>
              <p className="text-sm text-gray-500">다른 재료를 추가해 보시겠어요?</p>
            </Card>
          ) : (
            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
              {recipes.map((r) => (
                <RecipeCard
                  key={r.id}
                  recipe={r}
                  ingredients={ingredients}
                  onClick={() => onSelect(r)}
                />
              ))}
            </div>
          )}
        </div>
      );
    }

    // ========================================
    // 📄 Recipe Detail Modal
    // ========================================

    function RecipeDetail({ recipe, ingredients, isOpen, onClose }) {
      if (!recipe) return null;
      const have = recipe.ingredients.filter((i) => ingredients.includes(i));
      const missing = recipe.ingredients.filter((i) => !ingredients.includes(i));

      return (
        <Modal isOpen={isOpen} onClose={onClose} title={recipe.name} size="lg">
          <div className="flex flex-col sm:flex-row gap-4 items-center sm:items-start mb-6 pb-6 border-b border-gray-100">
            <div className="w-20 h-20 flex items-center justify-center bg-gray-50 rounded-3xl text-4xl shrink-0">
              {recipe.emoji}
            </div>
            <div className="flex-1 text-center sm:text-left">
              <h2 className="text-2xl font-semibold tracking-tight mb-2">{recipe.name}</h2>
              <div className="flex flex-wrap gap-2 justify-center sm:justify-start">
                <Badge variant="gray">⏱ {recipe.time}분</Badge>
                <DifficultyBadge level={recipe.difficulty} />
                <Badge variant="blue">매칭 {recipe.match.percent}%</Badge>
              </div>
            </div>
          </div>

          <section className="mb-6">
            <h4 className="text-sm font-semibold mb-3 text-gray-800">필요한 재료</h4>
            <div className="grid grid-cols-2 gap-2">
              {recipe.ingredients.map((ing) => {
                const has = ingredients.includes(ing);
                return (
                  <div
                    key={ing}
                    className={`flex items-center gap-2 px-3 py-2.5 rounded-2xl text-sm
                                ${has ? "bg-green-50 text-green-700" : "bg-red-50 text-red-500"}`}
                  >
                    <span className="text-base">{has ? "✓" : "✗"}</span>
                    <span className="font-medium">{ing}</span>
                  </div>
                );
              })}
            </div>
            {missing.length > 0 && (
              <p className="text-xs text-gray-500 mt-3">
                부족한 재료 {missing.length}개: <span className="text-red-500 font-medium">{missing.join(", ")}</span>
              </p>
            )}
          </section>

          <section>
            <h4 className="text-sm font-semibold mb-3 text-gray-800">조리 방법</h4>
            <ol className="space-y-3">
              {recipe.steps.map((step, idx) => (
                <li key={idx} className="flex gap-3 p-4 bg-gray-50 rounded-2xl">
                  <div
                    className="shrink-0 w-7 h-7 flex items-center justify-center text-xs font-semibold text-white rounded-full"
                    style={{ backgroundColor: "#007AFF" }}
                  >
                    {idx + 1}
                  </div>
                  <p className="text-sm text-gray-800 leading-relaxed pt-0.5">{step}</p>
                </li>
              ))}
            </ol>
          </section>
        </Modal>
      );
    }

    // ========================================
    // 🚀 App Component
    // ========================================

    function App() {
      const [ingredients, setIngredients] = useState([]);
      const [sortBy, setSortBy] = useState("match");
      const [selected, setSelected] = useState(null);
      const [modalOpen, setModalOpen] = useState(false);

      const addIngredient = useCallback((ing) => {
        const trimmed = ing.trim();
        if (!trimmed) return;
        setIngredients((prev) => (prev.includes(trimmed) ? prev : [...prev, trimmed]));
      }, []);

      const removeIngredient = useCallback((ing) => {
        setIngredients((prev) => prev.filter((i) => i !== ing));
      }, []);

      const clearAll = useCallback(() => setIngredients([]), []);

      const recipesWithMatch = useMemo(() => {
        if (ingredients.length === 0) return [];
        const difficultyOrder = { "쉬움": 1, "보통": 2, "어려움": 3 };
        return RECIPES
          .map((r) => {
            const matched = r.ingredients.filter((i) => ingredients.includes(i)).length;
            const total = r.ingredients.length;
            const percent = Math.round((matched / total) * 100);
            return { ...r, match: { matched, total, percent } };
          })
          .filter((r) => r.match.matched > 0)
          .sort((a, b) => {
            if (sortBy === "time") return a.time - b.time;
            if (sortBy === "difficulty") return difficultyOrder[a.difficulty] - difficultyOrder[b.difficulty];
            return b.match.percent - a.match.percent;
          });
      }, [ingredients, sortBy]);

      const handleSelect = (recipe) => {
        setSelected(recipe);
        setModalOpen(true);
      };

      return (
        <div className="min-h-screen">
          <Header ingredientCount={ingredients.length} />
          <main className="max-w-5xl mx-auto px-4 sm:px-6 py-8 space-y-8">
            <IngredientInput
              ingredients={ingredients}
              addIngredient={addIngredient}
              removeIngredient={removeIngredient}
              clearAll={clearAll}
            />
            <RecipeList
              recipes={recipesWithMatch}
              ingredients={ingredients}
              sortBy={sortBy}
              setSortBy={setSortBy}
              onSelect={handleSelect}
            />
          </main>
          <footer className="max-w-5xl mx-auto px-6 py-10 text-center">
            <p className="text-xs text-gray-400">
              Designed with <span style={{ color: "#FF3B30" }}>♥</span> · 냉장고 레시피 · Home Recipe
            </p>
          </footer>

          <RecipeDetail
            recipe={selected}
            ingredients={ingredients}
            isOpen={modalOpen}
            onClose={() => setModalOpen(false)}
          />
        </div>
      );
    }

    // ========================================
    // Rendering
    // ========================================
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
