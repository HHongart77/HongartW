<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo (DB)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-50 min-h-screen">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    // ========================================
    // 🚀 App
    // ========================================
    function App() {
      const [users, setUsers]           = useState([]);
      const [selectedUser, setSelectedUser] = useState(null);
      const [todos, setTodos]           = useState([]);
      const [title, setTitle]           = useState('');
      const [description, setDescription] = useState('');
      const [newUserName, setNewUserName] = useState('');

      // 유저 목록 로드
      useEffect(() => {
        fetch('/api/users')
          .then(r => r.json())
          .then(r => {
            setUsers(r.data);
            if (r.data.length > 0) setSelectedUser(r.data[0]);
          });
      }, []);

      // 선택된 유저의 todo 로드
      useEffect(() => {
        if (!selectedUser) return;
        fetch(`/api/todos?user_id=${selectedUser.id}`)
          .then(r => r.json())
          .then(r => setTodos(r.data));
      }, [selectedUser]);

      const completedCount = useMemo(() => todos.filter(t => t.done).length, [todos]);

      const addTodo = () => {
        if (!title.trim() || !selectedUser) return;
        fetch('/api/todos', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ user_id: selectedUser.id, title: title.trim(), description: description.trim() }),
        })
          .then(r => r.json())
          .then(r => { setTodos(prev => [...prev, r.data]); setTitle(''); setDescription(''); });
      };

      const toggleTodo = (id, done) => {
        fetch(`/api/todos/${id}`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ done: !done }),
        })
          .then(r => r.json())
          .then(r => setTodos(prev => prev.map(t => t.id === id ? r.data : t)));
      };

      const deleteTodo = (id) => {
        fetch(`/api/todos/${id}`, { method: 'DELETE' })
          .then(() => setTodos(prev => prev.filter(t => t.id !== id)));
      };

      const addUser = () => {
        if (!newUserName.trim()) return;
        fetch('/api/users', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name: newUserName.trim() }),
        })
          .then(r => r.json())
          .then(r => {
            if (r.success) { setUsers(prev => [...prev, r.data]); setNewUserName(''); }
            else alert(r.message);
          });
      };

      return (
        <div className="max-w-lg mx-auto px-6 py-10">
          <h1 className="text-2xl font-bold text-gray-900 mb-1">Todo</h1>

          {/* 유저 탭 */}
          <div className="flex items-center gap-2 mb-6 flex-wrap">
            {users.map(u => (
              <button
                key={u.id}
                onClick={() => setSelectedUser(u)}
                className={`px-3 py-1.5 rounded-full text-sm font-medium transition-colors ${
                  selectedUser?.id === u.id
                    ? 'bg-gray-800 text-white'
                    : 'bg-gray-100 text-gray-600 hover:bg-gray-200'
                }`}
              >
                {u.name}
              </button>
            ))}
            {/* 유저 추가 인라인 */}
            <div className="flex gap-1">
              <input
                type="text"
                value={newUserName}
                onChange={e => setNewUserName(e.target.value)}
                onKeyDown={e => e.key === 'Enter' && addUser()}
                placeholder="새 유저..."
                className="w-24 px-2 py-1 text-xs border border-gray-200 rounded-full focus:outline-none focus:border-gray-400"
              />
              <button
                onClick={addUser}
                className="px-2 py-1 text-xs bg-gray-100 text-gray-600 rounded-full hover:bg-gray-200 transition-colors"
              >
                +
              </button>
            </div>
          </div>

          {selectedUser && (
            <>
              <p className="text-sm text-gray-400 mb-4">
                {selectedUser.name} · {completedCount}/{todos.length} completed
              </p>

              {/* Todo 입력 */}
              <div className="flex flex-col gap-2 mb-6">
                <input
                  type="text"
                  value={title}
                  onChange={e => setTitle(e.target.value)}
                  onKeyDown={e => e.key === 'Enter' && addTodo()}
                  placeholder="제목..."
                  className="px-4 py-2 border border-gray-200 rounded-lg text-sm text-gray-700 placeholder-gray-400 focus:outline-none focus:border-gray-400"
                />
                <div className="flex gap-2">
                  <input
                    type="text"
                    value={description}
                    onChange={e => setDescription(e.target.value)}
                    onKeyDown={e => e.key === 'Enter' && addTodo()}
                    placeholder="설명 (선택)..."
                    className="flex-1 px-4 py-2 border border-gray-200 rounded-lg text-sm text-gray-700 placeholder-gray-400 focus:outline-none focus:border-gray-400"
                  />
                  <button
                    onClick={addTodo}
                    className="px-4 py-2 bg-gray-800 text-white text-sm font-medium rounded-lg hover:bg-gray-700 transition-colors"
                  >
                    Add
                  </button>
                </div>
              </div>

              {/* Todo 목록 */}
              {todos.length === 0 ? (
                <p className="text-sm text-gray-300 text-center py-8">할 일이 없습니다.</p>
              ) : (
                <ul className="space-y-2">
                  {todos.map(todo => (
                    <li key={todo.id} className="flex items-start gap-3 px-4 py-3 bg-white border border-gray-100 rounded-lg">
                      <button
                        onClick={() => toggleTodo(todo.id, !!todo.done)}
                        className={`mt-0.5 w-5 h-5 rounded-full border-2 flex-shrink-0 transition-colors ${
                          todo.done ? 'border-gray-400 bg-gray-400' : 'border-gray-300 bg-white'
                        }`}
                        aria-label="완료 토글"
                      />
                      <div className="flex-1 min-w-0">
                        <p className={`text-sm font-medium ${todo.done ? 'line-through text-gray-400' : 'text-gray-700'}`}>
                          {todo.title}
                        </p>
                        {todo.description && (
                          <p className={`text-xs mt-0.5 ${todo.done ? 'text-gray-300' : 'text-gray-400'}`}>
                            {todo.description}
                          </p>
                        )}
                      </div>
                      <button
                        onClick={() => deleteTodo(todo.id)}
                        className="text-gray-300 hover:text-red-400 text-xs transition-colors flex-shrink-0"
                        aria-label="삭제"
                      >
                        ✕
                      </button>
                    </li>
                  ))}
                </ul>
              )}
            </>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
