<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-white min-h-screen">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;
    const API = '/api/todos';

    function App() {
      const [todos, setTodos] = useState([]);
      const [title, setTitle] = useState('');
      const [description, setDescription] = useState('');

      useEffect(() => {
        fetch(API)
          .then(res => res.json())
          .then(res => setTodos(res.data));
      }, []);

      const completedCount = useMemo(() => todos.filter(t => t.done).length, [todos]);

      const addTodo = () => {
        if (!title.trim()) return;
        fetch(API, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title: title.trim(), description: description.trim() }),
        })
          .then(res => res.json())
          .then(res => {
            setTodos(prev => [...prev, res.data]);
            setTitle('');
            setDescription('');
          });
      };

      const toggleTodo = (id, done) => {
        fetch(`${API}/${id}`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ done: !done }),
        })
          .then(res => res.json())
          .then(res => setTodos(prev => prev.map(t => t.id === id ? res.data : t)));
      };

      const deleteTodo = (id) => {
        fetch(`${API}/${id}`, { method: 'DELETE' })
          .then(() => setTodos(prev => prev.filter(t => t.id !== id)));
      };

      return (
        <div className="max-w-md mx-auto px-6 py-10">
          <h1 className="text-2xl font-bold text-gray-900">Todo</h1>
          <p className="text-sm text-gray-400 mt-0.5 mb-6">
            {completedCount}/{todos.length} completed
          </p>

          {/* Input */}
          <div className="flex flex-col gap-2 mb-6">
            <input
              type="text"
              value={title}
              onChange={e => setTitle(e.target.value)}
              onKeyDown={e => e.key === 'Enter' && addTodo()}
              placeholder="제목..."
              className="px-4 py-2 border border-gray-200 rounded-lg text-sm text-gray-700 placeholder-gray-400 focus:outline-none focus:border-gray-400"
            />
            <div className="flex gap-2">
              <input
                type="text"
                value={description}
                onChange={e => setDescription(e.target.value)}
                onKeyDown={e => e.key === 'Enter' && addTodo()}
                placeholder="설명 (선택)..."
                className="flex-1 px-4 py-2 border border-gray-200 rounded-lg text-sm text-gray-700 placeholder-gray-400 focus:outline-none focus:border-gray-400"
              />
              <button
                onClick={addTodo}
                className="px-4 py-2 bg-gray-200 text-gray-700 text-sm font-medium rounded-lg hover:bg-gray-300 transition-colors"
              >
                Add
              </button>
            </div>
          </div>

          {/* Todo List */}
          <ul className="space-y-2">
            {todos.map(todo => (
              <li
                key={todo.id}
                className="flex items-start gap-3 px-4 py-3 border border-gray-100 rounded-lg"
              >
                <button
                  onClick={() => toggleTodo(todo.id, todo.done)}
                  className={`mt-0.5 w-5 h-5 rounded-full border-2 flex-shrink-0 transition-colors ${
                    todo.done ? 'border-gray-400 bg-gray-400' : 'border-gray-300 bg-white'
                  }`}
                  aria-label="완료 토글"
                />
                <div className="flex-1 min-w-0">
                  <p className={`text-sm font-medium ${todo.done ? 'line-through text-gray-400' : 'text-gray-700'}`}>
                    {todo.title}
                  </p>
                  {todo.description && (
                    <p className={`text-xs mt-0.5 ${todo.done ? 'text-gray-300' : 'text-gray-400'}`}>
                      {todo.description}
                    </p>
                  )}
                </div>
                <button
                  onClick={() => deleteTodo(todo.id)}
                  className="text-gray-300 hover:text-red-400 text-xs transition-colors flex-shrink-0"
                  aria-label="삭제"
                >
                  ✕
                </button>
              </li>
            ))}
          </ul>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
