<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>나의 대시보드</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    html, body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", "Apple SD Gothic Neo", "Pretendard", sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      letter-spacing: -0.01em;
      background-color: #fafafa;
      color: #0a0a0a;
    }
    /* shadcn-inspired subtle focus ring */
    *:focus-visible {
      outline: 2px solid #0a0a0a;
      outline-offset: 2px;
      border-radius: 6px;
    }
    /* Soft pulse for the sparkle dot */
    @keyframes softPulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.65; transform: scale(0.9); }
    }
    .sparkle-dot {
      animation: softPulse 2.4s ease-in-out infinite;
    }
    /* Tabular numerals for consistent amount alignment */
    .tabular { font-variant-numeric: tabular-nums; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useMemo, useEffect, useCallback } = React;

    // ========================================
    // Auth — JWT token + API helpers
    // ========================================

    const API_BASE_URL = '/api';
    const TOKEN_KEY = 'my_dashboard_01_token';

    const tokenStore = {
      get: () => localStorage.getItem(TOKEN_KEY),
      set: (t) => localStorage.setItem(TOKEN_KEY, t),
      clear: () => localStorage.removeItem(TOKEN_KEY),
    };

    async function apiRequest(path, { method = 'GET', body, token } = {}) {
      const headers = { 'Content-Type': 'application/json' };
      if (token) headers.Authorization = `Bearer ${token}`;
      const res = await fetch(`${API_BASE_URL}${path}`, {
        method,
        headers,
        body: body ? JSON.stringify(body) : undefined,
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        const err = new Error(data.error || '요청에 실패했어요.');
        err.status = res.status;
        throw err;
      }
      return data;
    }

    const authApi = {
      signup: (email, password, name) =>
        apiRequest('/signup', { method: 'POST', body: { email, password, name } }),
      login: (email, password) =>
        apiRequest('/login', { method: 'POST', body: { email, password } }),
      me: (token) => apiRequest('/me', { token }),
    };

    // ========================================
    // Design System Components (shadcn-inspired)
    // ========================================

    function Card({ className = "", children, ...props }) {
      return (
        <div
          className={`rounded-2xl border border-gray-200 bg-white shadow-sm ${className}`}
          {...props}
        >
          {children}
        </div>
      );
    }

    function CardHeader({ className = "", children }) {
      return (
        <div className={`flex flex-col space-y-1.5 p-6 pb-4 ${className}`}>
          {children}
        </div>
      );
    }

    function CardTitle({ className = "", children }) {
      return (
        <h3 className={`text-base font-semibold leading-none tracking-tight text-gray-900 ${className}`}>
          {children}
        </h3>
      );
    }

    function CardDescription({ className = "", children }) {
      return (
        <p className={`text-sm text-gray-500 ${className}`}>
          {children}
        </p>
      );
    }

    function CardContent({ className = "", children }) {
      return (
        <div className={`px-6 pb-6 ${className}`}>
          {children}
        </div>
      );
    }

    function Button({
      variant = "default",
      size = "md",
      className = "",
      children,
      ...props
    }) {
      const base =
        "inline-flex items-center justify-center whitespace-nowrap rounded-lg text-sm font-medium transition-colors disabled:pointer-events-none disabled:opacity-50";
      const variants = {
        default: "bg-gray-900 text-white hover:bg-gray-800",
        ghost: "text-gray-700 hover:bg-gray-100",
        outline: "border border-gray-200 bg-white text-gray-900 hover:bg-gray-50",
        secondary: "bg-gray-100 text-gray-900 hover:bg-gray-200",
      };
      const sizes = {
        sm: "h-8 px-3",
        md: "h-9 px-4",
        lg: "h-10 px-5",
      };
      return (
        <button
          className={`${base} ${variants[variant]} ${sizes[size]} ${className}`}
          {...props}
        >
          {children}
        </button>
      );
    }

    function Badge({ variant = "default", className = "", children }) {
      const variants = {
        default: "bg-gray-900 text-white",
        secondary: "bg-gray-100 text-gray-700 border border-gray-200",
        outline: "border border-gray-200 text-gray-600",
      };
      return (
        <span
          className={`inline-flex items-center rounded-md px-2 py-0.5 text-xs font-medium ${variants[variant]} ${className}`}
        >
          {children}
        </span>
      );
    }

    function Checkbox({ checked, onChange, id }) {
      return (
        <button
          id={id}
          role="checkbox"
          aria-checked={checked}
          onClick={() => onChange(!checked)}
          className={`peer h-4 w-4 shrink-0 rounded-[4px] border transition-colors flex items-center justify-center ${
            checked
              ? "bg-gray-900 border-gray-900 text-white"
              : "border-gray-300 bg-white hover:border-gray-400"
          }`}
        >
          {checked && (
            <svg
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              strokeWidth="3"
              strokeLinecap="round"
              strokeLinejoin="round"
              className="h-3 w-3"
            >
              <polyline points="20 6 9 17 4 12" />
            </svg>
          )}
        </button>
      );
    }

    function Label({ htmlFor, className = "", children }) {
      return (
        <label
          htmlFor={htmlFor}
          className={`text-sm font-medium text-gray-900 ${className}`}
        >
          {children}
        </label>
      );
    }

    function Input({ error, className = "", ...props }) {
      return (
        <input
          className={`flex h-10 w-full rounded-lg border bg-white px-3 py-2 text-sm placeholder:text-gray-400 transition-colors focus:outline-none ${
            error
              ? "border-red-300 focus:border-red-500"
              : "border-gray-200 focus:border-gray-900"
          } ${className}`}
          {...props}
        />
      );
    }

    function ProgressBar({ value = 0, warning = false, className = "" }) {
      const clamped = Math.min(100, Math.max(0, value));
      const fillColor = warning ? "bg-red-500" : "bg-gray-900";
      return (
        <div
          className={`h-1.5 w-full rounded-full bg-gray-100 overflow-hidden ${className}`}
          role="progressbar"
          aria-valuenow={clamped}
          aria-valuemin="0"
          aria-valuemax="100"
        >
          <div
            className={`h-full rounded-full transition-all ${fillColor}`}
            style={{ width: `${clamped}%` }}
          />
        </div>
      );
    }

    // ========================================
    // Common / Layout Components
    // ========================================

    function DashboardHeader({ user, onLogout }) {
      const greeting = useMemo(() => {
        const hour = new Date().getHours();
        if (hour >= 5 && hour < 12) return "좋은 아침";
        if (hour >= 12 && hour < 18) return "좋은 오후";
        return "좋은 저녁";
      }, []);

      const displayName = user?.name?.trim() || user?.email?.split("@")[0] || "사용자";

      return (
        <header className="flex items-center justify-between mb-8">
          <div>
            <h1 className="text-2xl sm:text-3xl font-semibold tracking-tight text-gray-900">
              {greeting}, {displayName}님!
            </h1>
            <p className="mt-1 text-sm text-gray-500">
              오늘도 차분하게, 한 걸음씩.
            </p>
          </div>
          <Button variant="ghost" size="sm" onClick={onLogout}>
            로그아웃
          </Button>
        </header>
      );
    }

    // ========================================
    // Auth Screen — login / signup
    // ========================================

    function AuthScreen({ onAuthed }) {
      const [mode, setMode] = useState("login"); // "login" | "signup"
      const [email, setEmail] = useState("");
      const [password, setPassword] = useState("");
      const [name, setName] = useState("");
      const [error, setError] = useState("");
      const [loading, setLoading] = useState(false);

      const switchMode = (next) => {
        setMode(next);
        setError("");
      };

      const submit = async (e) => {
        e.preventDefault();
        setError("");
        setLoading(true);
        try {
          const res =
            mode === "login"
              ? await authApi.login(email, password)
              : await authApi.signup(email, password, name);
          tokenStore.set(res.token);
          onAuthed(res.user);
        } catch (err) {
          setError(err.message);
        } finally {
          setLoading(false);
        }
      };

      const fillDemo = () => {
        setMode("login");
        setEmail("demo@example.com");
        setPassword("demo1234");
        setError("");
      };

      return (
        <div className="min-h-screen bg-[#fafafa] flex items-center justify-center px-5 py-10">
          <div className="w-full max-w-sm">
            <div className="text-center mb-8">
              <h1 className="text-2xl font-semibold tracking-tight text-gray-900">
                나의 대시보드
              </h1>
              <p className="mt-1 text-sm text-gray-500">
                조용하고, 단단하게.
              </p>
            </div>

            <Card>
              <CardHeader>
                <div className="flex items-center gap-1 rounded-lg bg-gray-100 p-1">
                  <button
                    type="button"
                    onClick={() => switchMode("login")}
                    className={`flex-1 rounded-md px-3 py-1.5 text-sm font-medium transition-colors ${
                      mode === "login"
                        ? "bg-white text-gray-900 shadow-sm"
                        : "text-gray-500 hover:text-gray-900"
                    }`}
                  >
                    로그인
                  </button>
                  <button
                    type="button"
                    onClick={() => switchMode("signup")}
                    className={`flex-1 rounded-md px-3 py-1.5 text-sm font-medium transition-colors ${
                      mode === "signup"
                        ? "bg-white text-gray-900 shadow-sm"
                        : "text-gray-500 hover:text-gray-900"
                    }`}
                  >
                    회원가입
                  </button>
                </div>
              </CardHeader>
              <CardContent>
                <form onSubmit={submit} className="space-y-4">
                  {mode === "signup" && (
                    <div className="space-y-1.5">
                      <Label htmlFor="name">이름</Label>
                      <Input
                        id="name"
                        type="text"
                        placeholder="철홍"
                        value={name}
                        onChange={(e) => setName(e.target.value)}
                        autoComplete="name"
                      />
                    </div>
                  )}
                  <div className="space-y-1.5">
                    <Label htmlFor="email">이메일</Label>
                    <Input
                      id="email"
                      type="email"
                      placeholder="you@example.com"
                      value={email}
                      onChange={(e) => setEmail(e.target.value)}
                      autoComplete="email"
                      required
                    />
                  </div>
                  <div className="space-y-1.5">
                    <Label htmlFor="password">비밀번호</Label>
                    <Input
                      id="password"
                      type="password"
                      placeholder="8자 이상"
                      value={password}
                      onChange={(e) => setPassword(e.target.value)}
                      autoComplete={mode === "login" ? "current-password" : "new-password"}
                      required
                    />
                  </div>

                  {error && (
                    <div className="rounded-lg border border-red-200 bg-red-50 px-3 py-2 text-sm text-red-600">
                      {error}
                    </div>
                  )}

                  <Button
                    type="submit"
                    size="lg"
                    disabled={loading}
                    className="w-full"
                  >
                    {loading
                      ? "처리 중..."
                      : mode === "login"
                      ? "로그인"
                      : "계정 만들기"}
                  </Button>
                </form>

                <div className="mt-5 pt-4 border-t border-gray-100">
                  <button
                    type="button"
                    onClick={fillDemo}
                    className="w-full text-xs text-gray-500 hover:text-gray-900 transition-colors"
                  >
                    데모 계정으로 채우기 · demo@example.com / demo1234
                  </button>
                </div>
              </CardContent>
            </Card>
          </div>
        </div>
      );
    }

    // ========================================
    // Widget 1 — 오늘의 할일 (Notion mock)
    // ========================================

    function TodoWidget() {
      const [state, setState] = useState({ loading: true, data: null, error: null });

      useEffect(() => {
        const token = tokenStore.get();
        apiRequest("/tasks", { token })
          .then((data) => setState({ loading: false, data, error: null }))
          .catch((err) => setState({ loading: false, data: null, error: err.message }));
      }, []);

      if (state.loading) {
        return (
          <Card>
            <CardHeader>
              <CardTitle>오늘의 할일</CardTitle>
              <CardDescription>Notion에서 불러오는 중...</CardDescription>
            </CardHeader>
            <CardContent>
              <div className="h-32 animate-pulse rounded-lg bg-gray-100" />
            </CardContent>
          </Card>
        );
      }

      if (state.error) {
        return (
          <Card>
            <CardHeader>
              <CardTitle>오늘의 할일</CardTitle>
              <CardDescription className="text-red-500">
                Notion 연동에 실패했어요.
              </CardDescription>
            </CardHeader>
            <CardContent>
              <p className="text-sm text-gray-500">{state.error}</p>
            </CardContent>
          </Card>
        );
      }

      const { weekday, weekLabel, items, pageUrl } = state.data;
      const doneCount = items.filter((t) => t.checked).length;

      return (
        <Card>
          <CardHeader>
            <div className="flex items-center justify-between">
              <CardTitle>오늘의 할일</CardTitle>
              <a
                href={pageUrl}
                target="_blank"
                rel="noopener noreferrer"
                className="transition-opacity hover:opacity-70"
                title="Notion에서 열기"
              >
                <Badge variant="secondary">Notion ↗</Badge>
              </a>
            </div>
            <CardDescription>
              {weekday}
              {weekLabel ? ` · ${weekLabel}` : ""}
            </CardDescription>
          </CardHeader>
          <CardContent>
            {items.length === 0 ? (
              <div className="rounded-xl border border-dashed border-gray-200 bg-gray-50 p-6 text-center">
                <p className="text-sm text-gray-600">
                  {weekday}에 등록된 할 일이 없어요.
                </p>
                <p className="mt-1 text-xs text-gray-400">
                  Notion에서 추가해 보세요.
                </p>
              </div>
            ) : (
              <>
                <ul className="space-y-2">
                  {items.map((item) => (
                    <li key={item.id}>
                      <a
                        href={item.url}
                        target="_blank"
                        rel="noopener noreferrer"
                        className="group flex items-center gap-3 rounded-md -mx-1.5 px-1.5 py-1 hover:bg-gray-50 transition-colors"
                      >
                        <span
                          className={`h-4 w-4 shrink-0 rounded-[4px] border flex items-center justify-center ${
                            item.checked
                              ? "bg-gray-900 border-gray-900 text-white"
                              : "border-gray-300 bg-white"
                          }`}
                          aria-hidden="true"
                        >
                          {item.checked && (
                            <svg
                              xmlns="http://www.w3.org/2000/svg"
                              viewBox="0 0 24 24"
                              fill="none"
                              stroke="currentColor"
                              strokeWidth="3"
                              strokeLinecap="round"
                              strokeLinejoin="round"
                              className="h-3 w-3"
                            >
                              <polyline points="20 6 9 17 4 12" />
                            </svg>
                          )}
                        </span>
                        <span
                          className={`flex-1 text-sm ${
                            item.checked
                              ? "text-gray-400 line-through"
                              : "text-gray-900 group-hover:text-black"
                          }`}
                        >
                          {item.text}
                        </span>
                      </a>
                    </li>
                  ))}
                </ul>
                <div className="mt-5 pt-4 border-t border-gray-100 flex items-center justify-between">
                  <span className="text-xs text-gray-500 whitespace-nowrap">
                    {doneCount} / {items.length} 완료
                  </span>
                  <ProgressBar
                    value={items.length ? (doneCount / items.length) * 100 : 0}
                    className="w-24"
                  />
                </div>
              </>
            )}
          </CardContent>
        </Card>
      );
    }

    // ========================================
    // Widget 2 — AI 브리핑
    // ========================================

    function AIBriefingWidget() {
      const [text, setText] = useState("");
      const [streaming, setStreaming] = useState(false);
      const [error, setError] = useState(null);
      const abortRef = React.useRef(null);

      const run = useCallback(async () => {
        if (abortRef.current) {
          try { abortRef.current.abort(); } catch {}
        }
        const ctrl = new AbortController();
        abortRef.current = ctrl;

        setText("");
        setError(null);
        setStreaming(true);

        try {
          const token = tokenStore.get();
          const res = await fetch(`${API_BASE_URL}/briefing`, {
            method: "POST",
            headers: { Authorization: `Bearer ${token}` },
            signal: ctrl.signal,
          });
          if (!res.ok) {
            throw new Error((await res.text()) || `HTTP ${res.status}`);
          }
          const reader = res.body.getReader();
          const decoder = new TextDecoder();
          let buf = "";
          // Parse SSE frames as they arrive
          for (;;) {
            const { value, done } = await reader.read();
            if (done) break;
            buf += decoder.decode(value, { stream: true });
            const frames = buf.split(/\n\n/);
            buf = frames.pop();
            for (const frame of frames) {
              let data = "";
              for (const line of frame.split("\n")) {
                if (line.startsWith("data: ")) data = line.slice(6);
              }
              if (!data) continue;
              try {
                const obj = JSON.parse(data);
                if (obj.type === "text") setText((t) => t + obj.value);
                else if (obj.type === "error") setError(obj.message);
              } catch {
                /* skip malformed frame */
              }
            }
          }
        } catch (err) {
          if (err.name !== "AbortError") setError(err.message);
        } finally {
          setStreaming(false);
        }
      }, []);

      useEffect(() => {
        run();
        return () => {
          if (abortRef.current) {
            try { abortRef.current.abort(); } catch {}
          }
        };
      }, [run]);

      return (
        <Card>
          <CardHeader>
            <div className="flex items-center justify-between">
              <div className="flex items-center gap-2">
                <CardTitle>AI 브리핑</CardTitle>
                {streaming && (
                  <span className="sparkle-dot inline-block h-1.5 w-1.5 rounded-full bg-indigo-500" />
                )}
              </div>
              <Badge variant="outline">✨ AI</Badge>
            </div>
            <CardDescription>
              오늘의 데이터를 한 문단으로 정리했어요.
            </CardDescription>
          </CardHeader>
          <CardContent>
            {error ? (
              <p className="text-sm text-red-600 leading-relaxed">{error}</p>
            ) : (
              <p className="text-sm leading-relaxed text-gray-700 min-h-[3rem]">
                {streaming && !text ? (
                  <span className="text-gray-400">생성 중...</span>
                ) : (
                  <>
                    {text}
                    {streaming && text && (
                      <span className="inline-block w-1.5 h-4 -mb-0.5 ml-0.5 bg-gray-400 animate-pulse" />
                    )}
                  </>
                )}
              </p>
            )}
            <div className="mt-5 pt-4 border-t border-gray-100 flex items-center justify-between">
              <span className="text-xs text-gray-400">
                {streaming ? "스트리밍 중..." : "방금 업데이트됨"}
              </span>
              <button
                onClick={run}
                disabled={streaming}
                className="text-xs text-gray-500 hover:text-gray-900 disabled:opacity-40 transition-colors"
              >
                다시 생성
              </button>
            </div>
          </CardContent>
        </Card>
      );
    }

    // ========================================
    // Widget 3 — 이번 주 지출
    // ========================================

    function ExpenseWidget() {
      const [state, setState] = useState({ loading: true, data: null, error: null });

      useEffect(() => {
        const token = tokenStore.get();
        apiRequest("/expenses/weekly", { token })
          .then((data) => setState({ loading: false, data, error: null }))
          .catch((err) => setState({ loading: false, data: null, error: err.message }));
      }, []);

      const formatKRW = (n) => `₩ ${n.toLocaleString("ko-KR")}`;
      const formatRange = (start, end) => {
        const s = new Date(start);
        const e = new Date(end);
        return `${s.getMonth() + 1}월 ${s.getDate()}일 — ${e.getMonth() + 1}월 ${e.getDate()}일`;
      };

      if (state.loading) {
        return (
          <Card>
            <CardHeader>
              <CardTitle>이번 주 지출</CardTitle>
              <CardDescription>데이터를 불러오는 중...</CardDescription>
            </CardHeader>
            <CardContent>
              <div className="h-32 animate-pulse rounded-lg bg-gray-100" />
            </CardContent>
          </Card>
        );
      }

      if (state.error) {
        return (
          <Card>
            <CardHeader>
              <CardTitle>이번 주 지출</CardTitle>
              <CardDescription className="text-red-500">
                불러오기에 실패했어요.
              </CardDescription>
            </CardHeader>
            <CardContent>
              <p className="text-sm text-gray-500">{state.error}</p>
            </CardContent>
          </Card>
        );
      }

      const { total, categories, change, range } = state.data;

      if (!categories.length) {
        return (
          <Card>
            <CardHeader>
              <div className="flex items-center justify-between">
                <CardTitle>이번 주 지출</CardTitle>
                <Badge variant="secondary">{formatRange(range.start, range.end)}</Badge>
              </div>
              <CardDescription>아직 기록된 지출이 없어요.</CardDescription>
            </CardHeader>
            <CardContent>
              <div className="rounded-xl border border-dashed border-gray-200 bg-gray-50 p-6 text-center">
                <p className="text-sm text-gray-600">
                  가계부 앱에서 지출을 먼저 입력하세요.
                </p>
                <p className="mt-1 text-xs text-gray-400">
                  이번 주 데이터가 쌓이면 여기에 표시됩니다.
                </p>
              </div>
            </CardContent>
          </Card>
        );
      }

      const topCategories = categories.slice(0, 4).map((c) => ({
        ...c,
        percent: total > 0 ? Math.round((c.amount / total) * 100) : 0,
      }));

      const changeLabel =
        change === null
          ? "지난주 데이터 없음"
          : `지난주 대비 ${change >= 0 ? "+" : ""}${change.toFixed(1)}%`;

      return (
        <Card>
          <CardHeader>
            <div className="flex items-center justify-between">
              <CardTitle>이번 주 지출</CardTitle>
              <Badge variant="secondary">{formatRange(range.start, range.end)}</Badge>
            </div>
            <CardDescription>카테고리별 합계예요.</CardDescription>
          </CardHeader>
          <CardContent>
            <div className="mb-6">
              <p className="text-3xl font-semibold tracking-tight text-gray-900 tabular">
                {formatKRW(total)}
              </p>
              <p className="mt-1 text-xs text-gray-500">
                {change === null ? (
                  changeLabel
                ) : (
                  <>
                    지난주 대비{" "}
                    <span className="text-gray-900 font-medium">
                      {change >= 0 ? "+" : ""}
                      {change.toFixed(1)}%
                    </span>
                  </>
                )}
              </p>
            </div>
            <ul className="space-y-4">
              {topCategories.map((c) => (
                <li key={c.category}>
                  <div className="flex items-center justify-between mb-2">
                    <div className="flex items-center gap-2">
                      <span className="text-sm font-medium text-gray-900">
                        {c.category}
                      </span>
                      <span className="text-xs tabular text-gray-400">
                        {c.percent}%
                      </span>
                    </div>
                    <span className="text-sm text-gray-700 tabular">
                      {formatKRW(c.amount)}
                    </span>
                  </div>
                  <ProgressBar value={c.percent} />
                </li>
              ))}
            </ul>
          </CardContent>
        </Card>
      );
    }

    // ========================================
    // Widget 4 — 최근 활동
    // ========================================

    function ActivityWidget() {
      const activities = [
        { id: 1, emoji: "🏃", title: "러닝 5km", time: "2시간 전" },
        { id: 2, emoji: "📚", title: "독서 30분", time: "어제" },
        { id: 3, emoji: "💪", title: "헬스", time: "어제" },
        { id: 4, emoji: "🧘", title: "명상 10분", time: "2일 전" },
      ];

      return (
        <Card>
          <CardHeader>
            <div className="flex items-center justify-between">
              <CardTitle>최근 활동</CardTitle>
              <Badge variant="outline">이번 주</Badge>
            </div>
            <CardDescription>운동과 루틴을 꾸준히 이어가고 있어요.</CardDescription>
          </CardHeader>
          <CardContent>
            <ol className="relative space-y-4">
              {activities.map((a, idx) => (
                <li key={a.id} className="flex items-center gap-3">
                  <div className="flex-shrink-0 flex h-9 w-9 items-center justify-center rounded-full bg-gray-50 border border-gray-200 text-base">
                    {a.emoji}
                  </div>
                  <div className="flex-1 flex items-center justify-between">
                    <span className="text-sm font-medium text-gray-900">
                      {a.title}
                    </span>
                    <span className="text-xs text-gray-400">{a.time}</span>
                  </div>
                </li>
              ))}
            </ol>
            <div className="mt-5 pt-4 border-t border-gray-100 flex items-center justify-between">
              <span className="text-xs text-gray-500">이번 주 루틴 3회 달성</span>
              <button className="text-xs text-gray-500 hover:text-gray-900 transition-colors">
                전체 보기 →
              </button>
            </div>
          </CardContent>
        </Card>
      );
    }

    // ========================================
    // App
    // ========================================

    function App() {
      const [user, setUser] = useState(null);
      const [booting, setBooting] = useState(true);

      // Verify token on mount
      useEffect(() => {
        const token = tokenStore.get();
        if (!token) {
          setBooting(false);
          return;
        }
        authApi
          .me(token)
          .then(setUser)
          .catch(() => {
            tokenStore.clear();
          })
          .finally(() => setBooting(false));
      }, []);

      const handleLogout = useCallback(() => {
        tokenStore.clear();
        setUser(null);
      }, []);

      if (booting) {
        return (
          <div className="min-h-screen bg-[#fafafa] flex items-center justify-center">
            <div className="text-sm text-gray-400">불러오는 중...</div>
          </div>
        );
      }

      if (!user) {
        return <AuthScreen onAuthed={setUser} />;
      }

      return (
        <div className="min-h-screen bg-[#fafafa]">
          <div className="mx-auto max-w-5xl px-5 sm:px-8 py-10 sm:py-14">
            <DashboardHeader user={user} onLogout={handleLogout} />
            <main className="grid grid-cols-1 md:grid-cols-2 gap-6">
              <TodoWidget />
              <AIBriefingWidget />
              <ExpenseWidget />
              <ActivityWidget />
            </main>
            <footer className="mt-12 text-center">
              <p className="text-xs text-gray-400">
                © 2026 나의 대시보드 · 조용하고, 단단하게.
              </p>
            </footer>
          </div>
        </div>
      );
    }

    // ========================================
    // Rendering
    // ========================================

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
