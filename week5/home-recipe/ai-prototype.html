<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>냉장고 레시피 · AI 프로토타입</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    html, body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", system-ui, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      letter-spacing: -0.01em;
      background: #f5f5f7;
      color: #1d1d1f;
    }
    .apple-blur {
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      background-color: rgba(255, 255, 255, 0.72);
    }
    .apple-card-shadow { box-shadow: 0 1px 2px rgba(0,0,0,0.04), 0 4px 12px rgba(0,0,0,0.05); }
    .apple-card-shadow-hover { box-shadow: 0 4px 8px rgba(0,0,0,0.06), 0 12px 28px rgba(0,0,0,0.08); }
    .fab-shadow { box-shadow: 0 8px 24px rgba(0, 122, 255, 0.35), 0 2px 6px rgba(0, 122, 255, 0.2); }
    .fab-shadow-hover { box-shadow: 0 12px 32px rgba(0, 122, 255, 0.45), 0 4px 10px rgba(0, 122, 255, 0.25); }

    @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeInModal { from { opacity:0; transform:scale(0.96); } to { opacity:1; transform:scale(1); } }
    @keyframes fadeInOverlay { from { opacity:0; } to { opacity:1; } }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes bounce-dot {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-6px); opacity: 1; }
    }
    @keyframes pulseGlow {
      0%, 100% { box-shadow: 0 0 0 0 rgba(0, 122, 255, 0.35); }
      50% { box-shadow: 0 0 0 10px rgba(0, 122, 255, 0); }
    }
    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }
    @keyframes slideInRight { from { opacity:0; transform:translateX(20px); } to { opacity:1; transform:translateX(0); } }
    @keyframes slideInLeft { from { opacity:0; transform:translateX(-20px); } to { opacity:1; transform:translateX(0); } }

    .animate-fade-in { animation: fadeIn 0.35s ease-out both; }
    .animate-modal-in { animation: fadeInModal 0.28s cubic-bezier(0.22,1,0.36,1) both; }
    .animate-overlay-in { animation: fadeInOverlay 0.22s ease-out both; }
    .animate-spin { animation: spin 0.8s linear infinite; }
    .animate-pulse-glow { animation: pulseGlow 2s ease-out infinite; }
    .animate-slide-in-right { animation: slideInRight 0.3s ease-out both; }
    .animate-slide-in-left { animation: slideInLeft 0.3s ease-out both; }

    .typing-dot { animation: bounce-dot 1.2s infinite; display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: #86868b; margin: 0 2px; }
    .typing-dot:nth-child(2) { animation-delay: 0.15s; }
    .typing-dot:nth-child(3) { animation-delay: 0.3s; }

    .shimmer-text {
      background: linear-gradient(90deg, #8e8e93 0%, #1d1d1f 50%, #8e8e93 100%);
      background-size: 200% auto;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shimmer 2s linear infinite;
    }

    .nice-scroll::-webkit-scrollbar { width: 8px; }
    .nice-scroll::-webkit-scrollbar-track { background: transparent; }
    .nice-scroll::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 8px; }
    .nice-scroll::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.25); }

    .tag-chip { transition: transform 0.15s ease; }
    .tag-chip:hover { transform: translateY(-1px); }

    .fab { transition: transform 0.2s ease, box-shadow 0.3s ease; }
    .fab:hover { transform: scale(1.08); }
    .fab:active { transform: scale(0.95); }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    // ========================================
    // React Hooks
    // ========================================
    const { useState, useEffect, useRef, useCallback, useMemo } = React;

    // ========================================
    // 🎨 Design System Components
    // ========================================

    function Button({ variant = "primary", size = "md", disabled, onClick, className = "", children, type = "button" }) {
      const base = "inline-flex items-center justify-center font-medium rounded-full transition-all duration-200 active:scale-[0.97] focus:outline-none";
      const sizes = { sm: "px-3 py-1.5 text-xs", md: "px-4 py-2 text-sm", lg: "px-6 py-3 text-base" };
      const variants = {
        primary: "text-white shadow-sm hover:shadow-md",
        secondary: "bg-gray-100 text-gray-800 hover:bg-gray-200",
        ghost: "bg-transparent text-gray-700 hover:bg-gray-100",
        danger: "bg-red-500 text-white hover:bg-red-600"
      };
      const style = variant === "primary" ? { backgroundColor: "#007AFF" } : {};
      return (
        <button type={type} onClick={onClick} disabled={disabled} style={style}
          className={`${base} ${sizes[size]} ${variants[variant]} ${disabled ? "opacity-50 cursor-not-allowed" : ""} ${className}`}>
          {children}
        </button>
      );
    }

    const Input = React.forwardRef(function Input({ label, error, className = "", ...rest }, ref) {
      return (
        <div className="w-full">
          {label && <label className="block text-xs font-medium text-gray-500 mb-1.5">{label}</label>}
          <input ref={ref}
            className={`w-full px-4 py-3 text-[15px] bg-white/80 border border-gray-200 rounded-2xl
              focus:outline-none focus:border-transparent focus:ring-2 focus:ring-blue-200
              placeholder:text-gray-400 transition-all duration-200 ${className}`}
            {...rest} />
          {error && <p className="mt-1 text-xs text-red-500">{error}</p>}
        </div>
      );
    });

    function Card({ className = "", children, onClick, hoverable = false }) {
      return (
        <div onClick={onClick}
          className={`bg-white rounded-3xl apple-card-shadow
            ${hoverable ? "cursor-pointer hover:apple-card-shadow-hover hover:-translate-y-0.5 transition-all duration-300" : ""}
            ${className}`}>
          {children}
        </div>
      );
    }

    function Badge({ children, className = "", color = "gray" }) {
      const colors = {
        gray: "bg-gray-100 text-gray-700",
        blue: "bg-blue-50 text-blue-700",
        green: "bg-green-50 text-green-700",
        orange: "bg-orange-50 text-orange-700",
        red: "bg-red-50 text-red-700"
      };
      return (
        <span className={`inline-flex items-center px-2.5 py-1 rounded-full text-xs font-medium ${colors[color]} ${className}`}>
          {children}
        </span>
      );
    }

    function Modal({ isOpen, onClose, children, maxWidth = "max-w-md", heightClass = "" }) {
      useEffect(() => {
        function onKey(e) { if (e.key === "Escape") onClose && onClose(); }
        if (isOpen) {
          document.addEventListener("keydown", onKey);
          document.body.style.overflow = "hidden";
        }
        return () => {
          document.removeEventListener("keydown", onKey);
          document.body.style.overflow = "";
        };
      }, [isOpen, onClose]);

      if (!isOpen) return null;
      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center px-4 animate-overlay-in"
             style={{ background: "rgba(0,0,0,0.35)" }}
             onClick={onClose}>
          <div className={`w-full ${maxWidth} bg-white rounded-3xl apple-card-shadow-hover animate-modal-in overflow-hidden ${heightClass}`}
               onClick={(e) => e.stopPropagation()}>
            {children}
          </div>
        </div>
      );
    }

    // ========================================
    // 🧩 Common Components
    // ========================================

    function Header({ ingredientCount }) {
      return (
        <header className="sticky top-0 z-30 apple-blur border-b border-gray-200/60">
          <div className="max-w-5xl mx-auto px-5 py-4 flex items-center justify-between">
            <div className="flex items-center gap-2.5">
              <div className="w-9 h-9 rounded-2xl flex items-center justify-center text-white text-lg"
                   style={{ backgroundColor: "#007AFF" }}>
                🥗
              </div>
              <div>
                <h1 className="text-[17px] font-semibold tracking-tight">냉장고 레시피</h1>
                <p className="text-[11px] text-gray-500 -mt-0.5">AI 기능 프로토타입</p>
              </div>
            </div>
            <Badge color="blue" className="text-[11px]">재료 {ingredientCount}개</Badge>
          </div>
        </header>
      );
    }

    function IngredientPicker({ ingredients, onAdd, onRemove }) {
      const [input, setInput] = useState("");

      function handleAdd(e) {
        e.preventDefault();
        const trimmed = input.trim();
        if (!trimmed) return;
        if (ingredients.includes(trimmed)) { setInput(""); return; }
        onAdd(trimmed);
        setInput("");
      }

      return (
        <Card className="p-5">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-[15px] font-semibold">냉장고 재료</h2>
            <span className="text-[11px] text-gray-400">태그로 레시피 찾기</span>
          </div>
          <form onSubmit={handleAdd} className="flex gap-2 mb-3">
            <Input value={input} onChange={(e) => setInput(e.target.value)} placeholder="재료를 입력하고 Enter" />
            <Button type="submit" variant="primary" className="shrink-0">추가</Button>
          </form>
          <div className="flex flex-wrap gap-2">
            {ingredients.length === 0 && (
              <p className="text-[13px] text-gray-400">재료를 추가해 보세요.</p>
            )}
            {ingredients.map((tag) => (
              <button
                key={tag}
                onClick={() => onRemove(tag)}
                className="tag-chip group inline-flex items-center gap-1.5 pl-3 pr-2 py-1.5 rounded-full bg-blue-50 text-[13px] font-medium"
                style={{ color: "#007AFF" }}
                title="클릭하여 삭제"
              >
                {tag}
                <span className="w-4 h-4 rounded-full bg-white/70 text-gray-400 flex items-center justify-center text-[10px] group-hover:text-red-500 transition-colors">
                  ×
                </span>
              </button>
            ))}
          </div>
        </Card>
      );
    }

    // ========================================
    // ✨ AI Recipe Generation Banner
    // ========================================

    function AIRecipeBanner({ ingredients, onGenerate }) {
      return (
        <div className="rounded-3xl border border-blue-100 p-5 animate-fade-in"
             style={{ background: "linear-gradient(135deg, #eff6ff 0%, #eef2ff 100%)" }}>
          <div className="flex items-center justify-between gap-4 flex-wrap">
            <div className="flex items-start gap-3 flex-1 min-w-0">
              <div className="w-10 h-10 rounded-2xl bg-white flex items-center justify-center text-lg shrink-0 apple-card-shadow">
                ✨
              </div>
              <div className="flex-1 min-w-0">
                <h3 className="text-[15px] font-semibold tracking-tight">
                  AI가 새로운 레시피를 만들어 드려요
                </h3>
                <p className="text-[12px] text-gray-500 mt-0.5">
                  선택한 재료 {ingredients.length}개로 맞춤 레시피를 생성합니다
                </p>
                <div className="flex flex-wrap gap-1.5 mt-2.5">
                  {ingredients.slice(0, 6).map((tag) => (
                    <span key={tag}
                          className="inline-flex items-center px-2 py-0.5 rounded-full bg-white/80 text-[11px] font-medium"
                          style={{ color: "#007AFF" }}>
                      {tag}
                    </span>
                  ))}
                  {ingredients.length > 6 && (
                    <span className="inline-flex items-center px-2 py-0.5 rounded-full bg-white/80 text-[11px] font-medium text-gray-500">
                      +{ingredients.length - 6}
                    </span>
                  )}
                </div>
              </div>
            </div>
            <Button variant="primary" size="md" onClick={onGenerate} className="shrink-0 whitespace-nowrap">
              ✨ 레시피 생성하기
            </Button>
          </div>
        </div>
      );
    }

    // ========================================
    // ✨ AI Recipe Generation Modal
    // ========================================

    const GENERATION_STEPS = [
      { icon: "🔍", label: "재료 분석 중..." },
      { icon: "🧠", label: "레시피 구상 중..." },
      { icon: "✍️", label: "레시피 작성 중..." }
    ];

    function pickMockRecipe(ingredients) {
      const has = (name) => ingredients.some((t) => t.includes(name));
      if (has("김치") && has("계란")) {
        return {
          name: "계란 김치 리조또",
          emoji: "🍲",
          time: "25분",
          difficulty: "쉬움",
          summary: "볶은 김치의 감칠맛과 계란의 부드러움이 어우러진 한식 리조또입니다.",
          ingredients: [
            "밥 1공기",
            "김치 1/2컵 (잘게 썬 것)",
            "계란 2개",
            "양파 1/4개",
            "우유 100ml",
            "버터 1큰술",
            "파마산 치즈 약간",
            "소금·후추 약간"
          ],
          steps: [
            "양파는 잘게 다지고, 김치는 물기를 짜서 잘게 썰어 주세요.",
            "팬에 버터를 녹이고 양파를 투명해질 때까지 볶은 뒤 김치를 넣고 1분간 볶아 주세요.",
            "밥을 넣고 우유를 부어 약한 불에서 3분간 저어가며 끓여 주세요.",
            "소금·후추로 간하고 파마산 치즈를 넣어 풍미를 더합니다.",
            "계란프라이를 올리고 노른자를 터뜨려 섞어 드세요."
          ]
        };
      }
      if (has("계란")) {
        return {
          name: "촉촉 계란 스크램블",
          emoji: "🍳",
          time: "10분",
          difficulty: "쉬움",
          summary: "약한 불에서 천천히 익혀 부드럽고 촉촉한 스크램블 에그입니다.",
          ingredients: ["계란 3개", "우유 2큰술", "버터 1큰술", "소금·후추 약간", "파슬리 약간"],
          steps: [
            "계란을 풀고 우유·소금·후추를 넣어 잘 섞어 주세요.",
            "팬에 버터를 녹이고 약한 불에서 계란물을 부어 주세요.",
            "주걱으로 천천히 저으며 부드럽게 익혀 주세요.",
            "70% 정도 익었을 때 불을 끄고 잔열로 마무리해 주세요."
          ]
        };
      }
      return {
        name: ingredients[0] ? `${ingredients[0]} 한그릇 요리` : "오늘의 한그릇",
        emoji: "🥘",
        time: "20분",
        difficulty: "쉬움",
        summary: "선택한 재료로 만드는 간단한 한그릇 요리입니다.",
        ingredients: ingredients.length ? ingredients.map((i) => `${i} 적당량`) : ["원하는 재료 적당량"],
        steps: [
          "재료를 먹기 좋은 크기로 손질해 주세요.",
          "팬에 기름을 두르고 단단한 재료부터 차례로 볶아 주세요.",
          "소금과 후추로 간을 맞추고, 마지막에 참기름으로 향을 더해 완성합니다."
        ]
      };
    }

    function AIRecipeModal({ isOpen, onClose, ingredients }) {
      const [stepIndex, setStepIndex] = useState(0);
      const [done, setDone] = useState(false);
      const [recipe, setRecipe] = useState(null);
      const [regenKey, setRegenKey] = useState(0);

      useEffect(() => {
        if (!isOpen) return;
        setStepIndex(0);
        setDone(false);
        setRecipe(null);

        const timers = [];
        timers.push(setTimeout(() => setStepIndex(1), 1000));
        timers.push(setTimeout(() => setStepIndex(2), 2000));
        timers.push(setTimeout(() => {
          setStepIndex(3);
          setRecipe(pickMockRecipe(ingredients));
          setDone(true);
        }, 3000));

        return () => timers.forEach(clearTimeout);
      }, [isOpen, regenKey]);

      function handleRegenerate() {
        setRegenKey((k) => k + 1);
      }

      function handleSave() {
        // mock: 저장 피드백
        alert("레시피가 저장되었습니다! (데모)");
      }

      if (!isOpen) return null;

      return (
        <Modal isOpen={isOpen} onClose={onClose} maxWidth="max-w-lg">
          <div className="flex items-center justify-between px-6 pt-5 pb-3 border-b border-gray-100">
            <div className="flex items-center gap-2">
              <span className="text-lg">✨</span>
              <h3 className="text-[16px] font-semibold">AI 레시피 생성</h3>
            </div>
            <button onClick={onClose}
                    className="w-8 h-8 rounded-full hover:bg-gray-100 flex items-center justify-center text-gray-400 hover:text-gray-700 transition-colors">
              ×
            </button>
          </div>

          {!done ? (
            <div className="px-6 py-10 min-h-[360px] flex flex-col items-center justify-center">
              <div className="w-20 h-20 rounded-full flex items-center justify-center text-3xl mb-6 animate-pulse-glow"
                   style={{ background: "linear-gradient(135deg, #eff6ff, #eef2ff)" }}>
                {GENERATION_STEPS[Math.min(stepIndex, GENERATION_STEPS.length - 1)].icon}
              </div>
              <div className="w-full max-w-xs space-y-3">
                {GENERATION_STEPS.map((s, i) => {
                  const active = i === stepIndex;
                  const completed = i < stepIndex;
                  return (
                    <div key={i}
                         className={`flex items-center gap-3 px-4 py-2.5 rounded-2xl transition-all duration-300
                           ${active ? "bg-blue-50" : completed ? "bg-gray-50" : "bg-transparent"}`}>
                      <div className={`w-6 h-6 rounded-full flex items-center justify-center text-[11px] shrink-0
                        ${completed ? "text-white" : active ? "text-white" : "bg-gray-100 text-gray-400"}`}
                           style={completed || active ? { backgroundColor: "#007AFF" } : {}}>
                        {completed ? "✓" : i + 1}
                      </div>
                      <span className={`text-[13px] ${active ? "font-semibold shimmer-text" : completed ? "text-gray-500" : "text-gray-400"}`}>
                        {s.label}
                      </span>
                    </div>
                  );
                })}
              </div>
            </div>
          ) : (
            <div className="max-h-[70vh] overflow-y-auto nice-scroll animate-fade-in">
              <div className="px-6 py-5">
                <div className="flex items-start gap-3 mb-3">
                  <div className="w-14 h-14 rounded-2xl bg-gradient-to-br from-blue-50 to-indigo-50 flex items-center justify-center text-3xl shrink-0">
                    {recipe.emoji}
                  </div>
                  <div className="flex-1 min-w-0">
                    <h4 className="text-[17px] font-semibold tracking-tight">{recipe.name}</h4>
                    <div className="flex flex-wrap gap-1.5 mt-1.5">
                      <Badge color="blue">⏱ {recipe.time}</Badge>
                      <Badge color="green">★ {recipe.difficulty}</Badge>
                      <Badge color="orange">AI 생성</Badge>
                    </div>
                  </div>
                </div>
                <p className="text-[13px] text-gray-600 leading-relaxed mb-5">{recipe.summary}</p>

                <div className="mb-5">
                  <h5 className="text-[13px] font-semibold mb-2 text-gray-800">재료</h5>
                  <ul className="bg-gray-50 rounded-2xl p-4 space-y-1.5">
                    {recipe.ingredients.map((ing, i) => (
                      <li key={i} className="text-[13px] text-gray-700 flex items-start gap-2">
                        <span className="text-gray-400 mt-0.5">•</span>
                        <span>{ing}</span>
                      </li>
                    ))}
                  </ul>
                </div>

                <div>
                  <h5 className="text-[13px] font-semibold mb-2 text-gray-800">조리 순서</h5>
                  <ol className="space-y-2.5">
                    {recipe.steps.map((step, i) => (
                      <li key={i} className="flex gap-3">
                        <span className="w-6 h-6 rounded-full text-white text-[11px] font-semibold flex items-center justify-center shrink-0 mt-0.5"
                              style={{ backgroundColor: "#007AFF" }}>
                          {i + 1}
                        </span>
                        <p className="text-[13px] text-gray-700 leading-relaxed flex-1">{step}</p>
                      </li>
                    ))}
                  </ol>
                </div>
              </div>

              <div className="sticky bottom-0 bg-white/95 apple-blur border-t border-gray-100 px-6 py-3 flex gap-2">
                <Button variant="secondary" className="flex-1" onClick={handleRegenerate}>
                  🔄 다시 생성하기
                </Button>
                <Button variant="primary" className="flex-1" onClick={handleSave}>
                  💾 저장하기
                </Button>
              </div>
            </div>
          )}
        </Modal>
      );
    }

    // ========================================
    // 🍳 Mock Recipe List
    // ========================================

    const MOCK_RECIPES = [
      { id: 1, name: "김치볶음밥", emoji: "🍚", time: "15분", difficulty: "쉬움", tags: ["김치", "계란", "양파"] },
      { id: 2, name: "계란말이", emoji: "🍳", time: "10분", difficulty: "쉬움", tags: ["계란", "양파"] },
      { id: 3, name: "된장찌개", emoji: "🍲", time: "20분", difficulty: "보통", tags: ["두부", "양파"] }
    ];

    function RecipeList({ ingredients }) {
      const filtered = useMemo(() => {
        if (ingredients.length === 0) return MOCK_RECIPES;
        return MOCK_RECIPES.map((r) => ({
          ...r,
          matchCount: r.tags.filter((t) => ingredients.includes(t)).length
        })).sort((a, b) => b.matchCount - a.matchCount);
      }, [ingredients]);

      return (
        <Card className="p-5">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-[15px] font-semibold">추천 레시피</h2>
            <span className="text-[11px] text-gray-400">{filtered.length}개</span>
          </div>
          <div className="grid sm:grid-cols-2 lg:grid-cols-3 gap-3">
            {filtered.map((r) => (
              <div key={r.id}
                   className="rounded-2xl bg-gray-50 p-4 hover:bg-gray-100 transition-colors cursor-pointer">
                <div className="text-3xl mb-2">{r.emoji}</div>
                <h4 className="text-[14px] font-semibold mb-1">{r.name}</h4>
                <div className="flex gap-1.5 mb-2">
                  <Badge color="blue" className="text-[10px]">⏱ {r.time}</Badge>
                  <Badge color="green" className="text-[10px]">★ {r.difficulty}</Badge>
                </div>
                <div className="flex flex-wrap gap-1">
                  {r.tags.map((t) => (
                    <span key={t}
                          className={`text-[10px] px-1.5 py-0.5 rounded-full ${ingredients.includes(t) ? "text-white" : "bg-white text-gray-500"}`}
                          style={ingredients.includes(t) ? { backgroundColor: "#007AFF" } : {}}>
                      {t}
                    </span>
                  ))}
                </div>
              </div>
            ))}
          </div>
        </Card>
      );
    }

    // ========================================
    // 👨‍🍳 AI Chef Chat
    // ========================================

    const MOCK_AI_REPLIES = [
      "좋은 질문이에요! 남은 재료를 활용하려면 볶음밥이나 덮밥류가 가장 실용적이에요. 재료 종류만 알려주시면 맞춤 레시피를 찾아드릴게요 🍳",
      "그 재료로는 국물요리도 훌륭해요. 간단한 된장국이나 계란국은 10분이면 완성된답니다 🥣",
      "조리 시간을 단축하려면 전자레인지와 프라이팬을 병행하는 것이 좋아요. 구체적인 재료를 말씀해 주시면 더 정확히 도와드릴게요 ✨"
    ];

    function ChatMessage({ role, text }) {
      const isUser = role === "user";
      return (
        <div className={`flex ${isUser ? "justify-end animate-slide-in-right" : "justify-start animate-slide-in-left"}`}>
          {!isUser && (
            <div className="w-7 h-7 rounded-full bg-gradient-to-br from-blue-50 to-indigo-50 flex items-center justify-center text-[13px] mr-2 shrink-0">
              👨‍🍳
            </div>
          )}
          <div className={`max-w-[75%] px-3.5 py-2.5 text-[13.5px] leading-relaxed whitespace-pre-wrap
            ${isUser ? "text-white rounded-[18px] rounded-br-md" : "bg-gray-100 text-gray-800 rounded-[18px] rounded-bl-md"}`}
               style={isUser ? { backgroundColor: "#007AFF" } : {}}>
            {text}
          </div>
        </div>
      );
    }

    function TypingIndicator() {
      return (
        <div className="flex justify-start animate-slide-in-left">
          <div className="w-7 h-7 rounded-full bg-gradient-to-br from-blue-50 to-indigo-50 flex items-center justify-center text-[13px] mr-2 shrink-0">
            👨‍🍳
          </div>
          <div className="bg-gray-100 rounded-[18px] rounded-bl-md px-4 py-3 flex items-center">
            <span className="typing-dot"></span>
            <span className="typing-dot"></span>
            <span className="typing-dot"></span>
          </div>
        </div>
      );
    }

    function AIChefChat({ isOpen, onClose }) {
      const [messages, setMessages] = useState([
        { id: 1, role: "ai", text: "안녕하세요! 저는 AI 셰프예요 👨‍🍳 재료나 요리에 대해 무엇이든 물어보세요!" },
        { id: 2, role: "user", text: "계란이랑 김치로 뭐 만들 수 있어요?" },
        { id: 3, role: "ai", text: "계란과 김치로 만들 수 있는 요리가 많아요! 김치볶음밥에 계란프라이를 올리거나, 김치 계란말이, 김치 스크램블 에그도 맛있어요 😋" }
      ]);
      const [input, setInput] = useState("");
      const [typing, setTyping] = useState(false);
      const scrollRef = useRef(null);
      const replyIndexRef = useRef(0);

      useEffect(() => {
        if (scrollRef.current) {
          scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
        }
      }, [messages, typing]);

      function handleSend(e) {
        if (e) e.preventDefault();
        const trimmed = input.trim();
        if (!trimmed || typing) return;

        const userMsg = { id: Date.now(), role: "user", text: trimmed };
        setMessages((prev) => [...prev, userMsg]);
        setInput("");
        setTyping(true);

        setTimeout(() => {
          const reply = MOCK_AI_REPLIES[replyIndexRef.current % MOCK_AI_REPLIES.length];
          replyIndexRef.current += 1;
          setMessages((prev) => [...prev, { id: Date.now() + 1, role: "ai", text: reply }]);
          setTyping(false);
        }, 1500);
      }

      function onKeyDown(e) {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          handleSend();
        }
      }

      if (!isOpen) return null;

      return (
        <Modal isOpen={isOpen} onClose={onClose} maxWidth="max-w-md">
          <div className="flex flex-col" style={{ height: "560px" }}>
            {/* Header */}
            <div className="flex items-center justify-between px-5 py-4 border-b border-gray-100">
              <div className="flex items-center gap-2.5">
                <div className="w-9 h-9 rounded-2xl bg-gradient-to-br from-blue-50 to-indigo-50 flex items-center justify-center text-lg">
                  👨‍🍳
                </div>
                <div>
                  <h3 className="text-[15px] font-semibold tracking-tight">AI 셰프</h3>
                  <p className="text-[11px] text-gray-500 -mt-0.5 flex items-center gap-1">
                    <span className="w-1.5 h-1.5 rounded-full bg-green-500"></span>
                    온라인
                  </p>
                </div>
              </div>
              <button onClick={onClose}
                      className="w-8 h-8 rounded-full hover:bg-gray-100 flex items-center justify-center text-gray-400 hover:text-gray-700 transition-colors">
                ×
              </button>
            </div>

            {/* Messages */}
            <div ref={scrollRef} className="flex-1 overflow-y-auto nice-scroll px-5 py-4 space-y-3"
                 style={{ background: "#fafafa" }}>
              {messages.map((m) => (
                <ChatMessage key={m.id} role={m.role} text={m.text} />
              ))}
              {typing && <TypingIndicator />}
            </div>

            {/* Input */}
            <form onSubmit={handleSend}
                  className="flex items-center gap-2 px-4 py-3 border-t border-gray-100 bg-white">
              <input
                value={input}
                onChange={(e) => setInput(e.target.value)}
                onKeyDown={onKeyDown}
                placeholder="무엇이든 물어보세요..."
                className="flex-1 px-4 py-2.5 text-[14px] bg-gray-100 rounded-full
                  focus:outline-none focus:ring-2 focus:ring-blue-200 focus:bg-white
                  placeholder:text-gray-400 transition-all duration-200"
              />
              <button type="submit"
                      disabled={!input.trim() || typing}
                      className="w-10 h-10 rounded-full flex items-center justify-center text-white shrink-0 transition-all duration-200 active:scale-95 disabled:opacity-40 disabled:cursor-not-allowed"
                      style={{ backgroundColor: "#007AFF" }}>
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M12 19V5M5 12l7-7 7 7"/>
                </svg>
              </button>
            </form>
          </div>
        </Modal>
      );
    }

    function AIChefFAB({ onClick, hidden }) {
      if (hidden) return null;
      return (
        <button
          onClick={onClick}
          aria-label="AI 셰프에게 물어보기"
          className="fab fixed bottom-6 right-6 z-40 w-14 h-14 rounded-full flex items-center justify-center text-2xl fab-shadow hover:fab-shadow-hover"
          style={{ backgroundColor: "#007AFF" }}
        >
          <span className="drop-shadow-sm">👨‍🍳</span>
        </button>
      );
    }

    // ========================================
    // 🚀 App
    // ========================================

    function App() {
      const [ingredients, setIngredients] = useState(["계란", "김치", "양파"]);
      const [chatOpen, setChatOpen] = useState(false);
      const [recipeModalOpen, setRecipeModalOpen] = useState(false);

      const addIngredient = useCallback((tag) => {
        setIngredients((prev) => (prev.includes(tag) ? prev : [...prev, tag]));
      }, []);

      const removeIngredient = useCallback((tag) => {
        setIngredients((prev) => prev.filter((t) => t !== tag));
      }, []);

      return (
        <div className="min-h-screen">
          <Header ingredientCount={ingredients.length} />

          <main className="max-w-5xl mx-auto px-5 py-6 space-y-5">
            <IngredientPicker
              ingredients={ingredients}
              onAdd={addIngredient}
              onRemove={removeIngredient}
            />

            {ingredients.length > 0 && (
              <AIRecipeBanner
                ingredients={ingredients}
                onGenerate={() => setRecipeModalOpen(true)}
              />
            )}

            <RecipeList ingredients={ingredients} />

            <p className="text-center text-[11px] text-gray-400 pt-4 pb-24">
              · AI 기능 프로토타입 — Mock 데이터로 동작합니다 ·
            </p>
          </main>

          <AIChefFAB onClick={() => setChatOpen(true)} hidden={chatOpen} />

          <AIChefChat isOpen={chatOpen} onClose={() => setChatOpen(false)} />

          <AIRecipeModal
            isOpen={recipeModalOpen}
            onClose={() => setRecipeModalOpen(false)}
            ingredients={ingredients}
          />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
