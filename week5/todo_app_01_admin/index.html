                            <div className="min-w-0">
                              <div className="flex items-center gap-2">
                                <p className="font-medium tracking-tight truncate">{u.name || '-'}</p>
                                {isSelf && <Badge variant="outline">나</Badge>}
                              </div>
                              <p className="text-xs text-zinc-500 dark:text-zinc-400 truncate">{u.email}</p>
                            </div>
                          </div>
                          <Badge variant="secondary">{u.todo_count ?? 0}건</Badge>
                        </div>
                        <div className="flex items-center gap-2">
                          <Badge variant={u.role}>{roleLabel(u.role)}</Badge>
                          <div className="flex-1">
                            <Select
                              value={u.role}
                              onChange={e => changeRole(u, e.target.value)}
                              disabled={!canEdit || busy}
                              title={!canEdit ? 'super_admin 권한이 필요합니다.' : undefined}
                              aria-label={`${u.name || u.email} 역할 변경`}
                            >
                              {ROLES.map(r => <option key={r.value} value={r.value}>{r.label}</option>)}
                            </Select>
                          </div>
                          <Button
                            variant="outline"
                            size="icon"
                            onClick={() => askDelete(u)}
                            disabled={!canEdit || isSelf}
                            title={
                              !canEdit ? 'super_admin 권한이 필요합니다.' :
                              isSelf ? '본인 계정은 삭제할 수 없습니다.' : undefined
                            }
                            aria-label={`${u.name || u.email} 삭제`}
                          >
                            <IconTrash/>
                          </Button>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </React.Fragment>
            )}
          </CardContent>

          {confirmCfg && (
            <ConfirmDialog
              open={confirmOpen}
              onOpenChange={setConfirmOpen}
              title={confirmCfg.title}
              description={confirmCfg.description}
              confirmLabel={confirmCfg.confirmLabel}
              onConfirm={confirmCfg.onConfirm}
              submitting={confirmBusy}
            />
          )}
        </Card>
      );
    };

    // ========================================
    // 🚀 AdminApp (authed)
    // ========================================
    const AdminApp = ({ currentUser, onLogout }) => {
      const toast = useToast();
      const [tab, setTab]         = useState('dashboard');

      const [stats, setStats]     = useState(null);
      const [todos, setTodos]     = useState([]);
      const [users, setUsers]     = useState([]);

      const [loadingStats, setLoadingStats] = useState(true);
      const [loadingTodos, setLoadingTodos] = useState(true);
      const [loadingUsers, setLoadingUsers] = useState(true);

      const todosNewRef = useRef(null);

      const loadStats = useCallback(async () => {
        setLoadingStats(true);
        try {
          const data = await api('/admin/stats');
          setStats(data);
        } catch (err) {
          toast.error(`통계 로드 실패: ${err.message}`);
        } finally {
          setLoadingStats(false);
        }
      }, [toast]);

      const loadTodos = useCallback(async () => {
        setLoadingTodos(true);
        try {
          const data = await api('/admin/todos');
          setTodos(Array.isArray(data) ? data : []);
        } catch (err) {
          toast.error(`할일 로드 실패: ${err.message}`);
        } finally {
          setLoadingTodos(false);
        }
      }, [toast]);

      const loadUsers = useCallback(async () => {
        setLoadingUsers(true);
        try {
          const data = await api('/admin/users');
          setUsers(Array.isArray(data) ? data : []);
        } catch (err) {
          toast.error(`사용자 로드 실패: ${err.message}`);
        } finally {
          setLoadingUsers(false);
        }
      }, [toast]);

      const reloadAll = useCallback(async () => {
        await Promise.all([loadStats(), loadTodos(), loadUsers()]);
      }, [loadStats, loadTodos, loadUsers]);

      // reload after todo CUD
      const reloadAfterTodoMutation = useCallback(async () => {
        await Promise.all([loadStats(), loadTodos(), loadUsers()]);
      }, [loadStats, loadTodos, loadUsers]);

      // reload after user CUD
      const reloadAfterUserMutation = useCallback(async () => {
        await Promise.all([loadStats(), loadUsers()]);
      }, [loadStats, loadUsers]);

      useEffect(() => {
        reloadAll();
      }, [reloadAll]);

      const handleNewTodo = () => {
        setTab('todos');
        setTimeout(() => { todosNewRef.current && todosNewRef.current(); }, 0);
      };

      return (
        <div className="min-h-screen bg-white text-zinc-950 dark:bg-zinc-950 dark:text-zinc-50">
          <Header onNewTodo={handleNewTodo} user={currentUser} onLogout={onLogout}/>
          <main className="mx-auto max-w-7xl px-4 py-6 sm:px-6 sm:py-8">
            <div className="mb-6 flex flex-col gap-2 sm:flex-row sm:items-end sm:justify-between">
              <div>
                <h1 className="text-2xl font-semibold tracking-tight">관리자 대시보드</h1>
                <p className="text-sm text-zinc-500 dark:text-zinc-400">팀의 할일과 사용자 현황을 한 곳에서 관리하세요.</p>
              </div>
              <div className="text-xs text-zinc-500 dark:text-zinc-400">
                로그인 역할: <Badge variant={currentUser?.role || 'outline'}>{roleLabel(currentUser?.role || '')}</Badge>
              </div>
            </div>

            <Tabs value={tab} onValueChange={setTab}>
              <TabsList>
                <TabsTrigger value="dashboard"><IconLayout/> Dashboard</TabsTrigger>
                <TabsTrigger value="todos"><IconListTodo/> Todos</TabsTrigger>
                <TabsTrigger value="users"><IconUsers/> Users</TabsTrigger>
              </TabsList>

              <TabsContent value="dashboard">
                <Dashboard
                  stats={stats}
                  loading={loadingStats}
                  onJumpTodos={() => setTab('todos')}
                />
              </TabsContent>

              <TabsContent value="todos">
                <TodosPage
                  todos={todos}
                  users={users}
                  loading={loadingTodos || loadingUsers}
                  reload={reloadAfterTodoMutation}
                  onRequestNew={todosNewRef}
                />
              </TabsContent>

              <TabsContent value="users">
                <UsersPage
                  users={users}
                  currentUser={currentUser}
                  loading={loadingUsers}
                  reload={reloadAfterUserMutation}
                />
              </TabsContent>
            </Tabs>

            <Separator className="my-10"/>
            <footer className="pb-8 text-center text-xs text-zinc-500 dark:text-zinc-400">
              Todo Admin · shadcn-inspired UI · Built with React + Tailwind
            </footer>
          </main>
        </div>
      );
    };

    // ========================================
    // 🚀 App (Login / Admin gate)
    // ========================================
    const App = () => {
      const { token, user, isAuthed, login, logout } = useAuth();

      // 토큰은 있지만 role이 관리자 아닌 경우에 대한 방어
      useEffect(() => {
        if (isAuthed && !isAdminRole(user?.role)) {
          logout();
        }
      }, [isAuthed, user, logout]);

      if (!isAuthed || !isAdminRole(user?.role)) {
        return <LoginScreen onLogin={login}/>;
      }
      return <AdminApp currentUser={user} onLogout={logout}/>;
    };

    // ========================================
    // Render
    // ========================================
    ReactDOM.createRoot(document.getElementById('root')).render(
      <ThemeProvider>
        <ToastProvider>
          <App/>
        </ToastProvider>
      </ThemeProvider>
    );
  </script>
</body>
</html>
