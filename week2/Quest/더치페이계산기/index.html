<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>더치페이 계산기</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap');
    body { font-family: 'Noto Sans KR', sans-serif; }
    .fade-in { animation: fadeIn 0.3s ease-in-out; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .step-line { height: 2px; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">
  <div id="root"></div>
  <script type="text/babel">
    // ========================================
    // React Hooks Destructuring
    // ========================================
    const { useState, useCallback, useMemo } = React;

    // ========================================
    // Design System Components
    // ========================================
    function Button({ children, variant = 'primary', size = 'md', disabled = false, onClick, className = '', type = 'button' }) {
      const base = 'inline-flex items-center justify-center font-medium rounded-xl transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-offset-2';
      const variants = {
        primary: 'bg-indigo-600 text-white hover:bg-indigo-700 focus:ring-indigo-500 shadow-md hover:shadow-lg',
        secondary: 'bg-white text-gray-700 border border-gray-300 hover:bg-gray-50 focus:ring-indigo-500',
        danger: 'bg-red-500 text-white hover:bg-red-600 focus:ring-red-500',
        ghost: 'text-gray-500 hover:text-gray-700 hover:bg-gray-100 focus:ring-gray-500',
        success: 'bg-emerald-600 text-white hover:bg-emerald-700 focus:ring-emerald-500 shadow-md',
      };
      const sizes = {
        sm: 'px-3 py-1.5 text-sm',
        md: 'px-5 py-2.5 text-sm',
        lg: 'px-6 py-3 text-base',
      };
      return (
        <button
          type={type}
          className={`${base} ${variants[variant]} ${sizes[size]} ${disabled ? 'opacity-50 cursor-not-allowed' : 'cursor-pointer'} ${className}`}
          disabled={disabled}
          onClick={onClick}
        >
          {children}
        </button>
      );
    }

    function Input({ label, value, onChange, placeholder, type = 'text', error, className = '', disabled = false }) {
      return (
        <div className={className}>
          {label && <label className="block text-sm font-medium text-gray-700 mb-1.5">{label}</label>}
          <input
            type={type}
            value={value}
            onChange={onChange}
            placeholder={placeholder}
            disabled={disabled}
            className={`w-full px-4 py-2.5 rounded-xl border ${error ? 'border-red-400 focus:ring-red-500' : 'border-gray-300 focus:ring-indigo-500'} focus:outline-none focus:ring-2 focus:border-transparent transition-all duration-200 text-sm ${disabled ? 'bg-gray-100 text-gray-400' : 'bg-white'}`}
          />
          {error && <p className="mt-1 text-xs text-red-500">{error}</p>}
        </div>
      );
    }

    function Card({ children, className = '' }) {
      return (
        <div className={`bg-white rounded-2xl shadow-sm border border-gray-100 p-6 ${className}`}>
          {children}
        </div>
      );
    }

    function Badge({ children, variant = 'default', className = '' }) {
      const variants = {
        default: 'bg-gray-100 text-gray-700',
        primary: 'bg-indigo-100 text-indigo-700',
        success: 'bg-emerald-100 text-emerald-700',
        warning: 'bg-amber-100 text-amber-700',
        danger: 'bg-red-100 text-red-700',
      };
      return (
        <span className={`inline-flex items-center px-2.5 py-1 rounded-full text-xs font-medium ${variants[variant]} ${className}`}>
          {children}
        </span>
      );
    }

    // ========================================
    // Common / Layout Components
    // ========================================
    function StepIndicator({ currentStep, steps }) {
      return (
        <div className="flex items-center justify-center mb-8">
          {steps.map((step, index) => {
            const isActive = index === currentStep;
            const isCompleted = index < currentStep;
            return (
              <React.Fragment key={index}>
                <div className="flex flex-col items-center">
                  <div className={`w-10 h-10 rounded-full flex items-center justify-center text-sm font-semibold transition-all duration-300 ${
                    isActive ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-200 scale-110' :
                    isCompleted ? 'bg-indigo-600 text-white' : 'bg-gray-200 text-gray-500'
                  }`}>
                    {isCompleted ? (
                      <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2.5} d="M5 13l4 4L19 7" />
                      </svg>
                    ) : index + 1}
                  </div>
                  <span className={`mt-2 text-xs font-medium hidden sm:block ${isActive ? 'text-indigo-600' : isCompleted ? 'text-indigo-600' : 'text-gray-400'}`}>
                    {step}
                  </span>
                </div>
                {index < steps.length - 1 && (
                  <div className={`step-line w-12 sm:w-20 mx-1 sm:mx-2 mt-[-1.2rem] sm:mt-[-1.2rem] ${isCompleted ? 'bg-indigo-600' : 'bg-gray-200'}`} />
                )}
              </React.Fragment>
            );
          })}
        </div>
      );
    }

    function StepNavigation({ currentStep, totalSteps, onPrev, onNext, nextDisabled, nextLabel }) {
      return (
        <div className="flex justify-between mt-8">
          {currentStep > 0 ? (
            <Button variant="secondary" onClick={onPrev}>
              <svg className="w-4 h-4 mr-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 19l-7-7 7-7" /></svg>
              이전
            </Button>
          ) : <div />}
          {currentStep < totalSteps - 1 && (
            <Button onClick={onNext} disabled={nextDisabled}>
              {nextLabel || '다음'}
              <svg className="w-4 h-4 ml-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5l7 7-7 7" /></svg>
            </Button>
          )}
        </div>
      );
    }

    // ========================================
    // Utility: 금액 포맷
    // ========================================
    function formatMoney(amount) {
      return Math.round(amount).toLocaleString('ko-KR');
    }

    // ========================================
    // Step 1 - 인원 설정
    // ========================================
    function StepPeople({ people, setPeople }) {
      const [count, setCount] = useState(people.length || 2);

      const handleCountChange = useCallback((newCount) => {
        const c = Math.max(2, Math.min(20, newCount));
        setCount(c);
        setPeople(prev => {
          const arr = [...prev];
          if (c > arr.length) {
            for (let i = arr.length; i < c; i++) {
              arr.push({ name: '', menus: [] });
            }
          } else {
            arr.length = c;
          }
          return arr;
        });
      }, [setPeople]);

      const handleNameChange = useCallback((index, name) => {
        setPeople(prev => prev.map((p, i) => i === index ? { ...p, name } : p));
      }, [setPeople]);

      // 초기 동기화
      useMemo(() => {
        if (people.length === 0) handleCountChange(2);
      }, []);

      return (
        <div className="fade-in">
          <h2 className="text-xl font-bold text-gray-800 mb-1">인원 설정</h2>
          <p className="text-sm text-gray-500 mb-6">함께 식사한 인원수와 이름을 입력해주세요.</p>

          <div className="flex items-center gap-4 mb-6">
            <span className="text-sm font-medium text-gray-700">인원수</span>
            <div className="flex items-center gap-2">
              <Button variant="secondary" size="sm" onClick={() => handleCountChange(count - 1)} disabled={count <= 2}>
                <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M20 12H4" /></svg>
              </Button>
              <span className="w-10 text-center text-lg font-bold text-indigo-600">{count}</span>
              <Button variant="secondary" size="sm" onClick={() => handleCountChange(count + 1)} disabled={count >= 20}>
                <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4" /></svg>
              </Button>
            </div>
            <span className="text-sm text-gray-400">명</span>
          </div>

          <div className="grid gap-3 sm:grid-cols-2">
            {people.map((person, index) => (
              <div key={index} className="flex items-center gap-3">
                <div className="w-8 h-8 rounded-full bg-indigo-100 text-indigo-600 flex items-center justify-center text-sm font-bold flex-shrink-0">
                  {index + 1}
                </div>
                <Input
                  value={person.name}
                  onChange={(e) => handleNameChange(index, e.target.value)}
                  placeholder={`참가자 ${index + 1}`}
                  className="flex-1"
                />
              </div>
            ))}
          </div>
        </div>
      );
    }

    // ========================================
    // Step 2 - 메뉴 입력
    // ========================================
    function StepMenus({ people, setPeople }) {
      const [activeTab, setActiveTab] = useState(0);

      const getName = useCallback((person, index) => {
        return person.name.trim() || `참가자 ${index + 1}`;
      }, []);

      const addMenu = useCallback((personIndex) => {
        setPeople(prev => prev.map((p, i) =>
          i === personIndex ? { ...p, menus: [...p.menus, { name: '', price: '' }] } : p
        ));
      }, [setPeople]);

      const removeMenu = useCallback((personIndex, menuIndex) => {
        setPeople(prev => prev.map((p, i) =>
          i === personIndex ? { ...p, menus: p.menus.filter((_, mi) => mi !== menuIndex) } : p
        ));
      }, [setPeople]);

      const updateMenu = useCallback((personIndex, menuIndex, field, value) => {
        setPeople(prev => prev.map((p, i) =>
          i === personIndex ? {
            ...p,
            menus: p.menus.map((m, mi) => mi === menuIndex ? { ...m, [field]: value } : m)
          } : p
        ));
      }, [setPeople]);

      const activePerson = people[activeTab];
      const personTotal = useMemo(() => {
        if (!activePerson) return 0;
        return activePerson.menus.reduce((sum, m) => sum + (parseInt(m.price) || 0), 0);
      }, [activePerson]);

      return (
        <div className="fade-in">
          <h2 className="text-xl font-bold text-gray-800 mb-1">메뉴 입력</h2>
          <p className="text-sm text-gray-500 mb-6">각 인원이 먹은 메뉴와 가격을 입력해주세요.</p>

          {/* 탭 */}
          <div className="flex gap-1.5 mb-5 overflow-x-auto pb-2">
            {people.map((person, index) => {
              const hasMenus = person.menus.length > 0;
              return (
                <button
                  key={index}
                  onClick={() => setActiveTab(index)}
                  className={`flex-shrink-0 px-4 py-2 rounded-xl text-sm font-medium transition-all duration-200 ${
                    activeTab === index
                      ? 'bg-indigo-600 text-white shadow-md'
                      : hasMenus
                        ? 'bg-indigo-50 text-indigo-600 hover:bg-indigo-100'
                        : 'bg-gray-100 text-gray-500 hover:bg-gray-200'
                  }`}
                >
                  {getName(person, index)}
                  {hasMenus && activeTab !== index && (
                    <span className="ml-1.5 text-xs opacity-75">({person.menus.length})</span>
                  )}
                </button>
              );
            })}
          </div>

          {/* 메뉴 목록 */}
          {activePerson && (
            <Card>
              <div className="flex items-center justify-between mb-4">
                <h3 className="font-semibold text-gray-800">
                  {getName(activePerson, activeTab)}의 메뉴
                </h3>
                <Button variant="primary" size="sm" onClick={() => addMenu(activeTab)}>
                  <svg className="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4" /></svg>
                  메뉴 추가
                </Button>
              </div>

              {activePerson.menus.length === 0 ? (
                <div className="text-center py-8 text-gray-400">
                  <svg className="w-12 h-12 mx-auto mb-3 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M12 6v6m0 0v6m0-6h6m-6 0H6" />
                  </svg>
                  <p className="text-sm">메뉴 추가 버튼을 눌러 메뉴를 등록해주세요.</p>
                </div>
              ) : (
                <div className="space-y-3">
                  {activePerson.menus.map((menu, menuIndex) => (
                    <div key={menuIndex} className="flex items-center gap-2 sm:gap-3">
                      <Input
                        value={menu.name}
                        onChange={(e) => updateMenu(activeTab, menuIndex, 'name', e.target.value)}
                        placeholder="메뉴명"
                        className="flex-1"
                      />
                      <div className="relative flex-1">
                        <input
                          type="number"
                          value={menu.price}
                          onChange={(e) => updateMenu(activeTab, menuIndex, 'price', e.target.value)}
                          placeholder="가격"
                          className="w-full px-4 py-2.5 pr-8 rounded-xl border border-gray-300 focus:ring-2 focus:ring-indigo-500 focus:border-transparent text-sm text-right"
                        />
                        <span className="absolute right-3 top-1/2 -translate-y-1/2 text-xs text-gray-400">원</span>
                      </div>
                      <Button variant="ghost" size="sm" onClick={() => removeMenu(activeTab, menuIndex)}>
                        <svg className="w-4 h-4 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                        </svg>
                      </Button>
                    </div>
                  ))}
                  <div className="pt-3 border-t border-gray-100 flex justify-between items-center">
                    <span className="text-sm text-gray-500">소계</span>
                    <span className="text-lg font-bold text-indigo-600">{formatMoney(personTotal)}원</span>
                  </div>
                </div>
              )}
            </Card>
          )}
        </div>
      );
    }

    // ========================================
    // Step 3 - 할인 설정
    // ========================================
    function StepDiscount({ discount, setDiscount }) {
      const discountTypes = [
        { value: 'none', label: '할인 없음', desc: '할인을 적용하지 않습니다.' },
        { value: 'amount', label: '금액 할인', desc: '고정 금액을 할인합니다.' },
        { value: 'percent', label: '퍼센트 할인', desc: '총 금액의 일정 비율을 할인합니다.' },
      ];

      return (
        <div className="fade-in">
          <h2 className="text-xl font-bold text-gray-800 mb-1">할인 설정</h2>
          <p className="text-sm text-gray-500 mb-6">쿠폰이나 할인이 있다면 적용해주세요.</p>

          <div className="space-y-3 mb-6">
            {discountTypes.map(({ value, label, desc }) => (
              <button
                key={value}
                onClick={() => setDiscount(prev => ({ ...prev, type: value, value: '' }))}
                className={`w-full text-left p-4 rounded-xl border-2 transition-all duration-200 ${
                  discount.type === value
                    ? 'border-indigo-500 bg-indigo-50'
                    : 'border-gray-200 bg-white hover:border-gray-300'
                }`}
              >
                <div className="flex items-center gap-3">
                  <div className={`w-5 h-5 rounded-full border-2 flex items-center justify-center ${
                    discount.type === value ? 'border-indigo-500' : 'border-gray-300'
                  }`}>
                    {discount.type === value && <div className="w-2.5 h-2.5 rounded-full bg-indigo-500" />}
                  </div>
                  <div>
                    <p className={`text-sm font-semibold ${discount.type === value ? 'text-indigo-700' : 'text-gray-700'}`}>{label}</p>
                    <p className="text-xs text-gray-400 mt-0.5">{desc}</p>
                  </div>
                </div>
              </button>
            ))}
          </div>

          {discount.type === 'amount' && (
            <Card className="fade-in">
              <label className="block text-sm font-medium text-gray-700 mb-2">할인 금액</label>
              <div className="relative">
                <input
                  type="number"
                  value={discount.value}
                  onChange={(e) => setDiscount(prev => ({ ...prev, value: e.target.value }))}
                  placeholder="할인 금액 입력"
                  className="w-full px-4 py-3 pr-10 rounded-xl border border-gray-300 focus:ring-2 focus:ring-indigo-500 focus:border-transparent text-lg text-right"
                />
                <span className="absolute right-4 top-1/2 -translate-y-1/2 text-sm text-gray-400 font-medium">원</span>
              </div>
            </Card>
          )}

          {discount.type === 'percent' && (
            <Card className="fade-in">
              <label className="block text-sm font-medium text-gray-700 mb-2">할인율</label>
              <div className="relative">
                <input
                  type="number"
                  value={discount.value}
                  onChange={(e) => setDiscount(prev => ({ ...prev, value: Math.min(100, Math.max(0, e.target.value)) }))}
                  placeholder="할인율 입력"
                  min="0"
                  max="100"
                  className="w-full px-4 py-3 pr-10 rounded-xl border border-gray-300 focus:ring-2 focus:ring-indigo-500 focus:border-transparent text-lg text-right"
                />
                <span className="absolute right-4 top-1/2 -translate-y-1/2 text-sm text-gray-400 font-medium">%</span>
              </div>
              {discount.value && (
                <p className="mt-2 text-xs text-indigo-500 text-right">총 금액에서 {discount.value}% 를 할인합니다.</p>
              )}
            </Card>
          )}
        </div>
      );
    }

    // ========================================
    // Step 4 - 결과 확인
    // ========================================
    function StepResult({ people, discount }) {
      const result = useMemo(() => {
        // 각 인원별 원래 금액 계산 (reduce 활용)
        const personTotals = people.map((person, index) => {
          const total = person.menus.reduce((sum, m) => sum + (parseInt(m.price) || 0), 0);
          return {
            name: person.name.trim() || `참가자 ${index + 1}`,
            menus: person.menus,
            originalTotal: total,
          };
        });

        // 전체 합계
        const grandTotal = personTotals.reduce((sum, p) => sum + p.originalTotal, 0);

        // 할인 금액 계산 (조건 분기)
        let discountAmount = 0;
        if (discount.type === 'amount') {
          discountAmount = Math.min(parseInt(discount.value) || 0, grandTotal);
        } else if (discount.type === 'percent') {
          discountAmount = Math.round(grandTotal * (parseFloat(discount.value) || 0) / 100);
        }

        const finalTotal = grandTotal - discountAmount;

        // 할인율 비례 적용하여 각자 낼 금액 계산
        const discountRatio = grandTotal > 0 ? finalTotal / grandTotal : 1;
        const personFinals = personTotals.map(p => ({
          ...p,
          finalAmount: Math.round(p.originalTotal * discountRatio),
        }));

        // 반올림 차이 보정 (마지막 사람에게)
        const sumFinals = personFinals.reduce((sum, p) => sum + p.finalAmount, 0);
        if (personFinals.length > 0 && sumFinals !== finalTotal) {
          personFinals[personFinals.length - 1].finalAmount += (finalTotal - sumFinals);
        }

        // 가장 많이 / 적게 먹은 사람 (조건 분기)
        const maxPerson = personFinals.reduce((max, p) => p.originalTotal > max.originalTotal ? p : max, personFinals[0]);
        const minPerson = personFinals.reduce((min, p) => p.originalTotal < min.originalTotal ? p : min, personFinals[0]);

        // 금액 차이 1000원 미만 체크 (조건 분기)
        const maxDiff = maxPerson.originalTotal - minPerson.originalTotal;
        const recommendEqualSplit = maxDiff < 1000 && people.length > 1;
        const equalAmount = people.length > 0 ? Math.round(finalTotal / people.length) : 0;

        return {
          personFinals,
          grandTotal,
          discountAmount,
          finalTotal,
          maxPerson,
          minPerson,
          recommendEqualSplit,
          equalAmount,
          maxDiff,
        };
      }, [people, discount]);

      return (
        <div className="fade-in">
          <h2 className="text-xl font-bold text-gray-800 mb-1">정산 결과</h2>
          <p className="text-sm text-gray-500 mb-6">각자 내야 할 금액을 확인해주세요.</p>

          {/* 요약 카드 */}
          <div className="grid grid-cols-3 gap-3 mb-6">
            <Card className="!p-4 text-center">
              <p className="text-xs text-gray-400 mb-1">총 금액</p>
              <p className="text-lg font-bold text-gray-800">{formatMoney(result.grandTotal)}<span className="text-xs font-normal text-gray-400 ml-0.5">원</span></p>
            </Card>
            <Card className="!p-4 text-center">
              <p className="text-xs text-gray-400 mb-1">할인 금액</p>
              <p className="text-lg font-bold text-red-500">-{formatMoney(result.discountAmount)}<span className="text-xs font-normal text-gray-400 ml-0.5">원</span></p>
            </Card>
            <Card className="!p-4 text-center">
              <p className="text-xs text-gray-400 mb-1">결제 금액</p>
              <p className="text-lg font-bold text-indigo-600">{formatMoney(result.finalTotal)}<span className="text-xs font-normal text-gray-400 ml-0.5">원</span></p>
            </Card>
          </div>

          {/* 1/N 권고 메시지 */}
          {result.recommendEqualSplit && (
            <div className="mb-5 p-4 bg-amber-50 border border-amber-200 rounded-xl flex items-start gap-3">
              <svg className="w-5 h-5 text-amber-500 flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
              </svg>
              <div>
                <p className="text-sm font-semibold text-amber-800">1/N 정산을 추천합니다!</p>
                <p className="text-xs text-amber-600 mt-1">
                  개인별 금액 차이가 {formatMoney(result.maxDiff)}원으로 1,000원 미만입니다.
                  1인당 <strong>{formatMoney(result.equalAmount)}원</strong>씩 정산하는 것이 편리합니다.
                </p>
              </div>
            </div>
          )}

          {/* 개인별 상세 내역 */}
          <div className="space-y-3 mb-6">
            {result.personFinals.map((person, index) => {
              const isMax = person.name === result.maxPerson.name && result.personFinals.length > 1;
              const isMin = person.name === result.minPerson.name && result.personFinals.length > 1 && result.maxPerson.name !== result.minPerson.name;
              return (
                <Card key={index} className="!p-4">
                  <div className="flex items-center justify-between mb-2">
                    <div className="flex items-center gap-2">
                      <div className="w-8 h-8 rounded-full bg-indigo-100 text-indigo-600 flex items-center justify-center text-sm font-bold">
                        {index + 1}
                      </div>
                      <span className="font-semibold text-gray-800">{person.name}</span>
                      {isMax && <Badge variant="danger">Most</Badge>}
                      {isMin && <Badge variant="success">Least</Badge>}
                    </div>
                    <span className="text-lg font-bold text-indigo-600">{formatMoney(person.finalAmount)}원</span>
                  </div>
                  {person.menus.length > 0 && (
                    <div className="ml-10 space-y-1">
                      {person.menus.map((menu, mi) => (
                        <div key={mi} className="flex justify-between text-xs text-gray-500">
                          <span>{menu.name || '(메뉴명 없음)'}</span>
                          <span>{formatMoney(parseInt(menu.price) || 0)}원</span>
                        </div>
                      ))}
                      {result.discountAmount > 0 && (
                        <div className="flex justify-between text-xs text-red-400 pt-1 border-t border-dashed border-gray-200">
                          <span>할인 적용</span>
                          <span>-{formatMoney(person.originalTotal - person.finalAmount)}원</span>
                        </div>
                      )}
                    </div>
                  )}
                </Card>
              );
            })}
          </div>

          {/* 가장 많이/적게 먹은 사람 */}
          {result.personFinals.length > 1 && result.maxPerson.name !== result.minPerson.name && (
            <Card className="!p-4 bg-gray-50 border-dashed">
              <div className="grid grid-cols-2 gap-4 text-center">
                <div>
                  <p className="text-xs text-gray-400 mb-1">가장 많이 먹은 사람</p>
                  <p className="font-semibold text-gray-800">{result.maxPerson.name}</p>
                  <p className="text-sm text-red-500">{formatMoney(result.maxPerson.originalTotal)}원</p>
                </div>
                <div>
                  <p className="text-xs text-gray-400 mb-1">가장 적게 먹은 사람</p>
                  <p className="font-semibold text-gray-800">{result.minPerson.name}</p>
                  <p className="text-sm text-emerald-500">{formatMoney(result.minPerson.originalTotal)}원</p>
                </div>
              </div>
            </Card>
          )}
        </div>
      );
    }

    // ========================================
    // App Component
    // ========================================
    function App() {
      const [currentStep, setCurrentStep] = useState(0);
      const [people, setPeople] = useState([]);
      const [discount, setDiscount] = useState({ type: 'none', value: '' });

      const steps = ['인원 설정', '메뉴 입력', '할인 설정', '정산 결과'];

      // 다음 단계 진행 가능 여부 (조건 분기)
      const canProceed = useMemo(() => {
        if (currentStep === 0) {
          return people.length >= 2;
        }
        if (currentStep === 1) {
          // 최소 한 명이라도 메뉴가 있어야 함
          return people.some(p => p.menus.length > 0 && p.menus.some(m => parseInt(m.price) > 0));
        }
        if (currentStep === 2) {
          if (discount.type === 'none') return true;
          if (discount.type === 'amount') return parseInt(discount.value) > 0;
          if (discount.type === 'percent') return parseFloat(discount.value) > 0 && parseFloat(discount.value) <= 100;
          return false;
        }
        return true;
      }, [currentStep, people, discount]);

      const goNext = useCallback(() => {
        if (canProceed && currentStep < steps.length - 1) {
          setCurrentStep(prev => prev + 1);
        }
      }, [canProceed, currentStep, steps.length]);

      const goPrev = useCallback(() => {
        if (currentStep > 0) setCurrentStep(prev => prev - 1);
      }, [currentStep]);

      const handleReset = useCallback(() => {
        setCurrentStep(0);
        setPeople([]);
        setDiscount({ type: 'none', value: '' });
      }, []);

      return (
        <div className="min-h-screen bg-gradient-to-br from-indigo-50 via-white to-purple-50">
          {/* 헤더 */}
          <header className="bg-white/80 backdrop-blur-sm border-b border-gray-100 sticky top-0 z-10">
            <div className="max-w-2xl mx-auto px-4 py-4 flex items-center justify-between">
              <div className="flex items-center gap-2.5">
                <div className="w-9 h-9 bg-indigo-600 rounded-xl flex items-center justify-center shadow-md">
                  <svg className="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z" />
                  </svg>
                </div>
                <h1 className="text-lg font-bold text-gray-800">더치페이 계산기</h1>
              </div>
              {currentStep === 3 && (
                <Button variant="ghost" size="sm" onClick={handleReset}>
                  <svg className="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                  </svg>
                  처음부터
                </Button>
              )}
            </div>
          </header>

          {/* 메인 */}
          <main className="max-w-2xl mx-auto px-4 py-6 pb-20">
            <StepIndicator currentStep={currentStep} steps={steps} />

            <div className="mb-4">
              {currentStep === 0 && <StepPeople people={people} setPeople={setPeople} />}
              {currentStep === 1 && <StepMenus people={people} setPeople={setPeople} />}
              {currentStep === 2 && <StepDiscount discount={discount} setDiscount={setDiscount} />}
              {currentStep === 3 && <StepResult people={people} discount={discount} />}
            </div>

            <StepNavigation
              currentStep={currentStep}
              totalSteps={steps.length}
              onPrev={goPrev}
              onNext={goNext}
              nextDisabled={!canProceed}
              nextLabel={currentStep === 2 ? '정산하기' : undefined}
            />
          </main>
        </div>
      );
    }

    // ========================================
    // Rendering
    // ========================================
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
