<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>밈 메이커 - 짤 생성기</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
    body { font-family: 'Noto Sans KR', sans-serif; }
    canvas { image-rendering: -webkit-optimize-contrast; }
    .checkerboard {
      background-image:
        linear-gradient(45deg, #e5e7eb 25%, transparent 25%),
        linear-gradient(-45deg, #e5e7eb 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #e5e7eb 75%),
        linear-gradient(-45deg, transparent 75%, #e5e7eb 75%);
      background-size: 20px 20px;
      background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
    }
    input[type="color"] { -webkit-appearance: none; border: none; cursor: pointer; }
    input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
    input[type="color"]::-webkit-color-swatch { border: 1px solid #d1d5db; border-radius: 4px; }
    .scrollbar-thin::-webkit-scrollbar { width: 6px; }
    .scrollbar-thin::-webkit-scrollbar-track { background: transparent; }
    .scrollbar-thin::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
  </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">
  <div id="root"></div>
  <script type="text/babel">
    // ========================================
    // React Hooks Destructuring
    // ========================================
    const { useState, useEffect, useRef, useCallback, useMemo, createContext, useContext } = React;

    // ========================================
    // 🎨 Design System Components
    // ========================================
    function Button({ children, onClick, variant = 'primary', size = 'md', disabled = false, className = '', ...rest }) {
      const base = 'inline-flex items-center justify-center font-medium rounded-lg transition-all duration-150 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-gray-900 disabled:opacity-50 disabled:cursor-not-allowed';
      const variants = {
        primary: 'bg-indigo-600 hover:bg-indigo-500 text-white focus:ring-indigo-500',
        secondary: 'bg-gray-700 hover:bg-gray-600 text-gray-200 focus:ring-gray-500',
        danger: 'bg-red-600 hover:bg-red-500 text-white focus:ring-red-500',
        ghost: 'bg-transparent hover:bg-gray-700 text-gray-300 focus:ring-gray-500',
        success: 'bg-emerald-600 hover:bg-emerald-500 text-white focus:ring-emerald-500',
      };
      const sizes = {
        sm: 'px-3 py-1.5 text-sm gap-1.5',
        md: 'px-4 py-2 text-sm gap-2',
        lg: 'px-6 py-3 text-base gap-2',
      };
      return (
        <button onClick={onClick} disabled={disabled}
          className={`${base} ${variants[variant]} ${sizes[size]} ${className}`} {...rest}>
          {children}
        </button>
      );
    }

    function Input({ label, value, onChange, type = 'text', placeholder = '', className = '', ...rest }) {
      return (
        <div className={className}>
          {label && <label className="block text-xs font-medium text-gray-400 mb-1">{label}</label>}
          <input type={type} value={value} onChange={onChange} placeholder={placeholder}
            className="w-full bg-gray-800 border border-gray-600 rounded-lg px-3 py-2 text-sm text-gray-100 placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition"
            {...rest} />
        </div>
      );
    }

    function Card({ children, className = '' }) {
      return (
        <div className={`bg-gray-800 border border-gray-700 rounded-xl shadow-lg ${className}`}>
          {children}
        </div>
      );
    }

    function ColorPicker({ label, value, onChange }) {
      return (
        <div className="flex flex-col items-center gap-1">
          <label className="text-xs text-gray-400">{label}</label>
          <input type="color" value={value} onChange={e => onChange(e.target.value)}
            className="w-9 h-9 rounded-lg cursor-pointer" />
        </div>
      );
    }

    function RangeSlider({ label, value, onChange, min, max, step = 1, unit = '' }) {
      return (
        <div>
          <div className="flex justify-between items-center mb-1">
            <label className="text-xs text-gray-400">{label}</label>
            <span className="text-xs text-indigo-400 font-mono">{value}{unit}</span>
          </div>
          <input type="range" min={min} max={max} step={step} value={value}
            onChange={e => onChange(Number(e.target.value))}
            className="w-full h-1.5 bg-gray-700 rounded-lg appearance-none cursor-pointer accent-indigo-500" />
        </div>
      );
    }

    // ========================================
    // 🧩 텍스트 레이어 기본값
    // ========================================
    const createTextLayer = (id, position = 'top') => ({
      id,
      text: '',
      position,
      fontSize: 40,
      color: '#ffffff',
      strokeColor: '#000000',
      strokeWidth: 3,
      bold: true,
    });

    // ========================================
    // 📄 이미지 업로드 컴포넌트
    // ========================================
    function ImageUploader({ onImageLoad }) {
      const [urlInput, setUrlInput] = useState('');
      const [activeTab, setActiveTab] = useState('file');
      const [fileName, setFileName] = useState('');
      const fileInputRef = useRef(null);

      const handleFileChange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        setFileName(file.name);
        const reader = new FileReader();
        reader.onload = (ev) => onImageLoad(ev.target.result);
        reader.readAsDataURL(file);
      };

      const handleUrlLoad = () => {
        if (!urlInput.trim()) return;
        onImageLoad(urlInput);
      };

      return (
        <Card className="p-4">
          <h3 className="text-sm font-semibold text-gray-300 mb-3">이미지 불러오기</h3>

          <div className="flex gap-1 mb-3">
            <button onClick={() => setActiveTab('file')}
              className={`flex-1 py-1.5 text-xs rounded-lg transition ${activeTab === 'file' ? 'bg-indigo-600 text-white' : 'bg-gray-700 text-gray-400 hover:bg-gray-600'}`}>
              파일 선택
            </button>
            <button onClick={() => setActiveTab('url')}
              className={`flex-1 py-1.5 text-xs rounded-lg transition ${activeTab === 'url' ? 'bg-indigo-600 text-white' : 'bg-gray-700 text-gray-400 hover:bg-gray-600'}`}>
              URL 입력
            </button>
          </div>

          {activeTab === 'file' ? (
            <div>
              <input
                ref={fileInputRef}
                type="file"
                accept="image/*"
                onChange={handleFileChange}
                style={{ display: 'none' }}
              />
              <button
                onClick={() => fileInputRef.current.click()}
                className="w-full py-4 border-2 border-dashed border-gray-500 rounded-xl text-gray-300 hover:border-indigo-500 hover:text-indigo-400 hover:bg-indigo-500/10 transition-all text-sm font-medium"
              >
                📁 클릭하여 이미지 파일 선택
              </button>
              {fileName && (
                <p className="mt-2 text-xs text-emerald-400 text-center truncate">✓ {fileName}</p>
              )}
            </div>
          ) : (
            <div className="space-y-2">
              <Input value={urlInput} onChange={(e) => setUrlInput(e.target.value)}
                placeholder="https://example.com/image.jpg" />
              <Button onClick={handleUrlLoad} className="w-full">불러오기</Button>
            </div>
          )}
        </Card>
      );
    }

    // ========================================
    // 📄 텍스트 레이어 편집 컴포넌트
    // ========================================
    function TextLayerEditor({ layer, onChange, onDelete }) {
      const update = (key, value) => onChange({ ...layer, [key]: value });

      const positionLabels = { top: '상단', middle: '중단', bottom: '하단' };

      return (
        <Card className="p-3 space-y-3">
          <div className="flex items-center justify-between">
            <span className="text-xs font-semibold text-indigo-400 uppercase tracking-wide">
              텍스트 #{layer.id}
            </span>
            <button onClick={onDelete}
              className="text-gray-500 hover:text-red-400 transition p-1 rounded hover:bg-red-400/10"
              aria-label="텍스트 삭제">
              <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
              </svg>
            </button>
          </div>

          <textarea value={layer.text} onChange={(e) => update('text', e.target.value)}
            placeholder="밈 텍스트를 입력하세요..."
            className="w-full bg-gray-900 border border-gray-600 rounded-lg px-3 py-2 text-sm text-gray-100 placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 resize-none"
            rows={2} />

          <div>
            <label className="text-xs text-gray-400 mb-1.5 block">위치</label>
            <div className="flex gap-1">
              {['top', 'middle', 'bottom'].map(pos => (
                <button key={pos} onClick={() => update('position', pos)}
                  className={`flex-1 py-1.5 text-xs rounded-lg transition font-medium
                    ${layer.position === pos ? 'bg-indigo-600 text-white' : 'bg-gray-700 text-gray-400 hover:bg-gray-600'}`}>
                  {positionLabels[pos]}
                </button>
              ))}
            </div>
          </div>

          <RangeSlider label="폰트 크기" value={layer.fontSize} onChange={(v) => update('fontSize', v)}
            min={12} max={120} unit="px" />

          <RangeSlider label="외곽선 두께" value={layer.strokeWidth} onChange={(v) => update('strokeWidth', v)}
            min={0} max={15} unit="px" />

          <div className="flex items-center gap-4">
            <ColorPicker label="텍스트 색상" value={layer.color} onChange={(v) => update('color', v)} />
            <ColorPicker label="외곽선 색상" value={layer.strokeColor} onChange={(v) => update('strokeColor', v)} />
            <div className="flex flex-col items-center gap-1">
              <label className="text-xs text-gray-400">굵게</label>
              <button onClick={() => update('bold', !layer.bold)}
                className={`w-9 h-9 rounded-lg text-sm font-black flex items-center justify-center transition
                  ${layer.bold ? 'bg-indigo-600 text-white' : 'bg-gray-700 text-gray-400 hover:bg-gray-600'}`}>
                B
              </button>
            </div>
          </div>
        </Card>
      );
    }

    // ========================================
    // 📄 캔버스 미리보기 컴포넌트
    // ========================================
    function CanvasPreview({ imageSrc, textLayers, canvasRef }) {
      const containerRef = useRef(null);

      const drawCanvas = useCallback(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext('2d');

        if (!imageSrc) {
          canvas.width = 600;
          canvas.height = 400;
          ctx.fillStyle = '#374151';
          ctx.fillRect(0, 0, 600, 400);
          ctx.fillStyle = '#6b7280';
          ctx.font = '18px "Noto Sans KR", sans-serif';
          ctx.textAlign = 'center';
          ctx.fillText('이미지를 업로드해주세요', 300, 200);
          return;
        }

        const img = new Image();
        if (!imageSrc.startsWith('data:')) {
          img.crossOrigin = 'anonymous';
        }
        img.onload = () => {
          canvas.width = img.width;
          canvas.height = img.height;
          ctx.drawImage(img, 0, 0);

          textLayers.forEach(layer => {
            if (!layer.text.trim()) return;

            const fontWeight = layer.bold ? '900' : '400';
            ctx.font = `${fontWeight} ${layer.fontSize}px "Noto Sans KR", Impact, Arial, sans-serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            let y;
            const padding = layer.fontSize * 0.8;
            if (layer.position === 'top') {
              y = padding;
            } else if (layer.position === 'middle') {
              y = canvas.height / 2;
            } else {
              y = canvas.height - padding;
            }

            const lines = layer.text.split('\n');
            const lineHeight = layer.fontSize * 1.2;
            const totalHeight = lines.length * lineHeight;
            const startY = y - totalHeight / 2 + lineHeight / 2;

            lines.forEach((line, i) => {
              const ly = startY + i * lineHeight;
              const x = canvas.width / 2;

              if (layer.strokeWidth > 0) {
                ctx.strokeStyle = layer.strokeColor;
                ctx.lineWidth = layer.strokeWidth * 2;
                ctx.lineJoin = 'round';
                ctx.miterLimit = 2;
                ctx.strokeText(line, x, ly);
              }

              ctx.fillStyle = layer.color;
              ctx.fillText(line, x, ly);
            });
          });
        };
        img.src = imageSrc;
      }, [imageSrc, textLayers, canvasRef]);

      useEffect(() => {
        drawCanvas();
      }, [drawCanvas]);

      return (
        <div ref={containerRef} className="flex items-center justify-center checkerboard rounded-xl overflow-hidden">
          <canvas ref={canvasRef} className="max-w-full max-h-[70vh] object-contain" />
        </div>
      );
    }

    // ========================================
    // 🚀 App Component
    // ========================================
    function App() {
      const [imageSrc, setImageSrc] = useState(null);
      const [textLayers, setTextLayers] = useState([createTextLayer(1, 'top'), createTextLayer(2, 'bottom')]);
      const [nextId, setNextId] = useState(3);
      const canvasRef = useRef(null);

      const handleImageLoad = useCallback((src) => {
        setImageSrc(src);
      }, []);

      const addTextLayer = useCallback(() => {
        const positions = ['top', 'middle', 'bottom'];
        const usedPositions = textLayers.map(l => l.position);
        const available = positions.find(p => !usedPositions.includes(p)) || 'middle';
        setTextLayers(prev => [...prev, createTextLayer(nextId, available)]);
        setNextId(prev => prev + 1);
      }, [nextId, textLayers]);

      const updateTextLayer = useCallback((id, updated) => {
        setTextLayers(prev => prev.map(l => l.id === id ? updated : l));
      }, []);

      const deleteTextLayer = useCallback((id) => {
        setTextLayers(prev => prev.filter(l => l.id !== id));
      }, []);

      const downloadMeme = useCallback(() => {
        const canvas = canvasRef.current;
        if (!canvas || !imageSrc) return;
        const link = document.createElement('a');
        link.download = `meme_${Date.now()}.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();
      }, [imageSrc]);

      const resetAll = useCallback(() => {
        setImageSrc(null);
        setTextLayers([createTextLayer(1, 'top'), createTextLayer(2, 'bottom')]);
        setNextId(3);
      }, []);

      return (
        <div className="min-h-screen flex flex-col">
          {/* Header */}
          <header className="bg-gray-800/80 backdrop-blur border-b border-gray-700 sticky top-0 z-50">
            <div className="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
              <div className="flex items-center gap-3">
                <div className="w-9 h-9 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-xl flex items-center justify-center text-lg">
                  <span role="img" aria-label="meme">M</span>
                </div>
                <div>
                  <h1 className="text-lg font-bold text-white leading-tight">짤 생성기</h1>
                  <p className="text-xs text-gray-400">Meme Maker</p>
                </div>
              </div>
              <div className="flex gap-2">
                <Button variant="ghost" size="sm" onClick={resetAll}>초기화</Button>
                <Button variant="success" size="sm" onClick={downloadMeme} disabled={!imageSrc}>
                  <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                  </svg>
                  PNG 다운로드
                </Button>
              </div>
            </div>
          </header>

          {/* Main Content */}
          <main className="flex-1 max-w-7xl mx-auto w-full px-4 py-6">
            <div className="flex flex-col lg:flex-row gap-6">
              {/* Left: Controls */}
              <aside className="w-full lg:w-80 flex-shrink-0 space-y-4 scrollbar-thin lg:max-h-[calc(100vh-100px)] lg:overflow-y-auto lg:pr-1">
                <ImageUploader onImageLoad={handleImageLoad} />

                <Card className="p-4">
                  <div className="flex items-center justify-between mb-3">
                    <h3 className="text-sm font-semibold text-gray-300 flex items-center gap-2">
                      <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
                      </svg>
                      텍스트 레이어
                    </h3>
                    <Button variant="ghost" size="sm" onClick={addTextLayer}>
                      <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4" />
                      </svg>
                      추가
                    </Button>
                  </div>

                  {textLayers.length === 0 ? (
                    <p className="text-sm text-gray-500 text-center py-4">
                      텍스트를 추가해주세요
                    </p>
                  ) : (
                    <div className="space-y-3">
                      {textLayers.map(layer => (
                        <TextLayerEditor
                          key={layer.id}
                          layer={layer}
                          onChange={(updated) => updateTextLayer(layer.id, updated)}
                          onDelete={() => deleteTextLayer(layer.id)}
                        />
                      ))}
                    </div>
                  )}
                </Card>
              </aside>

              {/* Right: Canvas Preview */}
              <section className="flex-1 min-w-0">
                <Card className="p-4">
                  <div className="flex items-center justify-between mb-3">
                    <h3 className="text-sm font-semibold text-gray-300 flex items-center gap-2">
                      <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                      </svg>
                      실시간 미리보기
                    </h3>
                    {imageSrc && (
                      <span className="text-xs text-gray-500">
                        {canvasRef.current ? `${canvasRef.current.width} x ${canvasRef.current.height}` : ''}
                      </span>
                    )}
                  </div>
                  <CanvasPreview imageSrc={imageSrc} textLayers={textLayers} canvasRef={canvasRef} />
                </Card>
              </section>
            </div>
          </main>

          {/* Footer */}
          <footer className="border-t border-gray-800 py-3 text-center">
            <p className="text-xs text-gray-600">짤 생성기 Meme Maker</p>
          </footer>
        </div>
      );
    }

    // ========================================
    // Rendering
    // ========================================
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
